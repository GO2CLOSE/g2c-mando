<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0F1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mando">
<title>Cuidado Personal · Mando</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.tab-pill {
  background: rgba(244,243,239,0.04);
  border: 0.5px solid var(--border-mid);
  border-radius: 9px;
  padding: 9px 12px;
  font-size: 11px;
  color: var(--text-secondary);
  cursor: pointer;
  text-align: center;
  font-weight: 500;
}
.tab-pill.active {
  background: rgba(180,220,170,0.15);
  border-color: rgba(180,220,170,0.4);
  color: rgba(200,230,200,0.95);
}

.dashboard-card {
  background: rgba(244,243,239,0.025);
  border: 0.5px solid var(--border-soft);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 8px;
}
.dash-eyebrow { font-size: 9px; color: var(--text-tertiary); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; margin-bottom: 6px; }
.dash-value { font-size: 24px; font-weight: 500; }
.dash-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

.profile-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 0.5px solid rgba(244,243,239,0.04); gap: 8px; }
.profile-row:last-child { border-bottom: none; }
.profile-label { font-size: 11px; color: var(--text-secondary); flex-shrink: 0; }
.profile-input { background: rgba(15,20,25,0.6); border: 0.5px solid var(--border-mid); border-radius: 6px; padding: 7px 10px; font-size: 16px !important; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; outline: none; max-width: 140px; text-align: right; min-width: 0; }
.profile-static { font-size: 12px; color: var(--text-primary); text-align: right; font-weight: 500; }

.ent-card { background: rgba(244,243,239,0.025); border: 0.5px solid var(--border-soft); border-radius: 11px; padding: 11px; margin-bottom: 6px; display: flex; gap: 11px; align-items: center; }
.ent-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }

.dieta-day-card { background: rgba(244,243,239,0.025); border: 0.5px solid var(--border-soft); border-radius: 12px; padding: 12px; margin-bottom: 8px; }
.dieta-day-name { font-size: 9px; color: rgba(255,150,80,0.95); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
.dieta-meal { display: flex; gap: 10px; padding: 5px 0; align-items: center; }
.dieta-meal-label { font-size: 9px; color: var(--text-tertiary); letter-spacing: 0.05em; text-transform: uppercase; min-width: 38px; flex-shrink: 0; }
.dieta-meal-text { font-size: 11px; color: var(--text-secondary); flex: 1; }

.ingrediente-row { display: flex; align-items: center; gap: 10px; padding: 8px 11px; background: rgba(244,243,239,0.025); border: 0.5px solid var(--border-soft); border-radius: 7px; margin-bottom: 4px; cursor: pointer; }
.ingrediente-row.checked { background: rgba(180,220,170,0.06); border-color: rgba(180,220,170,0.2); }
.ingrediente-row.checked .ing-text { text-decoration: line-through; color: var(--text-tertiary); }
.ing-check { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid rgba(244,243,239,0.25); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.ingrediente-row.checked .ing-check { background: rgba(180,220,170,0.3); border-color: rgba(180,220,170,0.6); }
.ing-text { font-size: 11px; color: var(--text-primary); flex: 1; }

.budget-bar { height: 6px; background: rgba(244,243,239,0.04); border-radius: 3px; overflow: hidden; margin-top: 6px; }
.budget-fill { height: 100%; transition: width 0.3s; border-radius: 3px; }
.budget-fill.ok { background: linear-gradient(90deg, rgba(180,220,170,0.6), rgba(180,220,170,0.95)); }
.budget-fill.cerca { background: linear-gradient(90deg, rgba(244,213,128,0.6), rgba(244,213,128,0.95)); }
.budget-fill.rebasado { background: linear-gradient(90deg, rgba(255,170,110,0.7), rgba(255,79,0,0.95)); }
</style>
</head>
<body>

<div id="status-bar"></div>

<header class="module-header">
  <div class="module-eyebrow">
    <div class="dot" style="background:rgba(180,220,170,1);"></div>
    <div class="label" style="color:rgba(200,230,200,0.85);">Cuidado personal</div>
  </div>
  <div class="module-title">Tu sistema integral</div>
  <div class="module-subtitle">Perfil físico · ejercicio · dieta · ocio · proyecciones</div>
</header>

<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:14px;">
  <div class="tab-pill active" data-tab="perfil">Perfil</div>
  <div class="tab-pill" data-tab="ejercicio">Ejercicio</div>
  <div class="tab-pill" data-tab="dieta">Dieta</div>
  <div class="tab-pill" data-tab="ocio">Ocio</div>
  <div class="tab-pill" data-tab="tracking">Tracking</div>
</div>

<div id="content"></div>

<div id="footer-host"></div>
<div id="nav-host"></div>

<script src="shared.js"></script>
<script>
(async function init() {
  if (!Auth.enforce()) return;
  document.getElementById('status-bar').innerHTML = UI.renderStatusBar();
  document.getElementById('footer-host').innerHTML = UI.renderFooter();
  document.getElementById('nav-host').innerHTML = UI.renderBottomNav('cuidado');

  bindTabs();
  renderTab('perfil');
})();

function bindTabs() {
  document.querySelectorAll('.tab-pill').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab-pill').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      renderTab(t.dataset.tab);
    });
  });
}

function renderTab(tab) {
  const c = document.getElementById('content');
  switch (tab) {
    case 'perfil': c.innerHTML = renderPerfil(); break;
    case 'ejercicio': c.innerHTML = renderEjercicio(); break;
    case 'dieta': c.innerHTML = renderDieta(); break;
    case 'ocio': c.innerHTML = renderOcio(); break;
    case 'tracking': c.innerHTML = renderTracking(); break;
  }
}

// ============================================================
// PERFIL FÍSICO
// ============================================================
function renderPerfil() {
  const p = PerfilFisico.get();
  const edad = PerfilFisico.edad();
  const imc = PerfilFisico.imc();
  const imcCat = PerfilFisico.imcCategoria();
  const diasCumple = PerfilFisico.diasACumple();
  const editing = window._perfilEditing === true;

  // Análisis médicos cargados
  const analisisAtt = Attach.list().filter(a => a.type === 'analisis_medico' || (a.title || '').toLowerCase().includes('análisis') || (a.title || '').toLowerCase().includes('analisis'));

  // Helper: formatea cumpleaños tipo "7 jun 1992"
  const fmtCumple = (iso) => {
    if (!iso) return '—';
    const d = new Date(iso + 'T12:00:00');
    return d.toLocaleDateString('es-MX', { day: 'numeric', month: 'short', year: 'numeric' });
  };

  const vistaModo = `
    <div class="dashboard-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div class="dash-eyebrow" style="margin-bottom:0;">datos básicos</div>
        <button onclick="togglePerfilEdit()" style="background:rgba(120,200,220,0.12);border:0.5px solid rgba(120,200,220,0.3);color:rgba(180,220,240,0.95);padding:5px 10px;border-radius:6px;font-size:10px;cursor:pointer;font-weight:500;">Editar</button>
      </div>

      <div class="profile-row">
        <div class="profile-label">Nombre</div>
        <div class="profile-static">${Util.esc(p.nombre || '—')}</div>
      </div>
      <div class="profile-row">
        <div class="profile-label">Cumpleaños</div>
        <div class="profile-static">${fmtCumple(p.fecha_nacimiento)}</div>
      </div>
      <div class="profile-row">
        <div class="profile-label">Edad</div>
        <div class="profile-static">${edad ? edad + ' años' : '—'}${diasCumple !== null && diasCumple < 30 ? ` · cumple en ${diasCumple}d` : ''}</div>
      </div>
      <div class="profile-row">
        <div class="profile-label">Estatura</div>
        <div class="profile-static">${p.estatura_cm ? p.estatura_cm + ' cm' : '—'}</div>
      </div>
      <div class="profile-row">
        <div class="profile-label">Peso</div>
        <div class="profile-static">${p.peso_kg ? p.peso_kg + ' kg' : '—'}</div>
      </div>
      ${imc ? `
        <div class="profile-row">
          <div class="profile-label">IMC</div>
          <div class="profile-static" style="color:${imcCat.color};">${imc.toFixed(1)} · ${imcCat.label}</div>
        </div>
      ` : ''}
      <div class="profile-row">
        <div class="profile-label">Tipo sangre</div>
        <div class="profile-static">${Util.esc(p.sangre || '—')}</div>
      </div>
    </div>
  `;

  const editModo = `
    <div class="dashboard-card" style="border-color:rgba(255,79,0,0.25);background:rgba(255,79,0,0.025);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div class="dash-eyebrow" style="margin-bottom:0;color:rgba(255,150,80,0.95);">editando datos básicos</div>
        <button onclick="cancelarEditPerfil()" style="background:transparent;border:0.5px solid var(--border-mid);color:var(--text-secondary);padding:5px 10px;border-radius:6px;font-size:10px;cursor:pointer;">Cancelar</button>
      </div>

      <div class="profile-row">
        <div class="profile-label">Nombre</div>
        <input type="text" class="profile-input" id="perf-nombre" value="${Util.esc(p.nombre || '')}" style="font-family:'Inter',sans-serif;max-width:200px;font-size:16px !important;">
      </div>
      <div class="profile-row">
        <div class="profile-label">Cumpleaños</div>
        <input type="date" class="profile-input" id="perf-cumple" value="${p.fecha_nacimiento || ''}" style="max-width:170px;font-size:16px !important;">
      </div>
      <div class="profile-row">
        <div class="profile-label">Estatura (cm)</div>
        <input type="number" class="profile-input" id="perf-estatura" value="${p.estatura_cm || ''}" placeholder="178" style="font-size:16px !important;">
      </div>
      <div class="profile-row">
        <div class="profile-label">Peso (kg)</div>
        <input type="number" class="profile-input" id="perf-peso" value="${p.peso_kg || ''}" placeholder="--" step="0.1" style="font-size:16px !important;">
      </div>
      <div class="profile-row">
        <div class="profile-label">Tipo sangre</div>
        <input type="text" class="profile-input" id="perf-sangre" value="${Util.esc(p.sangre || '')}" placeholder="O+" maxlength="3" style="text-transform:uppercase;max-width:80px;font-size:16px !important;">
      </div>

      <button class="btn primary-orange full" style="margin-top:12px;" onclick="guardarPerfil()">Guardar cambios</button>
    </div>
  `;

  return `
    ${editing ? editModo : vistaModo}

    <div class="dashboard-card">
      <div class="dash-eyebrow">condiciones · usadas por toda sugerencia IA</div>
      <div style="font-size:11px;color:var(--text-secondary);line-height:1.7;margin-top:4px;">
        ${p.condiciones.map(c => `· ${Util.esc(c)}`).join('<br>')}
      </div>
      <div style="font-size:9px;color:var(--text-tertiary);letter-spacing:0.05em;text-transform:uppercase;margin-top:12px;margin-bottom:6px;">medicación</div>
      <div style="font-size:11px;color:var(--text-secondary);">${p.medicacion.join(' · ')}</div>
    </div>

    <div class="dashboard-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div class="dash-eyebrow" style="margin-bottom:0;">expediente médico</div>
        <a href="config.html" style="font-size:11px;color:rgba(255,150,80,0.9);text-decoration:none;">+ subir análisis</a>
      </div>
      ${(() => {
        const ultimo = Expediente.ultimo();
        if (!ultimo) {
          return `<div style="font-size:11px;color:var(--text-tertiary);text-align:center;padding:14px;">Sin análisis cargados aún</div>`;
        }
        const alertas = Expediente.alertas();
        const optimos = ultimo.valores.filter(v => v.estado === 'optimo' || v.estado === 'normal').length;
        return `
          <div style="background:rgba(120,200,220,0.04);border:0.5px solid rgba(120,200,220,0.2);border-radius:9px;padding:11px;margin-bottom:8px;">
            <div style="font-size:9px;color:rgba(150,210,230,0.95);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-bottom:5px;">último análisis · ${ultimo.laboratorio}</div>
            <div style="font-size:11px;font-weight:500;">${Util.esc(ultimo.fecha)} · ${ultimo.valores.length} biomarcadores</div>
            <div style="display:flex;gap:8px;margin-top:6px;font-size:10px;">
              <div style="color:rgba(180,220,170,0.95);">✓ ${optimos} normales</div>
              ${alertas.length ? `<div style="color:rgba(255,170,110,0.95);">⚠ ${alertas.length} fuera de rango</div>` : ''}
            </div>
          </div>

          ${alertas.length ? `
            <div style="font-size:9px;color:var(--text-tertiary);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:6px;">requieren atención</div>
            ${alertas.map(a => {
              const colorEstado = a.estado === 'deficiencia' || a.estado === 'alto' ? 'rgba(255,170,110,0.95)' : 'rgba(244,213,128,0.95)';
              return `
                <div style="background:rgba(255,79,0,0.04);border:0.5px solid rgba(255,79,0,0.2);border-radius:8px;padding:10px;margin-bottom:5px;">
                  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;">
                    <div style="flex:1;min-width:0;">
                      <div style="font-size:11px;font-weight:500;">${Util.esc(a.nombre)}</div>
                      <div style="font-size:9px;color:var(--text-tertiary);margin-top:1px;">rango ${a.ref_min}${a.ref_max ? '-' + a.ref_max : '+'} ${a.unidad}</div>
                    </div>
                    <div style="text-align:right;">
                      <div style="font-size:13px;font-weight:500;color:${colorEstado};">${a.valor}<span style="font-size:9px;color:var(--text-tertiary);"> ${a.unidad}</span></div>
                      <div style="font-size:9px;color:${colorEstado};text-transform:uppercase;letter-spacing:0.05em;">${a.estado}</div>
                    </div>
                  </div>
                  ${a.nota ? `<div style="font-size:10px;color:var(--text-secondary);line-height:1.4;margin-top:6px;border-top:0.5px solid rgba(244,243,239,0.05);padding-top:6px;">${Util.esc(a.nota)}</div>` : ''}
                </div>
              `;
            }).join('')}
          ` : ''}

          <div style="font-size:9px;color:var(--text-tertiary);letter-spacing:0.05em;text-transform:uppercase;margin-top:10px;margin-bottom:6px;">resto del panel</div>
          <details style="background:rgba(244,243,239,0.025);border:0.5px solid var(--border-soft);border-radius:8px;padding:10px;">
            <summary style="font-size:11px;color:var(--text-secondary);cursor:pointer;font-weight:500;">Ver ${ultimo.valores.length - alertas.length} valores normales</summary>
            <div style="margin-top:8px;">
              ${ultimo.valores.filter(v => v.estado === 'normal' || v.estado === 'optimo' || v.estado === 'bajo_leve').map(v => `
                <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:10px;">
                  <div style="color:var(--text-secondary);">${Util.esc(v.nombre)}</div>
                  <div style="color:${v.estado === 'optimo' ? 'rgba(180,220,170,0.95)' : 'var(--text-primary)'};">${v.valor} ${v.unidad}</div>
                </div>
              `).join('')}
            </div>
          </details>
        `;
      })()}
    </div>
  `;
}

function togglePerfilEdit() {
  window._perfilEditing = true;
  renderTab('perfil');
}

function cancelarEditPerfil() {
  window._perfilEditing = false;
  renderTab('perfil');
}

function guardarPerfil() {
  const nombre = document.getElementById('perf-nombre').value.trim();
  const cumple = document.getElementById('perf-cumple').value;
  const estatura = parseFloat(document.getElementById('perf-estatura').value) || null;
  const peso = parseFloat(document.getElementById('perf-peso').value) || null;
  const sangre = document.getElementById('perf-sangre').value.trim().toUpperCase();

  PerfilFisico.set({
    nombre,
    fecha_nacimiento: cumple,
    estatura_cm: estatura,
    peso_kg: peso,
    sangre
  });

  UI.toast('Perfil guardado', 'success');
  window._perfilEditing = false;
  renderTab('perfil');
}

// ============================================================
// EJERCICIO
// ============================================================
function renderEjercicio() {
  const cumpl = Ejercicio.cumplimiento(7);
  const proximas = Ejercicio.proximasSesiones(5);
  const recientes = Ejercicio.list().slice(0, 5);

  return `
    <!-- Dashboard -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
      <div class="dashboard-card" style="margin-bottom:0;">
        <div class="dash-eyebrow">cumplimiento · 7 días</div>
        <div class="dash-value" style="color:${cumpl.cumplimiento_pct >= 70 ? 'rgba(180,220,170,0.95)' : 'rgba(244,213,128,0.95)'};">${cumpl.cumplimiento_pct}%</div>
        <div class="dash-sub">${cumpl.dias_activos} de ${cumpl.meta_dias} días meta</div>
        <div class="budget-bar"><div class="budget-fill ${cumpl.cumplimiento_pct >= 70 ? 'ok' : 'cerca'}" style="width:${cumpl.cumplimiento_pct}%;"></div></div>
      </div>
      <div class="dashboard-card" style="margin-bottom:0;">
        <div class="dash-eyebrow">tiempo total</div>
        <div class="dash-value" style="color:rgba(150,210,230,0.95);">${cumpl.total_minutos}<span style="font-size:13px;color:var(--text-tertiary);"> min</span></div>
        <div class="dash-sub">promedio ${cumpl.promedio_min_dia} min/día</div>
      </div>
    </div>

    <button class="btn primary-orange full" onclick="abrirRegistrarEntrenamiento()" style="margin-bottom:8px;">+ Registrar entrenamiento</button>
    <button class="btn full" onclick="abrirAgendarEjercicio()" style="margin-bottom:14px;">+ Agendar futuro</button>

    <!-- Próximas sesiones -->
    ${proximas.length ? `
      <div class="section-eyebrow"><div><div class="label">próximas sesiones agendadas</div></div></div>
      ${proximas.map(p => {
        const tipoMeta = Ejercicio.TIPOS[p.tipo] || { label: p.tipo, color: 'gray', icon: '·' };
        const dias = Util.daysUntil(p.fecha);
        return `
          <div class="ent-card">
            <div class="ent-icon" style="background:${tipoMeta.color.replace('0.95', '0.15')};color:${tipoMeta.color};">${tipoMeta.icon}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:11px;font-weight:500;">${Util.esc(tipoMeta.label)}</div>
              <div style="font-size:9px;color:var(--text-tertiary);">${dias === 0 ? 'hoy' : (dias === 1 ? 'mañana' : `en ${dias}d`)} · ${p.lugar || 'sin lugar'}</div>
            </div>
            <div style="font-size:10px;color:var(--text-tertiary);">${p.duracion_min || '?'}min</div>
          </div>
        `;
      }).join('')}
    ` : ''}

    <!-- Historial reciente -->
    ${recientes.length ? `
      <div class="section-eyebrow" style="margin-top:14px;"><div><div class="label">últimos entrenamientos</div></div></div>
      ${recientes.map(e => {
        const tipoMeta = Ejercicio.TIPOS[e.tipo] || { label: e.tipo, color: 'gray', icon: '·' };
        return `
          <div class="ent-card">
            <div class="ent-icon" style="background:${tipoMeta.color.replace('0.95', '0.15')};color:${tipoMeta.color};">${tipoMeta.icon}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:11px;font-weight:500;">${Util.esc(e.titulo || tipoMeta.label)}</div>
              <div style="font-size:9px;color:var(--text-tertiary);">${Util.fmtDate(e.fecha, { short: true })} · ${Util.esc(e.lugar || 'sin lugar')}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:11px;color:rgba(180,220,170,0.95);font-weight:500;">${e.duracion_min || 0} min</div>
            </div>
          </div>
        `;
      }).join('')}
    ` : ''}
  `;
}

function abrirRegistrarEntrenamiento() {
  let state = { tipo: 'fuerza' };
  const tipos = Ejercicio.TIPOS;
  const tipoBtns = Object.entries(tipos).map(([k, t], i) =>
    `<div class="g2c-quick-btn ${i === 0 ? 'active' : ''}" data-ent-tipo="${k}">
      <div class="qb-label">${t.icon}</div>
      <div class="qb-value" style="color:${t.color};">${t.label}</div>
    </div>`
  ).join('');

  const modal = document.createElement('div');
  modal.className = 'g2c-modal-backdrop active';
  modal.id = 'modal-ent';
  modal.innerHTML = `
    <div class="g2c-modal" onclick="event.stopPropagation()">
      <div class="g2c-modal-handle"></div>
      <div class="g2c-modal-eyebrow"><div class="dot" style="background:rgba(180,220,170,1);"></div><div class="label">Entrenamiento</div></div>
      <div class="g2c-modal-title">Registrar sesión</div>

      <div class="form-field">
        <div class="field-label">TIPO</div>
        <div class="g2c-quick-grid" style="grid-template-columns:repeat(2,1fr);">${tipoBtns}</div>
      </div>

      <div class="form-field">
        <div class="field-label">QUÉ HICISTE (opcional)</div>

function cerrarModalEnt() {

function guardarEntrenamiento() {
  const titulo = document.getElementById('ent-titulo').value.trim();
  const duracion = parseInt(document.getElementById('ent-duracion').value) || 0;
  const fecha = document.getElementById('ent-fecha').value;
  const lugar = document.getElementById('ent-lugar').value.trim();
  const notas = document.getElementById('ent-notas').value.trim();

  if (!duracion) return UI.toast('Pon la duración', 'error');

  Ejercicio.registrar({
    tipo: window._entState?.tipo || 'fuerza',
    titulo,
    duracion_min: duracion,
    fecha: fecha ? new Date(fecha).getTime() : Date.now(),
    lugar,
    notas
  });

  UI.toast(`${duracion} min registrados`, 'success');
  cerrarModalEnt();
  renderTab('ejercicio');
}

function cerrarModalAgej() {
  const m = document.getElementById('modal-agej');
  if (m) m.remove();
}

function guardarAgendaEjercicio() {
  const fecha = document.getElementById('agej-fecha').value;
  const dur = parseInt(document.getElementById('agej-dur').value) || 30;
  const lugar = document.getElementById('agej-lugar').value.trim();

  if (!fecha) return UI.toast('Pon fecha y hora', 'error');

  const fechaTs = new Date(fecha).getTime();
  Ejercicio.agendar({
    tipo: window._agejState?.tipo || 'fuerza',
    fecha: fechaTs,
    duracion_min: dur,
    lugar
  });

  // También crea recordatorio
  Recordatorios.agendar({
    tipo: 'salud',
    titulo: `Ejercicio · ${Ejercicio.TIPOS[window._agejState?.tipo]?.label || 'sesión'}`,
    body: `${dur} min en ${lugar || 'sin lugar definido'}`,
    fecha: fechaTs - 30 * 60000, // 30 min antes
    prioridad: 'media'
  });

  UI.toast('Agendado · recordatorio 30min antes', 'success');
  cerrarModalAgej();
  renderTab('ejercicio');
}

function renderDieta() {
  let plan = Dieta.semanaActual();
  if (!plan) {
    plan = Dieta.generarDefault();
  }

  const inicio = new Date(plan.semana_inicio);
  const fin = new Date(plan.semana_inicio + 6 * 86400000);
  const semanaLabel = `${inicio.getDate()} ${inicio.toLocaleDateString('es-MX', { month: 'short' })} – ${fin.getDate()} ${fin.toLocaleDateString('es-MX', { month: 'short' })}`;

  const compradosCount = plan.comprados ? Object.values(plan.comprados).filter(Boolean).length : 0;
  const totalIng = plan.ingredientes_mercado.length;

  const prefs = Dieta.getPreferencias();

  return `
    <div class="dashboard-card">
      <div class="dash-eyebrow">semana del ${semanaLabel}</div>
      <div style="font-size:13px;color:var(--text-secondary);line-height:1.5;margin-top:6px;">
        Plan personalizado: anti-inflamatorio · TDAH-friendly. ${prefs.aversiones.length > 0 ? `Excluye: <strong>${prefs.aversiones.join(', ')}</strong>.` : 'Sin aversiones registradas.'}
      </div>
      <button class="btn full" onclick="regenerarDieta()" style="margin-top:10px;font-size:11px;">↻ Regenerar plan semanal</button>
    </div>

    <div class="section-eyebrow"><div><div class="label">tus gustos y aversiones</div></div></div>
    <div style="background:rgba(244,79,0,0.04);border:0.5px solid rgba(255,79,0,0.18);border-radius:12px;padding:13px;margin-bottom:14px;">

      <div style="margin-bottom:10px;">
        <div style="font-size:9px;color:rgba(255,170,110,0.95);letter-spacing:0.1em;text-transform:uppercase;font-weight:500;margin-bottom:6px;">no me gusta · excluir siempre</div>
        <div id="aversiones-tags" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;min-height:24px;">
          ${prefs.aversiones.length === 0 ? '<div style="font-size:10px;color:var(--text-tertiary);">Ninguna</div>' :
            prefs.aversiones.map(a => `
              <div style="background:rgba(255,79,0,0.15);border:0.5px solid rgba(255,79,0,0.4);color:rgba(255,170,110,0.98);padding:4px 9px;border-radius:11px;font-size:10px;display:flex;align-items:center;gap:5px;">
                ${Util.esc(a)} <span onclick="quitarAversion('${Util.esc(a).replace(/'/g, '&apos;')}')" style="cursor:pointer;font-size:11px;">×</span>
              </div>
            `).join('')}
        </div>
        <div style="display:flex;gap:5px;">
          <input type="text" id="nueva-aversion" placeholder="Ej: avena, betabel..." style="flex:1;background:rgba(244,243,239,0.04);border:0.5px solid var(--border-soft);color:var(--text-primary);font-family:inherit;border-radius:6px;padding:6px 10px;font-size:14px !important;outline:0;">
          <button class="btn" onclick="agregarAversion()" style="padding:6px 11px;font-size:10px;">+ no</button>
        </div>
      </div>

      <div>
        <div style="font-size:9px;color:rgba(180,220,170,0.95);letter-spacing:0.1em;text-transform:uppercase;font-weight:500;margin-bottom:6px;">me gusta · prioriza estos</div>
        <div id="gustos-tags" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;min-height:24px;">
          ${prefs.gustos.length === 0 ? '<div style="font-size:10px;color:var(--text-tertiary);">Ninguno</div>' :
            prefs.gustos.map(g => `
              <div style="background:rgba(180,220,170,0.12);border:0.5px solid rgba(180,220,170,0.35);color:rgba(180,220,170,0.95);padding:4px 9px;border-radius:11px;font-size:10px;display:flex;align-items:center;gap:5px;">
                ${Util.esc(g)} <span onclick="quitarGusto('${Util.esc(g).replace(/'/g, '&apos;')}')" style="cursor:pointer;font-size:11px;">×</span>
              </div>
            `).join('')}
        </div>
        <div style="display:flex;gap:5px;">
          <input type="text" id="nuevo-gusto" placeholder="Ej: huevo, salmón..." style="flex:1;background:rgba(244,243,239,0.04);border:0.5px solid var(--border-soft);color:var(--text-primary);font-family:inherit;border-radius:6px;padding:6px 10px;font-size:14px !important;outline:0;">
          <button class="btn primary-green" onclick="agregarGusto()" style="padding:6px 11px;font-size:10px;">+ sí</button>
        </div>
      </div>

      ${(prefs.aversiones.length > 0 || prefs.gustos.length > 0) ? `
        <div style="margin-top:10px;padding-top:10px;border-top:0.5px solid rgba(244,243,239,0.06);font-size:10px;color:var(--text-tertiary);line-height:1.5;">
          Al regenerar el plan se aplicarán estas preferencias automáticamente.
        </div>
      ` : ''}

    <div class="section-eyebrow"><div><div class="label">plan diario</div></div></div>

      </div>
    </div>

    <div id="ingredientes-list">
      ${plan.ingredientes_mercado.map(ing => {
        const checked = plan.comprados && plan.comprados[ing];
        return `
          <div class="ingrediente-row ${checked ? 'checked' : ''}" onclick="toggleIng('${Util.esc(ing).replace(/'/g, '&apos;')}')">
            <div class="ing-check">${checked ? '<div style="color:rgba(180,220,170,1);font-size:11px;">✓</div>' : ''}</div>
            <div class="ing-text">${Util.esc(ing)}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function agregarAversion() {
  const val = document.getElementById('nueva-aversion').value.trim();
  if (!val) return;
  const prefs = Dieta.getPreferencias();
  if (!prefs.aversiones.includes(val)) {
    prefs.aversiones.push(val);
    Dieta.setPreferencias(prefs);
    UI.toast(`"${val}" agregado a aversiones`, 'success');
    renderTab('dieta');
  }
}
function quitarAversion(val) {
  const prefs = Dieta.getPreferencias();
  prefs.aversiones = prefs.aversiones.filter(a => a !== val);
  Dieta.setPreferencias(prefs);
  renderTab('dieta');
}
function agregarGusto() {
  const val = document.getElementById('nuevo-gusto').value.trim();
  if (!val) return;
  const prefs = Dieta.getPreferencias();
  if (!prefs.gustos.includes(val)) {
    prefs.gustos.push(val);
    Dieta.setPreferencias(prefs);
    UI.toast(`"${val}" agregado a gustos`, 'success');
    renderTab('dieta');
  }
}
function quitarGusto(val) {
  const prefs = Dieta.getPreferencias();
  prefs.gustos = prefs.gustos.filter(g => g !== val);
  Dieta.setPreferencias(prefs);
  renderTab('dieta');
}

function regenerarDieta() {
  if (!confirm('¿Regenerar el plan? Perderás los checks de comprados.')) return;
  Dieta.generarDefault();
  UI.toast('Plan semanal regenerado', 'success');
  renderTab('dieta');
}

function toggleIng(ing) {
  Dieta.toggleIngrediente(ing);
  renderTab('dieta');
}

        <div class="field-label">CUÁNDO</div>
        <input type="datetime-local" class="field-input" id="mota-fecha" value="${new Date(Date.now() - new Date().getTimezoneOffset()*60000).toISOString().slice(0,16)}" style="font-size:16px !important;">
      </div>

      <div class="g2c-modal-actions">
        <button class="btn" onclick="cerrarModalMota()">Cancelar</button>
        <button class="btn full" onclick="guardarMota()" style="background:rgba(120,200,80,0.18);border-color:rgba(120,200,80,0.4);color:rgba(180,220,170,0.95);">Registrar</button>
      </div>
    </div>
  `;
  modal.addEventListener('click', cerrarModalMota);
  document.body.appendChild(modal);
}

function cerrarModalMota() {
  const m = document.getElementById('modal-mota');
  if (m) m.remove();
}

function guardarMota() {
  const cantidad = parseFloat(document.getElementById('mota-cant').value) || 0;
  const unidad = document.getElementById('mota-unidad').value;
  const costo = parseFloat(document.getElementById('mota-costo').value) || 0;
  const tipo = document.getElementById('mota-tipo').value;
  const tienda = document.getElementById('mota-tienda').value.trim();
  const fechaStr = document.getElementById('mota-fecha').value;

  if (!costo || !cantidad) return UI.toast('Completa cantidad y costo', 'error');

  const r = OcioTrack.registrarMota({
    cantidad, unidad, costo, tipo, tienda,
    fecha: fechaStr ? new Date(fechaStr).getTime() : Date.now()
  });

  if (r.alerta && r.alerta.nivel === 'rebasado') {
    UI.toast(`⚠ ${r.alerta.mensaje}`, 'error', 4000);
    Alertas.emit({
      tipo: 'presupuesto_rebasado',
      subject: 'Te pasaste · marihuana',
      body: r.alerta.mensaje,
      prioridad: 'alta'
    });
  } else if (r.alerta && r.alerta.nivel === 'cerca') {
    UI.toast(`Vas en ${r.alerta.pct}% del presupuesto semanal mota`, 'info', 3000);
  } else {
    UI.toast(`${Util.fmtMoney(costo)} registrado`, 'success');
  }

  cerrarModalMota();
  renderTab('ocio');
}

function cerrarModalShop() {

function guardarShopping() {

    fecha: fechaStr ? new Date(fechaStr).getTime() : Date.now()
  });

  if (r.alerta && r.alerta.nivel === 'rebasado') {
    UI.toast(`⚠ ${r.alerta.mensaje}`, 'error', 4000);

// ============================================================
// TRACKING LONGITUDINAL · cruza ERP completo + IA
// ============================================================
function renderTracking() {
  const menteState = Store.get('alan_mando_mente_state', { estados_diarios: [] });
  const ejercicios = Store.get('alan_mando_ejercicios', []) || [];
  const ocioEntries = Store.get('alan_mando_ocio_entries', []) || [];
  const movs = Store.get('alan_mando_movimientos', []) || [];

  const ahora = Date.now();
  const en30d = ahora - 30 * 86400000;
  const en7d = ahora - 7 * 86400000;

  // Últimos 30 días
  const checkins30d = (menteState.estados_diarios || []).filter(e => new Date(e.fecha).getTime() >= en30d);
  const ejer30d = ejercicios.filter(e => e.ts >= en30d);
  const ocio30d = ocioEntries.filter(o => o.ts >= en30d);

  // Últimos 7 días
  const checkins7d = (menteState.estados_diarios || []).filter(e => new Date(e.fecha).getTime() >= en7d);
  const ejer7d = ejercicios.filter(e => e.ts >= en7d);

  // Cálculo índice de bienestar 0-100
  const ESTADOS_SCORE = { inspirado: 5, bien: 4, neutro: 3, cansado: 2, denso: 1 };
  const scoreCheckin = checkins30d.length ? checkins30d.reduce((s, c) => s + (ESTADOS_SCORE[c.estado] || 3), 0) / checkins30d.length : 0;
  const scoreEjercicio = Math.min(5, ejer30d.length / 6); // 30 ejercicios/30d = 5
  const scoreConsistencia = checkins30d.length / 30 * 5;

  const indiceBienestar = Math.round(((scoreCheckin + scoreEjercicio + scoreConsistencia) / 3) * 20); // 0-100

  // Carga operativa
  const pendientes = (Store.get(Store.KEYS.PENDIENTES, []) || []).filter(p => !p.done);
  const altas = pendientes.filter(p => p.prioridad === 'alta').length;
  const cargaOp = Math.min(100, altas * 10 + (pendientes.length - altas) * 3);

  // Color índice
  const colorIndice = indiceBienestar >= 70 ? '#7AC68A' : indiceBienestar >= 40 ? '#D4A574' : '#C56A6A';
  const colorCarga = cargaOp <= 40 ? '#7AC68A' : cargaOp <= 70 ? '#D4A574' : '#C56A6A';

  // Patrón cruzado
  let patron = '';
  if (checkins30d.length >= 7) {
    const densos = checkins30d.filter(c => c.estado === 'denso' || c.estado === 'cansado').length;
    const buenos = checkins30d.filter(c => c.estado === 'bien' || c.estado === 'inspirado').length;
    if (densos > buenos && cargaOp > 60) {
      patron = `Patrón detectado: días densos coinciden con carga operativa alta (${altas} pendientes urgentes). Bloquea 1 ejercicio diario · tu ritmo histórico mejora bienestar 30%.`;
    } else if (buenos > densos && ejer30d.length > 15) {
      patron = `Racha positiva: ${buenos} días buenos en 30d, con ${ejer30d.length} ejercicios. La rutina física correlaciona con tu mejor estado mental.`;
    } else if (checkins30d.length < 10) {
      patron = `Solo ${checkins30d.length} check-ins en 30d. Mente necesita 7+ días seguidos para detectar correlaciones reales con tu carga operativa.`;
    } else {
      patron = `Datos suficientes · sin patrón claro aún. Mantén consistencia · en 60d puedo cruzar con tu ciclo de cobros y tocadas.`;
    }
  } else {
    patron = `Necesitas más check-ins de Mente. Solo tengo ${checkins30d.length} días de data en 30d.`;
  }

  // Top ejercicios
  const tipos = {};
  ejer30d.forEach(e => { tipos[e.tipo || 'sin tipo'] = (tipos[e.tipo || 'sin tipo'] || 0) + 1; });
  const ejerTop = Object.entries(tipos).sort(([,a],[,b]) => b - a).slice(0, 4);

  return `
    <div style="background:radial-gradient(circle at top right, ${colorIndice}1A, ${colorIndice}03 70%);border:0.5px solid ${colorIndice}33;border-radius:14px;padding:14px;margin-bottom:14px;">
      <div style="font-size:9px;letter-spacing:0.14em;text-transform:uppercase;font-weight:500;color:${colorIndice};margin-bottom:6px;">índice bienestar 30d</div>
      <div style="display:flex;align-items:baseline;gap:9px;margin-bottom:10px;">
        <div style="font-size:36px;font-weight:500;color:${colorIndice};letter-spacing:-0.02em;line-height:1;font-variant-numeric:tabular-nums;">${indiceBienestar}</div>
        <div style="font-size:11px;color:rgba(244,243,239,0.55);">/100</div>
      </div>
      <div style="display:flex;gap:5px;height:6px;border-radius:3px;overflow:hidden;background:rgba(244,243,239,0.05);">
        <div style="height:100%;width:${indiceBienestar}%;background:${colorIndice};"></div>
      </div>
      <div style="margin-top:9px;font-size:11px;color:rgba(244,243,239,0.7);line-height:1.5;">
        ${indiceBienestar >= 70 ? 'Vas bien · sostén el ritmo.' : indiceBienestar >= 40 ? 'Mantén consistencia · pequeños ajustes mejoran score.' : 'Tu sistema te pide pausa · prioriza descanso y movimiento.'}
      </div>
    </div>

    <div class="stat-grid cols-3" style="margin-bottom:14px;">
      <div class="stat-card" style="background:rgba(180,220,170,0.04);border-color:rgba(180,220,170,0.18);">
        <div class="stat-label" style="color:rgba(180,220,170,0.85);">CHECK-INS 30D</div>
        <div class="stat-value tabular">${checkins30d.length}</div>
        <div class="stat-meta">${Math.round((checkins30d.length / 30) * 100)}% consistencia</div>
      </div>
      <div class="stat-card" style="background:rgba(150,210,230,0.04);border-color:rgba(150,210,230,0.18);">
        <div class="stat-label" style="color:rgba(150,210,230,0.85);">EJERCICIOS 30D</div>
        <div class="stat-value tabular">${ejer30d.length}</div>
        <div class="stat-meta">${ejer7d.length} última semana</div>
      </div>
      <div class="stat-card" style="background:${colorCarga}14;border-color:${colorCarga}33;">
        <div class="stat-label" style="color:${colorCarga};">CARGA OP</div>
        <div class="stat-value tabular">${cargaOp}</div>
        <div class="stat-meta">${altas} alta · ${pendientes.length} total</div>
      </div>
    </div>

    <div class="section-eyebrow"><div><div class="label">patrón detectado por Mando</div></div></div>
    <div style="background:rgba(120,200,220,0.04);border:0.5px solid rgba(120,200,220,0.2);border-radius:12px;padding:13px;margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
        <div style="width:14px;height:14px;background:rgba(120,200,220,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;"><div style="width:4px;height:4px;background:rgba(150,210,230,1);transform:rotate(45deg);"></div></div>
        <div style="font-size:9px;color:rgba(150,210,230,0.95);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;">cruce ERP completo</div>
      </div>
      <div style="font-size:12px;color:rgba(244,243,239,0.85);line-height:1.55;">${patron}</div>
    </div>

    ${ejerTop.length > 0 ? `
      <div class="section-eyebrow"><div><div class="label">qué hiciste · 30 días</div></div></div>
      <div style="background:rgba(244,243,239,0.025);border:0.5px solid var(--border-soft);border-radius:11px;padding:13px;margin-bottom:14px;">
        ${ejerTop.map(([tipo, count]) => `
          <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:11px;">
            <div style="color:var(--text-secondary);text-transform:capitalize;">${Util.esc(tipo)}</div>
            <div style="color:rgba(150,210,230,0.95);font-weight:500;font-variant-numeric:tabular-nums;">${count} sesiones</div>
          </div>
        `).join('')}
      </div>
    ` : ''}

    <div style="background:rgba(255,79,0,0.04);border:0.5px solid rgba(255,79,0,0.2);border-radius:12px;padding:13px;">
      <div style="font-size:9px;color:rgba(255,170,110,0.95);letter-spacing:0.1em;text-transform:uppercase;font-weight:500;margin-bottom:6px;">recomendación accionable</div>
      <div style="font-size:12px;color:rgba(244,243,239,0.85);line-height:1.55;margin-bottom:10px;">${
        cargaOp > 60 && ejer7d.length < 2 ? 'Carga operativa alta + bajo movimiento esta semana. Bloquea 30 min de ejercicio HOY · tu rutina histórica mejora score 25%.' :
        checkins7d.length < 3 ? 'Sin check-ins regulares esta semana. Abre Mente · 5 segundos diarios · mejor data = mejores cruces.' :
        ejer30d.length < 12 ? 'Bajo volumen de ejercicio · 12 sesiones en 30d. Agenda 3 sesiones esta semana en bloques fijos.' :
        'Sistema en buen ritmo · sostén consistencia 60d para análisis profundo.'
      }</div>
      <a href="mente.html" class="btn primary-orange full" style="text-decoration:none;display:flex;align-items:center;justify-content:center;">Ir a Mente · check-in</a>
    </div>
  `;
}
</script>
