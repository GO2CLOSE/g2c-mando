<head>

<div class="section-eyebrow">

      style="flex:1;background:transparent;border:0;outline:0;font-size:14px !important;color:var(--text-primary);font-family:inherit;padding:4px 0;">

    <div class="label">repertorio</div>

<div id="chat-input-host"></div>
<div id="footer-host"></div>
<div id="nav-host"></div>

<script src="shared.js"></script>
<script>
let ytPlayer = null;

(async function init() {
  if (!Auth.enforce()) return;
  document.getElementById('status-bar').innerHTML = UI.renderStatusBar();
  document.getElementById('footer-host').innerHTML = UI.renderFooter();
  document.getElementById('nav-host').innerHTML = UI.renderBottomNav('musica');

  renderRepertorio();
  renderSetList();

  // Bind buscador YouTube
  const ytInput = document.getElementById('yt-search-input');
  const ytBtn = document.getElementById('yt-search-btn');
  ytBtn.addEventListener('click', () => buscarYouTubeRepertorio(ytInput.value.trim()));
  ytInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') buscarYouTubeRepertorio(ytInput.value.trim()); });

  // Cargar YouTube IFrame API
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
})();

// ============================================================
// BUSCADOR YOUTUBE · escucha antes de agregar al repertorio
// ============================================================
async function buscarYouTubeRepertorio(query) {
  if (!query) return UI.toast('Escribe qué buscar', 'error');
  const resultsDiv = document.getElementById('yt-search-results');
  resultsDiv.style.display = 'flex';
  resultsDiv.innerHTML = `<div style="text-align:center;font-size:11px;color:var(--text-tertiary);padding:14px;">Buscando "${Util.esc(query)}"...</div>`;

  try {
    const q = encodeURIComponent(query);
    const url = `${G2C.api.proxy}/api/youtube?q=${q}`;
    console.log('[YouTube] GET', url);
    const res = await fetch(url);

    if (!res.ok) {
      const txt = await res.text().catch(() => '(sin body)');
      console.error('[YouTube] HTTP', res.status, txt);
      resultsDiv.innerHTML = `<div style="background:rgba(255,79,0,0.06);border:0.5px solid rgba(255,79,0,0.25);border-radius:9px;padding:12px;font-size:11px;color:rgba(255,170,110,0.95);line-height:1.5;">
        <div style="font-weight:500;margin-bottom:4px;">Worker error · HTTP ${res.status}</div>
        <div style="font-size:10px;color:var(--text-tertiary);">Verifica que YOUTUBE_API_KEY esté en Cloudflare Worker. Revisa Configuración → Diagnóstico.</div>
      </div>`;
      return;
    }

    const data = await res.json();
    console.log('[YouTube] response keys:', Object.keys(data || {}), 'sample:', JSON.stringify(data).slice(0, 200));

    // Normaliza varios formatos posibles del Worker
    let resultados = [];
    if (Array.isArray(data.results) && data.results.length) {
      resultados = data.results;
    } else if (Array.isArray(data.items) && data.items.length) {
      // Formato YouTube API v3 directo
      resultados = data.items.map(it => ({
        videoId: it.id?.videoId || it.id,
        titulo: it.snippet?.title || '(sin título)',
        canal: it.snippet?.channelTitle || '',
        thumbnail: it.snippet?.thumbnails?.medium?.url || it.snippet?.thumbnails?.default?.url || '',
        duracion: ''
      }));
    } else if (Array.isArray(data) && data.length) {
      resultados = data;
    }

    if (!resultados.length) {
      resultsDiv.innerHTML = `<div style="background:rgba(244,213,128,0.06);border:0.5px solid rgba(244,213,128,0.25);border-radius:9px;padding:12px;font-size:11px;color:rgba(244,213,128,0.95);line-height:1.5;">
        <div style="font-weight:500;margin-bottom:4px;">Sin resultados · "${Util.esc(query)}"</div>
        <div style="font-size:10px;color:var(--text-tertiary);">Posibles causas: 1) Worker funciona pero la API key tiene cuota agotada · 2) Worker devuelve formato no esperado · 3) Query muy específico. Intenta solo el artista.</div>
      </div>`;
      return;
    }

    resultsDiv.innerHTML = resultados.slice(0, 6).map(r => {
      const vid = r.videoId || r.id || '';
      const titulo = (r.titulo || r.title || 'sin título').replace(/`/g, '');
      const canal = (r.canal || r.channel || r.channelTitle || '').replace(/`/g, '');
      return `
        <div style="background:rgba(244,243,239,0.025);border:0.5px solid var(--border-soft);border-radius:9px;padding:9px;display:flex;gap:9px;align-items:center;">
          <div style="width:54px;height:40px;background:url('${r.thumbnail || ''}') center/cover, #1f2d4e;border-radius:5px;flex-shrink:0;"></div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:12px;font-weight:500;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${Util.esc(titulo)}</div>
            <div style="font-size:9px;color:var(--text-tertiary);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${Util.esc(canal)}${r.duracion ? ' · ' + Util.esc(r.duracion) : ''}</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;">
            <button onclick="reproducirPreview('${vid}', \`${Util.esc(titulo)}\`)" title="Reproducir sin agregar"
              style="background:rgba(120,200,220,0.15);border:0.5px solid rgba(120,200,220,0.35);color:rgba(180,220,240,0.95);width:32px;height:30px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="white"><polygon points="6,4 20,12 6,20"/></svg>
            </button>
            <button onclick="agregarDesdeBusqueda('${vid}', \`${Util.esc(titulo)}\`, \`${Util.esc(canal)}\`)" title="Agregar al repertorio"
              style="background:rgba(255,79,0,0.18);border:0.5px solid rgba(255,79,0,0.4);color:rgba(255,170,110,0.98);width:32px;height:30px;border-radius:6px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;">+</button>
          </div>
        </div>
      `;
    }).join('');
  } catch (e) {
    console.error('[YouTube] catch:', e);
    resultsDiv.innerHTML = `<div style="background:rgba(255,79,0,0.06);border:0.5px solid rgba(255,79,0,0.25);border-radius:9px;padding:12px;font-size:11px;color:rgba(255,170,110,0.95);line-height:1.5;">
      <div style="font-weight:500;margin-bottom:4px;">Error de red al consultar Worker</div>
      <div style="font-size:10px;color:var(--text-tertiary);">${Util.esc(e.message || 'desconocido')}. Verifica conexión y que el Worker esté desplegado en ${G2C.api.proxy}.</div>
    </div>`;
  }
}

function reproducirPreview(videoId, titulo) {
  const player = document.getElementById('yt-player');
  player.style.display = 'block';
  document.getElementById('yt-title').textContent = titulo + ' · preview';
  document.getElementById('yt-meta').textContent = 'modo escucha · sin agregar';
  document.getElementById('yt-iframe-host').innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&playsinline=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
  player.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function agregarDesdeBusqueda(videoId, titulo, canal) {
  // Heurística para extraer título y artista de strings de YouTube
  let tituloLimpio = titulo;
  let artista = canal.replace(/\s*-\s*topic\s*$/i, '').replace(/VEVO/i, '').trim();

  if (titulo.includes(' - ')) {
    const parts = titulo.split(' - ');
    artista = parts[0].trim();
    tituloLimpio = parts.slice(1).join(' - ').replace(/\(.*?\)/g, '').replace(/\[.*?\]/g, '').trim();
  } else if (titulo.includes(' | ')) {
    const parts = titulo.split(' | ');
    artista = parts[0].trim();
    tituloLimpio = parts.slice(1).join(' | ').trim();
  }

  // Guardar
  Store.push(Store.KEYS.CANCIONES, {
    titulo: tituloLimpio,
    artista,
    tonalidad: '',
    duracion: '',
    youtube_id: videoId,
    dominio: 'aprendiendo'
  });

  UI.toast(`"${tituloLimpio}" agregada · buscando letra...`, 'success');

  // Buscar letra automática en lrclib (mantiene la lógica que funciona)
  const cancionesAct = Store.get(Store.KEYS.CANCIONES, []);
  const cancionAgregada = cancionesAct[cancionesAct.length - 1];
  if (cancionAgregada && typeof Lyrics !== 'undefined') {
    try {
      const q = encodeURIComponent(`${artista} ${tituloLimpio}`);
      const res = await fetch(`https://lrclib.net/api/search?q=${q}`);
      const results = await res.json();
      if (results && results.length > 0) {
        const best = results[0];
        const contenido = best.syncedLyrics || best.plainLyrics;
        if (contenido) {
          const formato = best.syncedLyrics ? 'lrc' : 'plain';
          Lyrics.save(cancionAgregada.id, contenido, formato);
          UI.toast(`Letra encontrada · ${formato === 'lrc' ? 'sincronizada' : 'plana'}`, 'success');
        }
      }
    } catch (e) { console.warn('Letra error:', e); }
  }

  // Cerrar resultados y refrescar lista
  document.getElementById('yt-search-results').style.display = 'none';
  document.getElementById('yt-search-input').value = '';
  renderRepertorio();
}

function renderRepertorio() {
  const canciones = Store.get(Store.KEYS.CANCIONES, []);
  document.getElementById('repertorio-count').textContent = `${canciones.length} canciones cacheadas`;

  const list = document.getElementById('repertorio-list');
  if (!canciones.length) {
    list.innerHTML = `<div style="background:rgba(244,243,239,0.025);border:0.5px dashed rgba(244,243,239,0.15);border-radius:12px;padding:18px;text-align:center;font-size:12px;color:var(--text-tertiary);">Sin canciones aún · agrega tu primera</div>`;
    return;
  }

  list.innerHTML = canciones.map(c => `
    <div style="background:rgba(244,243,239,0.025);border:0.5px solid var(--border-soft);border-radius:11px;padding:9px 11px;display:flex;align-items:center;gap:10px;">
      <div style="width:38px;height:38px;background:linear-gradient(135deg,#1f2d4e,#0a1a2e);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;" onclick="reproducir('${c.id}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><polygon points="6,4 20,12 6,20"/></svg>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${Util.esc(c.titulo)}</div>
        <div style="font-size:10px;color:var(--text-tertiary);margin-top:1px;">${Util.esc(c.artista)} · ${Util.esc(c.tonalidad || '—')} · ${Util.esc(c.duracion || '—')}</div>
      </div>
      <div style="display:flex;gap:4px;">
        <div onclick="verLetra('${c.id}')" style="background:rgba(180,220,170,0.1);border:0.5px solid rgba(180,220,170,0.25);border-radius:5px;padding:3px 7px;font-size:9px;color:rgba(200,230,200,0.95);cursor:pointer;">letra</div>
        <div onclick="modoEscena('${c.id}')" style="background:rgba(120,200,220,0.15);border:0.5px solid rgba(120,200,220,0.35);border-radius:5px;padding:3px 7px;font-size:9px;color:rgba(180,220,240,0.95);font-weight:500;cursor:pointer;">escena</div>
      </div>
    </div>
  `).join('');
}

function renderSetList() {
  const params = new URLSearchParams(location.search);
  const armarSetId = params.get('armar_set');
  const eventos = Store.get(Store.KEYS.EVENTOS_MUSICA, []);
  const proxTocada = armarSetId ? eventos.find(e => e.id === armarSetId) : eventos.filter(e => e.tipo === 'tocada' && e.ts > Date.now()).sort((a, b) => a.ts - b.ts)[0];

  const container = document.getElementById('set-list-container');
  if (!proxTocada) {
    container.innerHTML = '';
    return;
  }

  document.getElementById('musica-sub').textContent = `${proxTocada.lugar} en ${Util.daysUntil(proxTocada.ts)} días · ${proxTocada.duracion_horas || 3}h (${proxTocada.duracion_horas || 3} sets)`;

  const setLista = proxTocada.set_list || [];
  const cantasMin = (proxTocada.duracion_horas || 3) * 45;
  const descansaMin = ((proxTocada.duracion_horas || 3) - 1) * 15;
  const totalH = proxTocada.duracion_horas || 3;

  container.innerHTML = `
    <div style="background:linear-gradient(135deg,rgba(120,200,220,0.08),rgba(120,200,220,0.02));border:0.5px solid rgba(120,200,220,0.25);border-radius:14px;padding:13px;margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;">
        <div style="font-size:10px;color:rgba(220,200,255,0.95);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;">progreso del show · ${proxTocada.lugar}</div>
      </div>
      <div class="setlist-progress">
        ${Array.from({ length: totalH }).map((_, i) => `
          <div class="setlist-segment">
            <div class="seg-bar"><div style="width:${setLista.length > 0 ? '100%' : '0%'};"></div></div>
            <div class="seg-label">Set ${i + 1} · 45'</div>
          </div>
        `).join('')}
      </div>
      <div class="setlist-stats" style="margin-top:9px;">
        <div class="setlist-stat"><div class="stat-mini-label">CANTAS</div><div class="stat-mini-value cantas">${Math.floor(cantasMin / 60)}h ${cantasMin % 60}m</div></div>
        <div class="setlist-divider"></div>
        <div class="setlist-stat"><div class="stat-mini-label">DESCANSAS</div><div class="stat-mini-value descansas">${descansaMin}m</div></div>
        <div class="setlist-divider"></div>
        <div class="setlist-stat"><div class="stat-mini-label">TOTAL</div><div class="stat-mini-value">${totalH}h</div></div>
      </div>
      ${setLista.length === 0 ? `
        <button class="btn primary-cyan full" style="margin-top:11px;" onclick="armarSetIA('${proxTocada.id}')">Mando arma set list ✨</button>
      ` : `
        <div style="margin-top:11px;background:rgba(15,20,25,0.5);border-radius:10px;padding:11px;">
          ${setLista.map((s, i) => `
            <div style="display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:0.5px solid rgba(244,243,239,0.04);">
              <div style="width:18px;height:18px;background:rgba(180,220,170,0.15);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(180,220,170,0.95);font-weight:500;">${i + 1}</div>
              <div style="flex:1;font-size:11px;">${Util.esc(s.titulo)} · ${Util.esc(s.artista || '')}</div>
              <div style="font-size:9px;color:var(--text-tertiary);">${Util.esc(s.duracion || '—')}</div>
            </div>
          `).join('')}
        </div>
      `}
    </div>
  `;
}

async function armarSetIA(tocadaId) {
  UI.toast('Mando armando set list...', 'info');

  const eventos = Store.get(Store.KEYS.EVENTOS_MUSICA, []);
  const tocada = eventos.find(e => e.id === tocadaId);
  if (!tocada) return;
  const canciones = Store.get(Store.KEYS.CANCIONES, []);

  if (canciones.length < 5) {
    UI.toast('Necesitas al menos 5 canciones en tu repertorio', 'error');
    return;
  }

  const sp = IA.buildSystemPrompt('musica');
  const res = await IA.call({
    model: G2C.models.sonnet,
    system: sp,
    messages: [{
      role: 'user',
      content: `Arma un set list de ${(tocada.duracion_horas || 3) * 9} canciones para tocar en ${tocada.lugar} (público millennial, ambiente acústico-íntimo). Mi repertorio actual:\n${canciones.map(c => `- ${c.titulo} · ${c.artista} · ${c.tonalidad || ''} · ${c.duracion || ''}`).join('\n')}\n\nResponde SOLO con JSON: [{"titulo":"...","artista":"...","duracion":"3:42","orden":1}, ...]`
    }],
    max_tokens: 1500,
    scope: 'set_list'
  });

  try {
    const text = (res.content?.[0]?.text || '').replace(/```json|```/g, '').trim();
    const setList = JSON.parse(text);
    tocada.set_list = setList;
    Store.set(Store.KEYS.EVENTOS_MUSICA, eventos);
    UI.toast('Set list armado ✓', 'success');
    renderSetList();
  } catch (e) {
    UI.toast('Error parseando set list · reintenta', 'error');
  }
}

async function reproducir(cancionId) {
  const c = Store.get(Store.KEYS.CANCIONES, []).find(x => x.id === cancionId);
  if (!c) return UI.toast('Canción no encontrada', 'error');

  let ytId = c.youtube_id;

  // Si no tiene YouTube ID, auto-buscar
  if (!ytId) {
    UI.toast('Buscando en YouTube...', 'info');
    try {
      const q = encodeURIComponent(`${c.artista} ${c.titulo} official`);
      const res = await fetch(`${G2C.api.proxy}/api/youtube?q=${q}`);
      const data = await res.json();
      if (data.results && data.results.length > 0) {
        ytId = data.results[0].videoId;
        // Guardar para próxima vez
        const todas = Store.get(Store.KEYS.CANCIONES, []);
        const idx = todas.findIndex(x => x.id === cancionId);
        if (idx >= 0) {
          todas[idx].youtube_id = ytId;
          Store.set(Store.KEYS.CANCIONES, todas);
        }
        UI.toast('Video encontrado · cacheado', 'success');
      } else {
        UI.toast('No se encontró video en YouTube', 'error');
        return;
      }
    } catch (e) {
      console.error('YouTube error:', e);
      UI.toast('YouTube API no disponible · revisa Configuración', 'error');
      return;
    }
  }

  const player = document.getElementById('yt-player');
  player.style.display = 'block';
  document.getElementById('yt-title').textContent = c.titulo + ' · ' + c.artista;
  document.getElementById('yt-meta').textContent = `${c.tonalidad || ''} · ${c.duracion || ''}`;
  // youtube-nocookie + playsinline para iOS PWA
  document.getElementById('yt-iframe-host').innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${ytId}?autoplay=1&rel=0&playsinline=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;

  Store.set('alan_mando_current_song', { id: c.id, titulo: c.titulo, artista: c.artista, progress: 0 });

  // Scroll al player
  player.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function verLetra(id) {
  const cancion = Store.get(Store.KEYS.CANCIONES, []).find(c => c.id === id);
  if (!cancion) return UI.toast('Canción no encontrada', 'error');

  let letra = Lyrics.byCancionId(id);

  // AUTO-BUSCAR letra desde lrclib.net si no existe
  let letraAutoCargada = false;
  if (!letra) {
    UI.toast('Buscando letra automáticamente...', 'info');
    try {
      const q = encodeURIComponent(`${cancion.artista} ${cancion.titulo}`);
      const res = await fetch(`https://lrclib.net/api/search?q=${q}`);
      const results = await res.json();
      if (results && results.length > 0) {
        const best = results[0];
        const contenido = best.syncedLyrics || best.plainLyrics;
        if (contenido) {
          const formato = best.syncedLyrics ? 'lrc' : 'plain';
          Lyrics.save(id, contenido, formato);
          letra = Lyrics.byCancionId(id);
          letraAutoCargada = true;
          UI.toast(`Letra encontrada · ${formato === 'lrc' ? 'sincronizada' : 'texto plano'}`, 'success');
        }
      }
    } catch (e) {
      console.warn('Error buscando letra:', e);
    }
  }

  const modal = document.createElement('div');
  modal.className = 'g2c-modal-backdrop active';
  modal.id = 'modal-letra';
  modal.innerHTML = `
    <div class="g2c-modal" onclick="event.stopPropagation()" style="max-width:480px;max-height:90vh;">
      <div class="g2c-modal-handle"></div>
      <div class="g2c-modal-eyebrow">
        <div class="dot" style="background:rgba(120,200,220,1);"></div>
        <div class="label">Letra · ${Util.esc(cancion.titulo)}</div>
      </div>
      <div class="g2c-modal-title" style="font-size:14px;">${Util.esc(cancion.artista)}</div>

      ${letra ? `
        <div style="background:rgba(244,243,239,0.025);border:0.5px solid var(--border-soft);border-radius:9px;padding:11px;margin-bottom:10px;">
          <div style="font-size:9px;color:var(--text-tertiary);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;">${letra.formato === 'lrc' ? 'LRC SINCRONIZADO' : 'TEXTO PLANO'} · ${letra.lineas.length} líneas${letraAutoCargada ? ' · auto desde lrclib' : ''}</div>
          <pre style="font-size:12px;color:var(--text-secondary);white-space:pre-wrap;font-family:'Inter',sans-serif;line-height:1.6;max-height:200px;overflow-y:auto;margin:0;">${Util.esc(letra.contenido.slice(0, 800))}${letra.contenido.length > 800 ? '...' : ''}</pre>
        </div>
      ` : `
        <div style="background:rgba(244,213,128,0.06);border:0.5px solid rgba(244,213,128,0.2);border-radius:9px;padding:11px;margin-bottom:10px;font-size:11px;color:rgba(244,213,128,0.95);">
          Sin letra encontrada · pega manual abajo o intenta otra búsqueda
        </div>
      `}

      <div class="form-field">
        <div class="field-label">EDITAR LETRA (opcional)</div>
        <textarea class="field-input field-textarea" id="lyrics-content" placeholder="Pega letra plana o LRC..." style="font-size:14px !important;min-height:120px;font-family:'Inter',sans-serif;">${letra ? Util.esc(letra.contenido) : ''}</textarea>
      </div>

      <div class="g2c-modal-actions">
        <button class="btn" onclick="cerrarModalLetra()">Cerrar</button>
        ${letra ? `<button class="btn" onclick="modoEscena('${id}'); cerrarModalLetra();" style="background:rgba(120,200,220,0.15);border-color:rgba(120,200,220,0.35);color:rgba(180,220,240,0.95);">Modo escena</button>` : ''}
        <button class="btn primary-cyan" onclick="guardarLetra('${id}')">Guardar</button>
      </div>
    </div>
  `;
  modal.addEventListener('click', cerrarModalLetra);
  document.body.appendChild(modal);
}

function cerrarModalLetra() {
  const m = document.getElementById('modal-letra');
  if (m) m.remove();
}

function guardarLetra(cancionId) {
  const contenido = document.getElementById('lyrics-content').value.trim();
  if (!contenido) {
    UI.toast('Pega la letra primero', 'error');
    return;
  }
  const formato = /^\[\d{2}:\d{2}/m.test(contenido) ? 'lrc' : 'plain';
  Lyrics.save(cancionId, contenido, formato);
  UI.toast(`Letra guardada · ${formato === 'lrc' ? 'sincronizada' : 'texto plano'}`, 'success');
  cerrarModalLetra();
}

function eliminarLetra(cancionId) {
  if (!confirm('¿Eliminar la letra de esta canción?')) return;
  Lyrics.remove(cancionId);
  UI.toast('Letra eliminada', 'info');
  cerrarModalLetra();
}

// ============================================================
// MODO ESCENA · pantalla completa con letra + scroll auto
// ============================================================
let escenaState = { cancionId: null, letra: null, currentLine: 0, autoScroll: true, ytPlayer: null, scrollTimer: null };

async function modoEscena(id) {
  const cancion = Store.get(Store.KEYS.CANCIONES, []).find(c => c.id === id);
  if (!cancion) return UI.toast('Canción no encontrada', 'error');

  let letra = Lyrics.byCancionId(id);
  let ytId = cancion.youtube_id;

  // Si no tiene letra, intentar auto-buscar
  if (!letra) {
    UI.toast('Buscando letra automáticamente...', 'info');
    try {
      const q = encodeURIComponent(`${cancion.artista} ${cancion.titulo}`);
      const res = await fetch(`https://lrclib.net/api/search?q=${q}`);
      const results = await res.json();
      if (results && results.length > 0) {
        const best = results[0];
        const contenido = best.syncedLyrics || best.plainLyrics;
        if (contenido) {
          const formato = best.syncedLyrics ? 'lrc' : 'plain';
          Lyrics.save(id, contenido, formato);
          letra = Lyrics.byCancionId(id);
        }
      }
    } catch (e) { console.warn('Letra error:', e); }
  }

  // Si no tiene YouTube, intentar auto-buscar
  if (!ytId) {
    UI.toast('Buscando video...', 'info');
    try {
      const q = encodeURIComponent(`${cancion.artista} ${cancion.titulo} official`);
      const res = await fetch(`${G2C.api.proxy}/api/youtube?q=${q}`);
      const data = await res.json();
      if (data.results && data.results.length > 0) {
        ytId = data.results[0].videoId;
        const todas = Store.get(Store.KEYS.CANCIONES, []);
        const idx = todas.findIndex(x => x.id === id);
        if (idx >= 0) { todas[idx].youtube_id = ytId; Store.set(Store.KEYS.CANCIONES, todas); }
      }
    } catch (e) { console.warn('YouTube error:', e); }
  }

  escenaState = { cancionId: id, letra, currentLine: 0, autoScroll: !!letra };

  const escena = document.createElement('div');
  escena.id = 'modo-escena';
  escena.style.cssText = 'position:fixed;inset:0;z-index:300;background:linear-gradient(180deg,#0a0e14,#0F1419);display:flex;flex-direction:column;color:white;';

  const tieneLRC = letra && letra.formato === 'lrc';
  const tieneYT = !!ytId;

  escena.innerHTML = `
    <div style="padding:18px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid rgba(244,243,239,0.1);background:rgba(15,20,25,0.95);">
      <div style="min-width:0;flex:1;">
        <div style="font-size:9px;color:rgba(120,200,220,0.85);letter-spacing:0.18em;text-transform:uppercase;font-weight:500;">MODO ESCENA</div>
        <div style="font-size:14px;font-weight:500;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${Util.esc(cancion.titulo)}</div>
        <div style="font-size:11px;color:rgba(244,243,239,0.5);margin-top:1px;">${Util.esc(cancion.artista)} ${cancion.tonalidad ? '· ' + Util.esc(cancion.tonalidad) : ''}</div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0;">
        ${letra ? `<button onclick="toggleAutoScroll()" id="autoscroll-btn" style="background:rgba(120,200,220,0.18);border:0.5px solid rgba(120,200,220,0.4);color:rgba(150,210,230,0.95);padding:8px 12px;border-radius:7px;font-size:11px;cursor:pointer;">Auto</button>` : ''}
        <button onclick="cerrarEscena()" style="background:rgba(255,79,0,0.18);border:0.5px solid rgba(255,79,0,0.4);color:rgba(255,170,110,0.95);width:36px;height:36px;border-radius:7px;font-size:14px;cursor:pointer;">×</button>
      </div>
    </div>

    ${tieneYT ? `
      <div style="padding:10px 20px;background:rgba(15,20,25,0.6);border-bottom:0.5px solid rgba(244,243,239,0.06);">
        <iframe id="escena-yt" src="https://www.youtube-nocookie.com/embed/${ytId}?enablejsapi=1&autoplay=1&playsinline=1&rel=0" style="width:100%;height:200px;border:0;border-radius:6px;" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      </div>
    ` : ''}

    <div id="escena-letra" style="flex:1;overflow-y:auto;padding:60px 24px;text-align:center;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;">
      ${letra ? letra.lineas.map((l, i) => `
        <div class="escena-line" data-line="${i}" data-time="${l.time || 0}" style="font-size:22px;font-weight:500;line-height:1.5;margin-bottom:18px;color:rgba(244,243,239,0.45);transition:all 0.4s ease;letter-spacing:-0.01em;">
          ${Util.esc(l.text) || '&nbsp;'}
        </div>
      `).join('') : `
        <div style="margin-top:40px;padding:30px;background:rgba(244,213,128,0.06);border:0.5px solid rgba(244,213,128,0.2);border-radius:14px;color:rgba(244,213,128,0.95);">
          <div style="font-size:14px;font-weight:500;margin-bottom:8px;">Sin letra cacheada</div>
          <div style="font-size:11px;color:rgba(244,243,239,0.6);line-height:1.5;margin-bottom:14px;">Toca la canción con el video, o agrega letra manual desde el botón letra.</div>
          <button onclick="cerrarEscena(); setTimeout(() => verLetra('${id}'), 200);" style="background:rgba(120,200,220,0.18);border:0.5px solid rgba(120,200,220,0.4);color:rgba(150,210,230,0.95);padding:9px 16px;border-radius:8px;font-size:12px;cursor:pointer;">Buscar letra</button>
        </div>
      `}
      <div style="height:50vh;"></div>
    </div>

    <div style="padding:14px 20px;background:rgba(15,20,25,0.95);border-top:0.5px solid rgba(244,243,239,0.06);display:flex;justify-content:space-between;align-items:center;">
      <div style="font-size:10px;color:rgba(244,243,239,0.4);">
        ${letra ? (tieneLRC ? 'Sincronizado · sigue el audio' : 'Texto plano · scroll manual') : 'Sin letra · solo video'}
      </div>
      <div style="display:flex;gap:6px;">
        ${letra ? `
          <button onclick="prevLine()" style="background:rgba(244,243,239,0.05);border:0.5px solid rgba(244,243,239,0.1);color:white;width:38px;height:38px;border-radius:7px;font-size:14px;cursor:pointer;">↑</button>
          <button onclick="nextLine()" style="background:rgba(244,243,239,0.05);border:0.5px solid rgba(244,243,239,0.1);color:white;width:38px;height:38px;border-radius:7px;font-size:14px;cursor:pointer;">↓</button>
        ` : ''}
      </div>
    </div>
  `;
  document.body.appendChild(escena);
  document.body.style.overflow = 'hidden';

  if (letra) {
    highlightLine(0);
    if (tieneLRC && tieneYT) setTimeout(initYouTubeSync, 1000);
    else if (escenaState.autoScroll) iniciarAutoScrollSimple();
  }
}

function highlightLine(idx) {
  const lines = document.querySelectorAll('.escena-line');
  lines.forEach((el, i) => {
    if (i === idx) {
      el.style.color = 'rgba(120,200,220,1)';
      el.style.fontSize = '26px';
      el.style.transform = 'scale(1.02)';
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else if (Math.abs(i - idx) === 1) {
      el.style.color = 'rgba(244,243,239,0.7)';
      el.style.fontSize = '22px';
      el.style.transform = '';
    } else {
      el.style.color = 'rgba(244,243,239,0.35)';
      el.style.fontSize = '22px';
      el.style.transform = '';
    }
  });
  escenaState.currentLine = idx;
}

function prevLine() {
  if (escenaState.currentLine > 0) highlightLine(escenaState.currentLine - 1);
}

function nextLine() {
  if (escenaState.currentLine < escenaState.letra.lineas.length - 1) {
    highlightLine(escenaState.currentLine + 1);
  }
}

function toggleAutoScroll() {
  escenaState.autoScroll = !escenaState.autoScroll;
  const btn = document.getElementById('autoscroll-btn');
  if (escenaState.autoScroll) {
    btn.style.background = 'rgba(120,200,220,0.18)';
    btn.style.color = 'rgba(150,210,230,0.95)';
    iniciarAutoScrollSimple();
  } else {
    btn.style.background = 'rgba(244,243,239,0.05)';
    btn.style.color = 'rgba(244,243,239,0.5)';
    clearInterval(escenaState.scrollTimer);
  }
}

function iniciarAutoScrollSimple() {
  clearInterval(escenaState.scrollTimer);
  escenaState.scrollTimer = setInterval(() => {
    if (!escenaState.autoScroll) return;
    if (escenaState.currentLine < escenaState.letra.lineas.length - 1) {
      highlightLine(escenaState.currentLine + 1);
    } else {
      clearInterval(escenaState.scrollTimer);
    }
  }, 4500);
}

function initYouTubeSync() {
  // Polling: lee tiempo actual del iframe vía postMessage cada 500ms
  // Nota: requiere YouTube IFrame API · simplificado aquí
  const iframe = document.getElementById('escena-yt');
  if (!iframe) return;
  // Por ahora · solo auto-scroll temporizado · sync real requiere YT IFrame API
  iniciarAutoScrollSimple();
}

function cerrarEscena() {
  clearInterval(escenaState.scrollTimer);
  const e = document.getElementById('modo-escena');
  if (e) e.remove();
  document.body.style.overflow = '';
}

function agregarCancion() {
  const modal = document.createElement('div');
  modal.className = 'g2c-modal-backdrop active';
  modal.id = 'modal-cancion';
  modal.innerHTML = `
    <div class="g2c-modal" onclick="event.stopPropagation()">
      <div class="g2c-modal-handle"></div>
      <div class="g2c-modal-eyebrow">
        <div class="dot" style="background:rgba(120,200,220,1);"></div>
        <div class="label">Nueva canción</div>
      </div>
      <div class="g2c-modal-title">Agregar al repertorio</div>

      <div class="form-field">
        <div class="field-label">TÍTULO</div>
        <input type="text" class="field-input" id="cancion-titulo" placeholder="Take Me to Church" autofocus style="font-size:16px !important;">
      </div>
      <div class="form-field">
        <div class="field-label">ARTISTA</div>
        <input type="text" class="field-input" id="cancion-artista" placeholder="Hozier" style="font-size:16px !important;">
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div class="form-field">
          <div class="field-label">TONALIDAD</div>
          <input type="text" class="field-input" id="cancion-tonalidad" placeholder="Em" style="font-size:16px !important;">
        </div>
        <div class="form-field">
          <div class="field-label">DURACIÓN</div>
          <input type="text" class="field-input" id="cancion-duracion" placeholder="4:02" style="font-size:16px !important;">
        </div>
      </div>

      <div class="form-field">
        <div class="field-label">YOUTUBE</div>
        <input type="text" class="field-input" id="cancion-yt" placeholder="ID o link · auto-busca si dejas vacío" style="font-size:16px !important;">
        <div style="font-size:9px;color:var(--text-tertiary);margin-top:4px;">Pega link completo, ID, o déjalo vacío para auto-búsqueda</div>
      </div>

      <div class="g2c-modal-actions">
        <button class="btn" onclick="cerrarModalCancion()">Cancelar</button>
        <button class="btn primary-cyan" onclick="guardarCancion()">Agregar</button>
      </div>
    </div>
  `;
  modal.addEventListener('click', cerrarModalCancion);
  document.body.appendChild(modal);
  setTimeout(() => document.getElementById('cancion-titulo')?.focus(), 100);
}

function cerrarModalCancion() {
  const m = document.getElementById('modal-cancion');
  if (m) m.remove();
}

// Extrae el videoId de cualquier formato de YouTube · link, embed, share, ID directo
function extraerYouTubeId(input) {
  if (!input) return '';
  const s = input.trim();
  // Si ya es un ID (11 chars alfanuméricos)
  if (/^[a-zA-Z0-9_-]{11}$/.test(s)) return s;
  // youtube.com/watch?v=ID
  let m = s.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  // youtu.be/ID
  m = s.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  // youtube.com/embed/ID
  m = s.match(/embed\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  // shorts/ID
  m = s.match(/shorts\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  return s; // fallback: lo que sea (puede que ya sea válido)
}

async function guardarCancion() {
  const titulo = document.getElementById('cancion-titulo').value.trim();
  const artista = document.getElementById('cancion-artista').value.trim();
  if (!titulo || !artista) {
    UI.toast('Falta título o artista', 'error');
    return;
  }
  const tonalidad = document.getElementById('cancion-tonalidad').value.trim();
  const duracion = document.getElementById('cancion-duracion').value.trim();
  let ytInput = document.getElementById('cancion-yt').value.trim();
  let ytId = extraerYouTubeId(ytInput);

  // Si no metió ID/link, AUTO-BUSCAR via Worker
  if (!ytId) {
    UI.toast('Buscando en YouTube...', 'info');
    try {
      const q = encodeURIComponent(`${artista} ${titulo} official`);
      const res = await fetch(`${G2C.api.proxy}/api/youtube?q=${q}`);
      const data = await res.json();
      if (data.results && data.results.length > 0) {
        ytId = data.results[0].videoId;
        UI.toast(`Match: ${data.results[0].titulo.slice(0, 40)}...`, 'success');
      } else {
        UI.toast('Sin resultados en YouTube · canción guardada sin video', 'info');
      }
    } catch (e) {
      console.warn('YouTube search error:', e);
      UI.toast('YouTube API no disponible · guardando sin video', 'info');
    }
  }

  Store.push(Store.KEYS.CANCIONES, {
    titulo, artista, tonalidad, duracion, youtube_id: ytId, dominio: 'aprendiendo'
  });
  UI.toast('Canción agregada al repertorio ✓', 'success');
  cerrarModalCancion();
  renderRepertorio();
}
</script>
