<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0F1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mando">
<title>Chat · Mando</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>

<div id="status-bar"></div>

<header style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
  <div style="display:flex;align-items:center;gap:10px;">
    <a href="index.html" style="width:30px;height:30px;background:rgba(244,243,239,0.04);border:0.5px solid rgba(244,243,239,0.08);border-radius:9px;display:flex;align-items:center;justify-content:center;text-decoration:none;color:white;">←</a>
    <div class="mando-avatar" style="width:30px;height:30px;">
      <div class="core">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="white"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.8l-6.2 4.5 2.4-7.4L2 9.4h7.6L12 2z"/></svg>
      </div>
      <div class="ring-1"></div>
    </div>
    <div>
      <div style="font-size:13px;font-weight:500;">Mando</div>
      <div style="display:flex;align-items:center;gap:4px;">
        <div style="width:5px;height:5px;background:rgba(180,220,170,0.95);border-radius:50%;"></div>
        <div style="font-size:9px;color:rgba(244,243,239,0.55);" id="model-indicator">Sonnet 4.6</div>
      </div>
    </div>
  </div>
  <div style="display:flex;gap:6px;">
    <button class="btn" style="padding:6px 10px;font-size:10px;" onclick="clearChat()">Limpiar</button>
  </div>
</header>

<div id="chat-thread" class="chat-thread" style="margin-bottom:140px;"></div>

<div id="chat-input-host"></div>
<div id="footer-host" style="display:none;"></div>
<div id="nav-host"></div>

<script src="shared.js"></script>
<script>
let conversationHistory = [];
let scope = 'general';

(async function init() {
  if (!Auth.enforce()) return;
  document.getElementById('status-bar').innerHTML = UI.renderStatusBar();
  document.getElementById('chat-input-host').innerHTML = UI.renderChatInput('Escribe tu mensaje...');
  document.getElementById('nav-host').innerHTML = UI.renderBottomNav('mando');

  // Recuperar conversación previa
  conversationHistory = Store.get(Store.KEYS.CHAT_CONV, []);

  // Migrar / limpiar historial corrupto:
  //  - drop entries sin role válido
  //  - quitar bloques action del texto guardado
  //  - drop entries con content vacío
  let dirty = false;
  conversationHistory = conversationHistory.filter(m => {
    if (!m || (m.role !== 'user' && m.role !== 'assistant')) { dirty = true; return false; }
    if (typeof m.content !== 'string' || !m.content.trim()) { dirty = true; return false; }
    return true;
  }).map(m => {
    if (m.role === 'assistant' && m.content.includes('```')) {
      const cleaned = typeof Actions !== 'undefined' ? Actions.stripFromResponse(m.content) : m.content;
      if (cleaned !== m.content) {
        dirty = true;
        return { ...m, content: cleaned || '(respuesta previa)' };
      }
    }
    return m;
  });
  if (dirty) {
    Store.set(Store.KEYS.CHAT_CONV, conversationHistory);
    console.log('[Chat] Historial limpiado · entries corruptas removidas');
  }

  renderHistory();

  // Si vino con mensaje pre-cargado desde otro módulo
  const params = new URLSearchParams(location.search);
  const preMsg = params.get('msg');
  scope = params.get('scope') || 'general';

  UI.bindChatInput(handleSend);

  if (preMsg) {
    setTimeout(() => handleSend(preMsg), 300);
  } else if (conversationHistory.length === 0) {
    showWelcome();
  }
})();

function showWelcome() {
  appendAI({
    text: `Hola Alan. ¿En qué te ayudo?\n\nPuedes pedirme:\n· Registrar un movimiento ("cobré $4.5K Bar Z")\n· Ver clientes vencidos\n· Armar set list para tocada\n· Tips para llegar a meta del mes\n· Cualquier otra cosa de tu sistema`,
    tone: 'operador'
  });
}

function renderHistory() {
  const thread = document.getElementById('chat-thread');
  thread.innerHTML = '';
  conversationHistory.forEach(m => {
    if (m.role === 'user') appendUser(m.content);
    else appendAI({ text: m.content, tone: m.tone || 'operador' });
  });
}

function appendUser(text) {
  const thread = document.getElementById('chat-thread');
  const div = document.createElement('div');
  div.className = 'msg-user';
  div.innerHTML = `
    <div class="user-bubble"><div class="user-text">${Util.esc(text)}</div></div>
    <div class="user-meta">${Util.fmtTime(Date.now())} ✓</div>
  `;
  thread.appendChild(div);
  thread.scrollTop = thread.scrollHeight;
  window.scrollTo(0, document.body.scrollHeight);
}

function appendAI({ text, tone = 'operador', card = null, actions = [] }) {
  const thread = document.getElementById('chat-thread');
  const div = document.createElement('div');
  div.className = 'msg-ai' + (tone === 'personal' ? ' personal' : '');
  div.innerHTML = `
    <div class="ai-eyebrow">
      <div class="ai-dot"></div>
      <div class="ai-label">Mando · ${tone === 'personal' ? 'cálido' : 'Sonnet 4.6'}</div>
    </div>
    <div class="ai-bubble">
      <div class="ai-text">${formatMarkdown(Util.esc(text))}</div>
    </div>
  `;
  thread.appendChild(div);

  if (card) {
    const cardEl = document.createElement('div');
    cardEl.className = 'msg-card';
    cardEl.innerHTML = renderCard(card);
    thread.appendChild(cardEl);
  }

  if (actions.length) {
    const actEl = document.createElement('div');
    actEl.className = 'msg-actions';
    actEl.innerHTML = actions.map(a => `<button class="btn ${a.primary ? 'primary-orange' : ''}" data-action="${a.action}" data-payload='${JSON.stringify(a.payload || {})}'>${Util.esc(a.label)}</button>`).join('');
    thread.appendChild(actEl);
    actEl.querySelectorAll('[data-action]').forEach(b => {
      b.addEventListener('click', () => handleAction(b.dataset.action, JSON.parse(b.dataset.payload || '{}')));
    });
  }

  thread.scrollTop = thread.scrollHeight;
  window.scrollTo(0, document.body.scrollHeight);
}

function appendTyping() {
  const thread = document.getElementById('chat-thread');
  const div = document.createElement('div');
  div.id = 'typing-indicator';
  div.className = 'msg-ai';
  div.innerHTML = `
    <div class="ai-bubble" style="display:inline-block;">
      <div class="typing-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="typing-label">Mando está pensando</div>
      </div>
    </div>
  `;
  thread.appendChild(div);
  thread.scrollTop = thread.scrollHeight;
  window.scrollTo(0, document.body.scrollHeight);
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function formatMarkdown(text) {
  // Soporte básico: **negrita**, listas con ·, saltos de línea
  return text
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\n· /g, '<br>· ')
    .replace(/\n/g, '<br>');
}

function renderCard(card) {
  if (card.type === 'desglose') {
    return `
      <div style="background:rgba(244,243,239,0.025);border:0.5px solid rgba(255,79,0,0.18);border-radius:11px;padding:11px 13px;">
        <div style="font-size:9px;color:rgba(255,150,80,0.95);letter-spacing:0.1em;text-transform:uppercase;font-weight:500;margin-bottom:7px;">${Util.esc(card.title || '')}</div>
        ${card.rows.map(r => `
          <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
            <div style="font-size:11px;color:rgba(244,243,239,0.7);">${Util.esc(r.label)}</div>
            <div style="font-size:11px;font-weight:500;${r.highlight ? 'color:rgba(255,150,80,0.95);' : ''}">${Util.esc(r.value)}</div>
          </div>
        `).join('')}
      </div>
    `;
  }
  return '';
}

async function handleSend(text) {
  if (!text || !text.trim()) return;

  appendUser(text);
  conversationHistory.push({ role: 'user', content: text });

  // 1. Detectar intent (CRUD por voz/texto)
  appendTyping();
  const intent = await IA.detectIntent(text);

  // 2. Si es operación CRUD directa, ejecutar
  if (intent.intent === 'register' && intent.domain === 'movimiento' && intent.data.monto) {
    removeTyping();
    Cascada.registrarMovimiento(intent.data);
    appendAI({
      text: `Registrado · ${intent.data.tipo === 'ingreso' ? '+' : '−'}${Util.fmtMoney(intent.data.monto)} en ${intent.data.categoria || 'general'}. ¿Algo más?`,
      tone: 'operador'
    });
    saveConversation();
    return;
  }

  if (intent.intent === 'delete') {
    removeTyping();
    appendAI({
      text: 'Para eliminar necesito que me confirmes. ¿Qué quieres eliminar exactamente? Esto es destructivo.',
      tone: 'operador'
    });
    return;
  }

  // 3. Clasificar tono (trabajo vs personal) para responder con la voz adecuada
  const tone = await IA.classifyTone(text);

  // 4. Llamar a Sonnet con el system prompt completo
  const systemPrompt = IA.buildSystemPrompt(scope) + `\n\n# TONO DETECTADO: ${tone}\n${tone === 'personal' ? 'Reconoce lo personal ANTES de operar. Tono cálido, escucha primero.' : 'Datos duros + acción concreta. Operativo.'}`;

  // Mantén historial corto (últimos 8 mensajes para no saturar contexto)
  // CRÍTICO: filtrar entries malformadas + limpiar bloques action del texto histórico
  const recentHistory = conversationHistory
    .slice(-8)
    .filter(m => m && (m.role === 'user' || m.role === 'assistant') && typeof m.content === 'string' && m.content.trim().length > 0)
    .map(m => {
      let content = m.content;
      // Si es respuesta de assistant, quitar bloques action que envenenan el contexto
      if (m.role === 'assistant' && typeof Actions !== 'undefined') {
        content = Actions.stripFromResponse(content) || '(respuesta previa)';
      }
      return { role: m.role, content };
    });

  // Asegurar que el último mensaje sea del usuario (la API lo exige)
  if (recentHistory.length === 0 || recentHistory[recentHistory.length - 1].role !== 'user') {
    recentHistory.push({ role: 'user', content: text });
  }

  const res = await IA.call({
    model: G2C.models.sonnet,
    system: systemPrompt,
    messages: recentHistory,
    max_tokens: 800,
    scope: 'chat_' + scope
  });

  removeTyping();

  let responseText;
  if (res.error) {
    const errStr = typeof res.error_message === 'string' ? res.error_message : (res.error_message ? JSON.stringify(res.error_message) : 'desconocido');
    responseText = `No pude conectar con el cerebro IA.\n\nError: ${errStr}\n\nVe a Configuración → Diagnóstico para ver el detalle.`;
  } else {
    responseText = res.content?.[0]?.text || 'Sin respuesta del cerebro · reintenta.';
  }

  // ============================================================
  // EJECUTAR ACCIONES · SUGERENCIAS · CONFIRMACIONES
  // ============================================================
  let cards = [];
  let executedOk = 0;
  let executedFail = 0;
  let detectedFakeExecution = false;

  if (!res.error && typeof Actions !== 'undefined') {
    const blocks = Actions.parseFromResponse(responseText);

    // Detectar "false claim of execution" · IA dice que hizo algo pero no metió bloque
    if (blocks.length === 0) {
      const tl = responseText.toLowerCase();
      const claims = [
        'ya lo edité', 'ya edité', 'lo edité', 'editado', 'actualizado',
        'ya lo eliminé', 'eliminé', 'eliminado', 'borré', 'borrado',
        'ya lo creé', 'creé', 'creado', 'agregué', 'agregado',
        'ya lo registré', 'registré', 'registrado',
        'ya lo agendé', 'agendé', 'agendado',
        'ya quedó', 'listo, ya', 'ya está', 'hecho',
        'cambié', 'cambiado', 'modifiqué', 'modificado',
        'marqué', 'completé'
      ];
      const matched = claims.find(c => tl.includes(c));
      if (matched) {
        detectedFakeExecution = true;
        console.warn('[Actions] IA dijo "'+matched+'" pero NO emitió bloque action');
      }
    }

    if (blocks.length) {
      const feedbackLines = [];
      blocks.forEach(b => {
        console.log('[Actions] Ejecutando:', b.name, b.args);

        // Caso 0: quick_choices → solo se renderizan como botones, no ejecuta nada
        if (b.name === 'quick_choices') {
          const choices = (b.args && b.args.choices) || [];
          if (choices.length) {
            cards.push({ type: 'quick_choices', choices });
          }
          return;
        }

        // Caso 1: la acción es "sugerir" → IA propone, generamos tarjeta de aprobación
        if (b.name === 'sugerir') {
          const r = Actions.execute(b.name, b.args);
          if (r.ok && r.data) {
            cards.push({ type: 'suggestion', sugerencia: r.data });
          }
          return;
        }

        // Caso 2: ejecución normal
        const r = Actions.execute(b.name, b.args);
        console.log('[Actions] Resultado:', r);

        // Caso 2a: requires_confirm → crear tarjeta de confirmación
        if (r.requires_confirm) {
          cards.push({ type: 'confirm', mensaje: r.msg, accion: r.action, args: r.args });
          return;
        }

        if (r.ok) {
          executedOk++;
          feedbackLines.push(`✓ ${r.msg}`);
          // Si tiene undo, agregar tarjeta de undo
          if (r.undo) {
            cards.push({ type: 'undo', mensaje: r.msg, accion: r.undo.action, args: r.undo.args });
          }
        } else {
          executedFail++;
          feedbackLines.push(`✗ ${r.msg}`);
        }
      });

      responseText = Actions.stripFromResponse(responseText);
      if (feedbackLines.length) {
        responseText = feedbackLines.join('\n') + (responseText ? '\n\n' : '') + responseText;
      }
    }

    // Si detectamos claim falso, agregamos alerta visible
    if (detectedFakeExecution) {
      responseText = '⚠ La IA dice que ejecutó algo pero NO emitió el bloque action válido. Reintenta o verifica.\n\n' + responseText;
    }
  }

  conversationHistory.push({ role: 'assistant', content: responseText, tone, cards: cards });
  saveConversation();

  appendAIWithCards({ text: responseText, tone, cards });

  if (executedOk > 0) {
    UI.toast(`${executedOk} ${executedOk === 1 ? 'acción ejecutada' : 'acciones ejecutadas'}`, 'success');
  }
  if (executedFail > 0 && executedOk === 0) {
    UI.toast(`${executedFail} acción falló`, 'error');
  }

  if (!res.error) detectAndAddActions(responseText, intent);
}

/**
 * Renderiza respuesta IA + tarjetas inline (sugerencias, confirmaciones, undo).
 */
function appendAIWithCards({ text, tone = 'operador', cards = [] }) {
  appendAI({ text, tone });

  if (!cards.length) return;
  const container = document.getElementById('chat-messages') || document.querySelector('.chat-messages') || document.body;

  cards.forEach((card, i) => {
    const cardId = 'card_' + Date.now() + '_' + i;
    const wrap = document.createElement('div');
    wrap.id = cardId;
    wrap.style.cssText = 'margin: 8px 0 12px; max-width: 92%; align-self: flex-start;';

    if (card.type === 'suggestion') {
      const accion = card.sugerencia.accion;
      const argsTxt = JSON.stringify(card.sugerencia.args || {}, null, 0).slice(0, 200);
      wrap.innerHTML = `
        <div style="background: rgba(244,213,128,0.06); border: 0.5px solid rgba(244,213,128,0.3); border-radius: 11px; padding: 11px;">
          <div style="font-size: 9px; color: rgba(244,213,128,0.95); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; margin-bottom: 6px;">★ Sugerencia</div>
          <div style="font-size: 12px; color: var(--text-primary); margin-bottom: 4px; font-weight: 500;">${escapeHtml(accion.replace(/_/g, ' '))}</div>
          ${card.sugerencia.razon ? `<div style="font-size: 11px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 9px;">${escapeHtml(card.sugerencia.razon)}</div>` : ''}
          <div style="font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--text-tertiary); background: rgba(0,0,0,0.2); padding: 6px 8px; border-radius: 5px; margin-bottom: 10px; word-break: break-all;">${escapeHtml(argsTxt)}</div>
          <div style="display: flex; gap: 6px;">
            <button onclick="aprobarSugerencia('${card.sugerencia.id}', '${cardId}')" style="flex:1; background: rgba(180,220,170,0.18); border: 0.5px solid rgba(180,220,170,0.4); color: rgba(200,230,200,1); padding: 9px 12px; border-radius: 7px; font-size: 11px; font-weight: 500; cursor: pointer;">Aprobar</button>
            <button onclick="rechazarSugerencia('${card.sugerencia.id}', '${cardId}')" style="flex:1; background: transparent; border: 0.5px solid var(--border-mid); color: var(--text-secondary); padding: 9px 12px; border-radius: 7px; font-size: 11px; cursor: pointer;">Rechazar</button>
          </div>
        </div>
      `;
    } else if (card.type === 'confirm') {
      wrap.innerHTML = `
        <div style="background: rgba(255,79,0,0.06); border: 0.5px solid rgba(255,79,0,0.3); border-radius: 11px; padding: 11px;">
          <div style="font-size: 9px; color: rgba(255,150,80,0.95); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; margin-bottom: 6px;">⚠ Confirmar acción</div>
          <div style="font-size: 12px; color: var(--text-primary); margin-bottom: 10px; line-height: 1.5;">${escapeHtml(card.mensaje)}</div>
          <div style="display: flex; gap: 6px;">
            <button onclick='confirmarDestructiva(${JSON.stringify(card.accion)}, ${JSON.stringify(card.args)}, "${cardId}")' style="flex:1; background: rgba(255,79,0,0.2); border: 0.5px solid rgba(255,79,0,0.5); color: rgba(255,170,110,1); padding: 9px 12px; border-radius: 7px; font-size: 11px; font-weight: 500; cursor: pointer;">Confirmar</button>
            <button onclick="cancelarConfirm('${cardId}')" style="flex:1; background: transparent; border: 0.5px solid var(--border-mid); color: var(--text-secondary); padding: 9px 12px; border-radius: 7px; font-size: 11px; cursor: pointer;">Cancelar</button>
          </div>
        </div>
      `;
    } else if (card.type === 'undo') {
      wrap.innerHTML = `
        <div style="background: rgba(244,243,239,0.025); border: 0.5px solid var(--border-soft); border-radius: 9px; padding: 9px 11px; display: flex; justify-content: space-between; align-items: center; gap: 10px;">
          <div style="font-size: 11px; color: var(--text-secondary); flex: 1; min-width: 0;">${escapeHtml(card.mensaje)}</div>
          <button onclick='deshacerAccion(${JSON.stringify(card.accion)}, ${JSON.stringify(card.args)}, "${cardId}")' style="background: transparent; border: 0.5px solid rgba(120,200,220,0.3); color: rgba(180,220,240,0.95); padding: 6px 10px; border-radius: 6px; font-size: 10px; cursor: pointer; font-weight: 500; flex-shrink: 0;">↶ Deshacer</button>
        </div>
      `;
    } else if (card.type === 'quick_choices') {
      const buttons = card.choices.map((c, idx) => {
        const safeText = escapeHtml(c);
        const accent = idx === 0;
        return `<button onclick='enviarChoice(${JSON.stringify(c)}, "${cardId}")' style="
          flex: 1 1 calc(50% - 4px);
          min-width: 100px;
          background: ${accent ? 'rgba(255,79,0,0.16)' : 'rgba(244,243,239,0.04)'};
          border: 0.5px solid ${accent ? 'rgba(255,79,0,0.4)' : 'var(--border-mid)'};
          color: ${accent ? 'rgba(255,170,110,0.98)' : 'var(--text-primary)'};
          padding: 11px 13px;
          border-radius: 9px;
          font-size: 12px;
          font-weight: 500;
          cursor: pointer;
          font-family: inherit;
          line-height: 1.3;
          text-align: center;
          transition: opacity 0.15s;
          -webkit-tap-highlight-color: transparent;
        ">${safeText}</button>`;
      }).join('');

      wrap.innerHTML = `
        <div style="display: flex; flex-wrap: wrap; gap: 6px; padding: 4px 0 6px;">
          ${buttons}
        </div>
      `;
    }

    container.appendChild(wrap);
  });

  // Scroll abajo
  if (container.scrollTop !== undefined) {
    container.scrollTop = container.scrollHeight;
  }
}

function enviarChoice(text, cardId) {
  // Deshabilitar visualmente el card de choices
  const card = document.getElementById(cardId);
  if (card) {
    card.style.opacity = '0.4';
    card.style.pointerEvents = 'none';
  }
  // Llamar handleSend directo · es el flujo estándar
  if (typeof handleSend === 'function') {
    handleSend(text);
  }
}

function aprobarSugerencia(sugId, cardId) {
  const sugs = Store.get('alan_mando_sugerencias', []);
  const sug = sugs.find(s => s.id === sugId);
  if (!sug) return UI.toast('Sugerencia no encontrada', 'error');

  const r = Actions.execute(sug.accion, sug.args);
  marcarSugerencia(sugId, 'aprobada');

  const card = document.getElementById(cardId);
  if (card) {
    if (r.ok) {
      card.innerHTML = `<div style="background: rgba(180,220,170,0.08); border: 0.5px solid rgba(180,220,170,0.3); border-radius: 9px; padding: 10px; font-size: 11px; color: rgba(200,230,200,1);">✓ ${escapeHtml(r.msg)}</div>`;
      UI.toast('Sugerencia aprobada · ejecutada', 'success');
    } else {
      card.innerHTML = `<div style="background: rgba(255,79,0,0.06); border: 0.5px solid rgba(255,79,0,0.3); border-radius: 9px; padding: 10px; font-size: 11px; color: rgba(255,170,110,1);">✗ ${escapeHtml(r.msg)}</div>`;
      UI.toast('Falló al ejecutar', 'error');
    }
  }
}

function rechazarSugerencia(sugId, cardId) {
  marcarSugerencia(sugId, 'rechazada');
  const card = document.getElementById(cardId);
  if (card) {
    card.innerHTML = `<div style="background: rgba(244,243,239,0.025); border: 0.5px solid var(--border-soft); border-radius: 9px; padding: 10px; font-size: 11px; color: var(--text-tertiary);">Sugerencia descartada</div>`;
  }
  UI.toast('Descartada', 'info');
}

function marcarSugerencia(id, status) {
  const sugs = Store.get('alan_mando_sugerencias', []);
  const s = sugs.find(x => x.id === id);
  if (s) { s.status = status; s.resolved_at = Date.now(); Store.set('alan_mando_sugerencias', sugs); }
}

function confirmarDestructiva(accion, args, cardId) {
  const r = Actions.execute(accion, args);
  const card = document.getElementById(cardId);
  if (card) {
    if (r.ok) {
      card.innerHTML = `<div style="background: rgba(180,220,170,0.08); border: 0.5px solid rgba(180,220,170,0.3); border-radius: 9px; padding: 10px; font-size: 11px; color: rgba(200,230,200,1);">✓ ${escapeHtml(r.msg)}</div>`;
      UI.toast('Confirmado', 'success');
    } else {
      card.innerHTML = `<div style="background: rgba(255,79,0,0.06); border: 0.5px solid rgba(255,79,0,0.3); border-radius: 9px; padding: 10px; font-size: 11px; color: rgba(255,170,110,1);">✗ ${escapeHtml(r.msg)}</div>`;
    }
  }
}

function cancelarConfirm(cardId) {
  const card = document.getElementById(cardId);
  if (card) {
    card.innerHTML = `<div style="background: rgba(244,243,239,0.025); border: 0.5px solid var(--border-soft); border-radius: 9px; padding: 10px; font-size: 11px; color: var(--text-tertiary);">Cancelado</div>`;
  }
}

function deshacerAccion(accion, args, cardId) {
  const r = Actions.execute(accion, args);
  const card = document.getElementById(cardId);
  if (card) {
    if (r.ok) {
      card.innerHTML = `<div style="background: rgba(120,200,220,0.06); border: 0.5px solid rgba(120,200,220,0.3); border-radius: 9px; padding: 10px; font-size: 11px; color: rgba(180,220,240,1);">↶ ${escapeHtml(r.msg)}</div>`;
      UI.toast('Deshecho', 'info');
    } else {
      UI.toast('No se pudo deshacer', 'error');
    }
  }
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function detectAndAddActions(text, intent) {
  // Si la IA mencionó "marcar pagado" o "generar liga", agrega botones
  const tl = text.toLowerCase();
  if (tl.includes('generar liga') || tl.includes('genero liga')) {
    const thread = document.getElementById('chat-thread');
    const actEl = document.createElement('div');
    actEl.className = 'msg-actions';
    actEl.innerHTML = `
      <button class="btn primary-orange" onclick="goToCobros()">Ir a sistema cobros</button>
      <button class="btn" onclick="UI.toast('Ok · sin acción', 'info')">Ahora no</button>
    `;
    thread.appendChild(actEl);
  }
}

function handleAction(action, payload) {
  switch (action) {
    case 'goto_finanzas':
      location.href = 'finanzas.html';
      break;
    case 'goto_calendario':
      location.href = 'calendario.html';
      break;
    case 'goto_musica':
      location.href = 'musica.html';
      break;
    default:
      UI.toast('Acción ejecutada', 'info');
  }
}

function goToCobros() {
  window.open('https://cobros.g2c.com.mx', '_blank');
}

function saveConversation() {
  // Mantener solo últimos 50 mensajes en storage
  const trimmed = conversationHistory.slice(-50);
  Store.set(Store.KEYS.CHAT_CONV, trimmed);
}

function clearChat() {
  if (confirm('¿Limpiar conversación?')) {
    conversationHistory = [];
    Store.set(Store.KEYS.CHAT_CONV, []);
    document.getElementById('chat-thread').innerHTML = '';
    showWelcome();
  }
}
</script>
</body>
</html>
