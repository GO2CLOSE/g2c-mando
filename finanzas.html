<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0F1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mando">
<title>Finanzas · Mando</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>

<div id="status-bar"></div>

<header class="module-header">
  <div class="module-eyebrow">
    <div class="dot"></div>
    <div class="label">Finanzas · CFO integral</div>
  </div>
  <div class="module-title" id="finanzas-title">Vida financiera</div>
  <div class="module-subtitle" id="finanzas-sub">Trabajo + personal + objetivos · todo conectado</div>
</header>

<div class="tab-bar" id="tab-bar">
  <div class="tab active" data-tab="resumen">Resumen</div>
  <div class="tab" data-tab="trabajo">Trabajo</div>
  <div class="tab" data-tab="recurrentes">Recurrentes</div>
  <div class="tab" data-tab="personal">Personal</div>
  <div class="tab" data-tab="musica">Música</div>
  <div class="tab" data-tab="objetivos">Objetivos</div>
  <div class="tab" data-tab="proyecciones">Proyecciones</div>
</div>

<div id="tab-content"></div>

<div id="chat-input-host"></div>
<div id="footer-host"></div>
<div id="nav-host"></div>

<script src="shared.js"></script>
<script>
(async function init() {
  if (!Auth.enforce()) return;
  document.getElementById('status-bar').innerHTML = UI.renderStatusBar();
  // REMOVIDO v1.8: chat unificado en Mando · UI.renderChatInput('Pregunta o registra movimiento...');
  document.getElementById('footer-host').innerHTML = UI.renderFooter();
  document.getElementById('nav-host').innerHTML = UI.renderBottomNav('finanzas');

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      renderTab(t.dataset.tab);
    });
  });

  renderTab('resumen');
  // REMOVIDO v1.8: UI.bindChatInput(handleChatMessage);
})();

function renderTab(tab) {
  const c = document.getElementById('tab-content');
  switch (tab) {
    case 'resumen': c.innerHTML = renderResumen(); break;
    case 'trabajo': c.innerHTML = renderTrabajo(); bindTrabajoActions(); break;
    case 'recurrentes': c.innerHTML = renderRecurrentes(); break;
    case 'personal': c.innerHTML = renderPersonal(); break;
    case 'musica': c.innerHTML = renderMusica(); break;
    case 'objetivos': c.innerHTML = renderObjetivos(); break;
    case 'proyecciones': renderProyeccionesAsync(c); break;
  }
}

// ============================================================
// TAB RESUMEN
// ============================================================
function renderResumen() {
  const finanzas = Store.get(Store.KEYS.FINANZAS, {});
  const clientes = Store.get(Store.KEYS.CLIENTES, []);
  const movimientos = Store.get('alan_mando_movimientos', []);
  const cobrosRec = typeof Recurrentes !== 'undefined' ? Recurrentes.cobros().filter(c => c.activo) : [];
  const pagosRec = typeof Recurrentes !== 'undefined' ? Recurrentes.pagos().filter(p => p.activo) : [];
  const cuentasCobrar = Store.get('alan_mando_cuentas_cobrar', []).filter(c => !c.cobrado);
  const cuentasPagar = Store.get('alan_mando_cuentas_pagar', []).filter(c => !c.pagado);

  const proxCobros = clientes.filter(c => c.status !== 'archivado' && c.proximo_cobro && Util.daysUntil(c.proximo_cobro) <= 7);

  // ============================================================
  // CÁLCULOS REALES · sin placeholders
  // ============================================================
  const ahora = Date.now();
  const inicioMes = new Date(); inicioMes.setDate(1); inicioMes.setHours(0,0,0,0);
  const inicioMesAnterior = new Date(inicioMes); inicioMesAnterior.setMonth(inicioMesAnterior.getMonth() - 1);
  const finMesAnterior = new Date(inicioMes.getTime() - 1);
  const inicio30d = ahora - 30 * 86400000;

  // MRR · suma de cobros recurrentes activos mensuales
  const mrr = cobrosRec.reduce((s, c) => {
    const dias = (typeof Recurrentes !== 'undefined' && Recurrentes.FRECUENCIAS) ? (Recurrentes.FRECUENCIAS[c.frecuencia]?.dias || 30) : 30;
    return s + (c.monto * (30 / dias));
  }, 0);

  // Egresos recurrentes mensuales
  const egresosRec = pagosRec.reduce((s, p) => {
    const dias = (typeof Recurrentes !== 'undefined' && Recurrentes.FRECUENCIAS) ? (Recurrentes.FRECUENCIAS[p.frecuencia]?.dias || 30) : 30;
    return s + (p.monto * (30 / dias));
  }, 0);

  // Ingresos / gastos del mes actual
  const movMesActual = movimientos.filter(m => m.ts >= inicioMes.getTime());
  const ingresosMes = movMesActual.filter(m => m.tipo === 'ingreso').reduce((s, m) => s + (m.monto || 0), 0);
  const gastosMes = movMesActual.filter(m => m.tipo === 'gasto').reduce((s, m) => s + (m.monto || 0), 0);
  const utilidad = ingresosMes - gastosMes;

  // Utilidad mes anterior (para comparar)
  const movMesAnt = movimientos.filter(m => m.ts >= inicioMesAnterior.getTime() && m.ts <= finMesAnterior.getTime());
  const utilidadMesAnt = movMesAnt.filter(m => m.tipo === 'ingreso').reduce((s, m) => s + (m.monto || 0), 0)
                       - movMesAnt.filter(m => m.tipo === 'gasto').reduce((s, m) => s + (m.monto || 0), 0);

  // Flujo 30 días
  const mov30d = movimientos.filter(m => m.ts >= inicio30d);
  const flujo30d = mov30d.filter(m => m.tipo === 'ingreso').reduce((s, m) => s + (m.monto || 0), 0)
                 - mov30d.filter(m => m.tipo === 'gasto').reduce((s, m) => s + (m.monto || 0), 0);

  // Margen
  const margenPct = ingresosMes > 0 ? Math.round((utilidad / ingresosMes) * 100) : 0;

  // Patrimonio · suma de movimientos históricos + CXC pendientes - CXP pendientes
  const totalIngresosHist = movimientos.filter(m => m.tipo === 'ingreso').reduce((s, m) => s + (m.monto || 0), 0);
  const totalGastosHist = movimientos.filter(m => m.tipo === 'gasto').reduce((s, m) => s + (m.monto || 0), 0);
  const cxcAbiertas = cuentasCobrar.reduce((s, c) => s + (c.monto || 0), 0);
  const cxpAbiertas = cuentasPagar.reduce((s, c) => s + (c.monto || 0), 0);
  const patrimonio = (totalIngresosHist - totalGastosHist) + cxcAbiertas - cxpAbiertas;

  // Delta vs mes anterior
  const deltaMes = utilidad - utilidadMesAnt;
  const deltaLabel = deltaMes >= 0 ? `+${Util.fmtMoneyK(deltaMes)}` : `−${Util.fmtMoneyK(Math.abs(deltaMes))}`;
  const deltaColor = deltaMes >= 0 ? 'rgba(180,220,170,0.85)' : 'rgba(255,170,110,0.85)';

  // Status text
  const statusText = movimientos.length === 0
    ? 'Sin movimientos registrados aún · empieza a cargar tu data'
    : `${deltaLabel} vs mes anterior · ${deltaMes >= 0 ? 'vas mejor' : 'estás abajo'}`;

  let html = `
    <div style="background:linear-gradient(135deg,rgba(180,220,170,0.06),rgba(180,220,170,0.01));border:0.5px solid rgba(180,220,170,0.2);border-radius:16px;padding:14px;margin-bottom:14px;position:relative;overflow:hidden;">
      <div style="font-size:9px;color:rgba(180,220,170,0.95);letter-spacing:0.15em;text-transform:uppercase;font-weight:500;margin-bottom:6px;">patrimonio neto · hoy</div>
      <div style="font-size:26px;font-weight:500;letter-spacing:-0.02em;line-height:1.1;font-variant-numeric:tabular-nums;">${Util.fmtMoney(patrimonio)}</div>
      <div style="font-size:11px;color:${deltaColor};margin-top:4px;">${statusText}</div>
    </div>

    <div class="stat-grid cols-2">
      <div class="stat-card"><div class="stat-label">UTILIDAD MES</div><div class="stat-value tabular">${Util.fmtMoney(utilidad)}</div></div>
      <div class="stat-card"><div class="stat-label">FLUJO 30D</div><div class="stat-value tabular">${flujo30d >= 0 ? '+' : ''}${Util.fmtMoneyK(flujo30d)}</div></div>
      <div class="stat-card"><div class="stat-label">MRR</div><div class="stat-value tabular">${Util.fmtMoney(mrr)}</div></div>
      <div class="stat-card"><div class="stat-label">MARGEN</div><div class="stat-value">${margenPct}%</div></div>
    </div>
  `;

  // Próximos cobros
  if (proxCobros.length) {
    html += `<div class="section-eyebrow"><div class="label">próximos cobros · 7 días</div></div>`;
    html += `<div class="list-card">`;
    proxCobros.forEach(c => {
      const dias = Util.daysUntil(c.proximo_cobro);
      const label = dias === 0 ? 'hoy' : dias === 1 ? 'mañana' : `${dias} días`;
      html += `
        <div class="list-row">
          <div class="row-main">
            <div class="row-content">
              <div class="row-title">${Util.esc(c.nombre)}</div>
              <div class="row-sub">${label}</div>
            </div>
          </div>
          <div class="row-value">${Util.fmtMoneyK(c.monto || c.monto_mensual || 0)}</div>
        </div>
      `;
    });
    html += `</div>`;
  }

  // Últimos movimientos
  const recientes = movimientos.slice(-3).reverse();
  if (recientes.length) {
    html += `<div class="section-eyebrow"><div class="label">últimos movimientos</div></div>`;
    html += `<div class="list-card">`;
    recientes.forEach(m => {
      // Detección automática marihuana en concepto
      const conceptoLower = (m.concepto || '').toLowerCase();
      const esMota = (m.tags && m.tags.includes('marihuana')) || /marihuana|mota|mari|cannabis|kush|sativa|indica/i.test(conceptoLower);
      const esCafe = (m.tags && m.tags.includes('cafe')) || /café|cafe|starbucks|latte|americano/i.test(conceptoLower);

      let color, sign, rowStyle, iconHTML;
      if (esMota) {
        // Verde marihuana + flor
        color = 'rgba(120,200,80,1)';
        sign = m.tipo === 'ingreso' ? '+' : '−';
        rowStyle = 'background:rgba(120,200,80,0.06);border-left:2px solid rgba(120,200,80,0.5);';
        iconHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="margin-right:6px;flex-shrink:0;"><path d="M12 2c-1.5 4-1 8 0 10 1-2 1.5-6 0-10zm-7 8c2 1 4 3 5 5-3 0-5-1-6-3 0-1 0-1 1-2zm14 0c-2 1-4 3-5 5 3 0 5-1 6-3 0-1 0-1-1-2zM5 14c2-1 5 0 7 2-2 1-5 1-7-1zm14 0c-2-1-5 0-7 2 2 1 5 1 7-1zm-7 4c-1 2-1 4 0 5 1-1 1-3 0-5z" fill="rgba(120,200,80,1)"/></svg>';
      } else if (esCafe) {
        color = 'rgba(180,140,90,1)';
        sign = m.tipo === 'ingreso' ? '+' : '−';
        rowStyle = '';
        iconHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="margin-right:6px;flex-shrink:0;"><path d="M3 8h14v6a4 4 0 01-4 4H7a4 4 0 01-4-4V8zm14 2h2a2 2 0 010 4h-2M6 4v2M10 4v2M14 4v2" stroke="rgba(180,140,90,1)" stroke-width="1.5" fill="none"/></svg>';
      } else {
        color = m.tipo === 'ingreso' ? 'rgba(180,220,170,0.95)' : 'rgba(244,213,128,0.95)';
        sign = m.tipo === 'ingreso' ? '+' : '−';
        rowStyle = '';
        iconHTML = '';
      }

      html += `
        <div class="list-row" style="${rowStyle}">
          <div class="row-main">
            <div class="row-content" style="display:flex;align-items:center;">
              ${iconHTML}
              <div style="min-width:0;flex:1;">
                <div class="row-title" style="${esMota ? 'color:rgba(140,210,100,0.95);font-weight:500;' : ''}">${Util.esc(m.concepto)}</div>
                <div class="row-sub">${Util.fmtDate(m.ts, { short: true })} · ${Util.esc(m.categoria || '—')}${esMota ? ' · ocio' : ''}</div>
              </div>
            </div>
          </div>
          <div class="row-value" style="color:${color};">${sign}${Util.fmtMoney(m.monto)}</div>
        </div>
      `;
    });
    html += `</div>`;
  }

  // ============================================================
  // DECISIÓN FISCAL · CALCULADA CON DATA REAL
  // ============================================================
  const cfdis = Store.get('alan_mando_cfdis', []) || [];
  const movsFiscal = Store.get('alan_mando_movimientos', []) || [];

  const movsMesFiscal = movsFiscal.filter(m => m.ts >= inicioMes.getTime());
  const ingresosMesFiscal = movsMesFiscal.filter(m => m.tipo === 'ingreso').reduce((s, m) => s + (m.monto || 0), 0);
  const gastosBizMes = movsMesFiscal.filter(m => m.tipo === 'gasto' && m.categoria !== 'personal').reduce((s, m) => s + (m.monto || 0), 0);

  const ivaFacturado = ingresosMesFiscal * 0.16;
  const ivaAcreditable = gastosBizMes * 0.16;
  const cfdisMes = cfdis.filter(c => c.ts && c.ts >= inicioMes.getTime());
  const ivaCFDIsReal = cfdisMes.reduce((s, c) => s + (c.iva_traslado || 0), 0);
  const ivaAcred = ivaCFDIsReal > 0 ? ivaCFDIsReal : ivaAcreditable;
  const ivaPorPagar = Math.max(0, ivaFacturado - ivaAcred);

  const isrEstimado = (ingresosMesFiscal - gastosBizMes) * 0.30;

  let decisionTexto;
  if (ingresosMesFiscal === 0 && gastosBizMes === 0) {
    decisionTexto = `Sin movimientos del mes registrados aún. Carga ingresos y gastos para que calcule tu posición fiscal real.`;
  } else if (cfdisMes.length === 0 && gastosBizMes > 0) {
    decisionTexto = `Tienes ${Util.fmtMoneyK(gastosBizMes)} en gastos sin CFDI cargado · estás dejando ~${Util.fmtMoneyK(ivaAcreditable)} de IVA acreditable en la mesa. Sube CFDIs.`;
  } else if (ivaPorPagar > 5000) {
    decisionTexto = `IVA por pagar ${Util.fmtMoneyK(ivaPorPagar)} este mes (facturado ${Util.fmtMoneyK(ivaFacturado)} − acreditable ${Util.fmtMoneyK(ivaAcred)}). ISR estimado ${Util.fmtMoneyK(isrEstimado)}. Revisa CFDIs faltantes para reducir.`;
  } else {
    decisionTexto = `IVA balanceado este mes (${Util.fmtMoneyK(ivaPorPagar)} a pagar). ISR estimado ${Util.fmtMoneyK(isrEstimado)}. Posición fiscal sana.`;
  }

  // ============================================================
  // MANDO · PROYECCIÓN INTEGRADA CON DATOS REALES
  // (cobrosRec y pagosRec ya declarados arriba en líneas ~85-86)
  // ============================================================
  const objetivosProy = (Store.get(Store.KEYS.OBJETIVOS, []) || []).filter(o => !o.cumplido);
  const eventosProy = (Store.get(Store.KEYS.EVENTOS_MUSICA, []) || []).filter(e => e.tipo === 'tocada' && e.ts > Date.now());

  const mrrCalc = cobrosRec.reduce((s, c) => {
    const dias = (typeof Recurrentes !== 'undefined' && Recurrentes.FRECUENCIAS) ? (Recurrentes.FRECUENCIAS[c.frecuencia]?.dias || 30) : 30;
    return s + (c.monto * (30 / dias));
  }, 0);
  const egresosRecMes = pagosRec.reduce((s, p) => {
    const dias = (typeof Recurrentes !== 'undefined' && Recurrentes.FRECUENCIAS) ? (Recurrentes.FRECUENCIAS[p.frecuencia]?.dias || 30) : 30;
    return s + (p.monto * (30 / dias));
  }, 0);
  const ingresoMusicaProx90d = eventosProy.filter(e => e.ts <= Date.now() + 90*86400000).reduce((s, e) => s + (e.pago || 0), 0);

  const proyeccion90d = (mrrCalc * 3) + ingresoMusicaProx90d - (egresosRecMes * 3);
  const objetivoActivo = objetivosProy[0];

  let proyeccionTexto;
  if (cobrosRec.length === 0 && eventosProy.length === 0) {
    proyeccionTexto = `Sin cobros recurrentes ni tocadas registradas · agrega data para que cruce tu proyección real. Por ahora estoy ciego.`;
  } else if (objetivoActivo && objetivoActivo.target_monto) {
    const gap = objetivoActivo.target_monto - proyeccion90d;
    if (gap <= 0) {
      proyeccionTexto = `Cruce real 90d: MRR ${Util.fmtMoneyK(mrrCalc)} × 3 + tocadas ${Util.fmtMoneyK(ingresoMusicaProx90d)} − recurrentes ${Util.fmtMoneyK(egresosRecMes*3)} = ${Util.fmtMoneyK(proyeccion90d)}. Cubres "${objetivoActivo.nombre || objetivoActivo.titulo}" (${Util.fmtMoneyK(objetivoActivo.target_monto)}) con ${Util.fmtMoneyK(-gap)} de buffer.`;
    } else {
      proyeccionTexto = `Cruce real 90d: ${Util.fmtMoneyK(proyeccion90d)} contra objetivo "${objetivoActivo.nombre || objetivoActivo.titulo}" (${Util.fmtMoneyK(objetivoActivo.target_monto)}). Faltan ${Util.fmtMoneyK(gap)}. Necesitas 1 cliente más Plan Total o ${Math.ceil(gap/2500)} tocadas extra.`;
    }
  } else {
    proyeccionTexto = `Cruce real 90d: MRR ${Util.fmtMoneyK(mrrCalc)} × 3 + tocadas ${Util.fmtMoneyK(ingresoMusicaProx90d)} − pagos recurrentes ${Util.fmtMoneyK(egresosRecMes*3)} = ${Util.fmtMoneyK(proyeccion90d)} en flujo neto. ${cobrosRec.length} cobros activos · ${eventosProy.length} tocadas próximas.`;
  }

  // Decisión fiscal + proyección
  html += `
    <div style="background:rgba(244,243,239,0.025);border:0.5px solid rgba(255,79,0,0.18);border-radius:12px;padding:13px 15px;margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:7px;">
        <div style="width:3px;height:14px;background:#FF4F00;border-radius:1px;"></div>
        <div style="font-size:10px;color:rgba(255,150,80,0.95);letter-spacing:0.1em;text-transform:uppercase;font-weight:500;">decisión fiscal del mes · real</div>
      </div>
      <div style="font-size:12px;color:rgba(244,243,239,0.85);line-height:1.5;">${decisionTexto}</div>
    </div>

    <div style="background:rgba(120,200,220,0.04);border:0.5px solid rgba(120,200,220,0.2);border-radius:14px;padding:14px;margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:9px;">
        <div style="width:16px;height:16px;background:rgba(120,200,220,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;"><div style="width:5px;height:5px;background:rgba(150,210,230,1);transform:rotate(45deg);"></div></div>
        <div style="font-size:9px;color:rgba(150,210,230,0.95);letter-spacing:0.1em;text-transform:uppercase;font-weight:500;">Mando · proyección integrada · real</div>
      </div>
      <div style="font-size:13px;line-height:1.55;color:rgba(244,243,239,0.92);">${proyeccionTexto}</div>
    </div>
  `;

  return html;
}

// ============================================================
// TAB TRABAJO (clientes con flujo cobro adoptado)
// ============================================================
function renderTrabajo() {
  const clientes = Store.get(Store.KEYS.CLIENTES, []);
  const finanzas = Store.get(Store.KEYS.FINANZAS, {});

  const cobrado = clientes.filter(c => c.ultimo_pago && Util.daysSince(c.ultimo_pago) < 30).reduce((s, c) => s + (c.monto || c.monto_mensual || 0), 0);
  const porCobrar = clientes.filter(c => c.status === 'vencido' || c.status === 'vence_hoy').reduce((s, c) => s + (c.monto_pendiente || c.monto || c.monto_mensual || 0), 0);

  let html = `
    <div class="stat-grid cols-2">
      <div class="stat-card green"><div class="stat-label" style="color:rgba(180,220,170,0.85);">COBRADO MES</div><div class="stat-value tabular">${Util.fmtMoneyK(cobrado)}</div></div>
      <div class="stat-card alert"><div class="stat-label" style="color:rgba(255,150,80,0.95);">POR COBRAR</div><div class="stat-value tabular">${Util.fmtMoneyK(porCobrar)}</div></div>
    </div>
    <div class="section-eyebrow"><div class="label">clientes G2C · ${clientes.length} activos</div></div>
  `;

  if (!clientes.length) {
    html += `<div style="background:rgba(244,243,239,0.025);border:0.5px dashed rgba(244,243,239,0.15);border-radius:12px;padding:24px;text-align:center;">
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;">Sin clientes activos aún</div>
      <button class="btn primary-orange" onclick="agregarCliente()">+ Agregar cliente</button>
    </div>`;
    return html;
  }

  html += `<div style="display:flex;flex-direction:column;gap:7px;">`;
  clientes.forEach(c => {
    const status = c.status || 'al_dia';
    const isVencido = status === 'vencido';
    const isVenceHoy = status === 'vence_hoy';
    const isAlDia = status === 'al_dia';

    const cardClass = isVencido ? 'orange' : (isVenceHoy ? 'yellow' : 'green');
    const pillClass = isVencido ? 'orange' : (isVenceHoy ? 'yellow' : 'green');
    const pillText = isVencido ? `VENCIDO ${c.dias_vencido || 0}d` : (isVenceHoy ? 'VENCE HOY' : 'AL DÍA');
    const valueColor = isVencido ? 'rgba(255,170,110,0.95)' : '';

    html += `
      <div class="decision-card ${cardClass}" style="cursor:pointer;-webkit-tap-highlight-color:transparent;" onclick="abrirDetalleCliente('${c.id}', 'cliente')" data-clickable="true">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;">
          <div style="flex:1;">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
              <div style="font-size:12px;font-weight:500;">${Util.esc(c.nombre)}</div>
              <div class="pill ${pillClass}">${pillText}</div>
            </div>
            <div style="font-size:9px;color:rgba(244,243,239,0.55);">Plan ${Util.esc(c.tier || c.plan || '—')} · contrato ${c.contrato_meses || 12}m · LTV ${Util.fmtMoneyK((c.monto || c.monto_mensual || 0) * (c.contrato_meses || 12))}</div>
          </div>
          <div style="text-align:right;">

// MODAL · gasto a proveedor
// ============================================================
function agregarGastoProveedor() {
  const modal = document.createElement('div');
  modal.className = 'g2c-modal-backdrop active';
  modal.id = 'modal-gasto';

  const cats = Object.entries(Proveedores.CATEGORIAS).map(([k, v]) =>
    `<option value="${k}">${v}</option>`
  ).join('');

  modal.innerHTML = `
    <div class="g2c-modal" onclick="event.stopPropagation()">
      <div class="g2c-modal-handle"></div>
      <div class="g2c-modal-eyebrow"><div class="dot"></div><div class="label">Gasto del negocio</div></div>
      <div class="g2c-modal-title">Registrar a proveedor</div>

      <div class="form-field">
        <div class="field-label">PROVEEDOR</div>
        <input type="text" class="field-input" id="gasto-prov" placeholder="Ej: Netlify · Cloudflare · contador" style="font-size:16px !important;">
      </div>
      <div class="form-field">
        <div class="field-label">CATEGORÍA</div>
        <select class="field-select" id="gasto-cat" style="font-size:16px !important;">${cats}</select>
      </div>
      <div class="form-field">
        <div class="field-label">CONCEPTO</div>
        <input type="text" class="field-input" id="gasto-concepto" placeholder="Hosting mensual" style="font-size:16px !important;">
      </div>
      <div class="form-field">
        <div class="field-label">MONTO ($MXN)</div>
        <input type="number" class="field-input" id="gasto-monto" placeholder="0" style="font-size:16px !important;">
      </div>

      <div class="g2c-modal-actions">
        <button class="btn" onclick="cerrarModalGasto()">Cancelar</button>
        <button class="btn primary-orange" onclick="guardarGasto()">Registrar</button>
      </div>
    </div>
  `;
  modal.addEventListener('click', cerrarModalGasto);
  document.body.appendChild(modal);
  setTimeout(() => document.getElementById('gasto-prov')?.focus(), 100);
}

function cerrarModalGasto() {
  const m = document.getElementById('modal-gasto');
  if (m) m.remove();
}

function guardarGasto() {
  const proveedor = document.getElementById('gasto-prov').value.trim();
  const categoria = document.getElementById('gasto-cat').value;
  const concepto = document.getElementById('gasto-concepto').value.trim();
  const monto = parseFloat(document.getElementById('gasto-monto').value) || 0;

  if (!proveedor || !concepto || !monto) {
    UI.toast('Completa todos los campos', 'error');
    return;
  }

  Proveedores.registrarGasto({
    proveedor_nombre: proveedor,
    proveedor_id: 'prov_' + proveedor.toLowerCase().replace(/\s+/g, '_'),
    categoria,
    concepto,
    monto,
    fecha: Date.now()
  });

  UI.toast(`−${Util.fmtMoney(monto)} a ${proveedor} registrado`, 'success');
  cerrarModalGasto();
  renderTab('trabajo');
}

function bindTrabajoActions() {
  document.querySelectorAll('[data-action="marcar_pagado"]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.clienteId;
      const r = await Cascada.marcarPagado(id);
      if (r.ok) {
        UI.toast('Pago registrado · cascada disparada ✓', 'success');
        renderTab('trabajo');
      } else {
        UI.toast('Error: ' + (r.error || 'desconocido'), 'error');
      }
    });
  });
  document.querySelectorAll('[data-action="generar_liga"]').forEach(btn => {
    btn.addEventListener('click', () => {
      UI.toast('Liga generada · revisa cobros.g2c.com.mx', 'info');
    });
  });
  document.querySelectorAll('[data-action="whatsapp"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.clienteId;
      const c = Store.get(Store.KEYS.CLIENTES, []).find(x => x.id === id);
      if (c?.whatsapp) {
        window.open(`https://wa.me/${c.whatsapp}?text=${encodeURIComponent('Hola ' + c.nombre + ', te paso liga de pago para tu mensualidad.')}`);
      }
    });
  });
}

      <div style="background:rgba(244,243,239,0.02);border:0.5px dashed rgba(244,243,239,0.1);border-radius:11px;padding:18px;text-align:center;">
        <div style="font-size:11px;color:var(--text-tertiary);">Sin pagos recurrentes · agrega tus suscripciones (Netlify, Cloudflare, contador, etc.)</div>
      </div>
    `}
  `;

  // Sugerencias de auto-detección
  if (sugerencias.length) {
    html += `
      <div style="background:rgba(120,200,220,0.04);border:0.5px solid rgba(120,200,220,0.25);border-radius:12px;padding:13px;margin-top:14px;">
        <div style="font-size:9px;color:rgba(150,210,230,0.95);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-bottom:8px;">⚡ Mando detectó patrones</div>
        <div style="font-size:11px;color:var(--text-secondary);line-height:1.5;margin-bottom:10px;">Estos pagos parecen recurrentes · ¿quieres convertirlos en automáticos?</div>
        ${sugerencias.map(s => `
          <div style="background:rgba(244,243,239,0.03);border:0.5px solid var(--border-soft);border-radius:8px;padding:10px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;">
            <div style="flex:1;min-width:0;">
              <div style="font-size:11px;font-weight:500;">${Util.esc(s.proveedor)}</div>
              <div style="font-size:9px;color:var(--text-tertiary);margin-top:2px;">${s.ocurrencias} pagos · prom $${s.monto_promedio.toLocaleString()}</div>
            </div>
            <button onclick="convertirEnRecurrente('${Util.esc(s.proveedor).replace(/'/g, '&apos;')}', ${s.monto_promedio}, '${s.categoria || 'saas'}')" style="background:rgba(150,210,230,0.15);border:0.5px solid rgba(150,210,230,0.35);color:rgba(180,220,240,0.95);padding:6px 10px;border-radius:6px;font-size:10px;cursor:pointer;flex-shrink:0;">Convertir</button>
          </div>
        `).join('')}
      </div>
    `;
  }

  return html;
}

function abrirNuevoCobro() {

      <div class="g2c-modal-handle"></div>

        <input type="text" class="field-input" id="cob-concepto" placeholder="Ej: Plan Total · diciembre" style="font-size:16px !important;">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div class="form-field">
          <div class="field-label">MONTO ($)</div>
          <input type="number" class="field-input" id="cob-monto" placeholder="16000" style="font-size:16px !important;">

        <div class="form-field">
          <div class="field-label">PRIMER COBRO</div>
          <input type="date" class="field-input" id="cob-fecha" value="${new Date().toISOString().slice(0,10)}" style="font-size:16px !important;">

      </div>

      <div style="background:rgba(120,200,220,0.06);border:0.5px solid rgba(120,200,220,0.2);border-radius:8px;padding:9px 11px;font-size:10px;color:rgba(150,210,230,0.95);margin-top:10px;">
        Liga de cobro se genera automática en cobros.g2c.com.mx · Recordatorio 3 días antes de cada vencimiento.

  modal.addEventListener('click', cerrarModalCobroRecur);
  document.body.appendChild(modal);
  window._cobState = state;

  modal.querySelectorAll('[data-freq]').forEach(btn => {
    btn.addEventListener('click', () => {
      modal.querySelectorAll('[data-freq]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      window._cobState.frecuencia = btn.dataset.freq;
    });
  });

function cerrarModalCobroRecur() {
  const m = document.getElementById('modal-cobro-recur');
  if (m) m.remove();
  delete window._cobState;
}

function guardarCobroRecur() {
  const cliente = document.getElementById('cob-cliente').value.trim();
  const concepto = document.getElementById('cob-concepto').value.trim();
  const monto = parseFloat(document.getElementById('cob-monto').value) || 0;
  const fecha = document.getElementById('cob-fecha').value;

  if (!cliente || !concepto || !monto) return UI.toast('Completa todo', 'error');

  Recurrentes.crearCobro({
    cliente_nombre: cliente,
    concepto,
    monto,
    fecha_inicio: fecha ? new Date(fecha).getTime() : Date.now(),
    frecuencia: window._cobState?.frecuencia || 'mensual'
  });

  UI.toast('Cobro recurrente creado · liga lista', 'success');
  cerrarModalCobroRecur();
  renderTab('recurrentes');
}

function abrirDetalleCliente(refId, contexto = 'cobro') {
  // 1. Encontrar el cliente · puede venir por id de cobro recurrente o id de cliente directo
  let clienteNombre = '';
  let clienteObj = null;

  if (contexto === 'cobro') {
    const cobro = Recurrentes.cobros().find(x => x.id === refId);
    if (cobro) clienteNombre = cobro.cliente_nombre;
  }
  if (contexto === 'cliente') {
    const cli = Store.get(Store.KEYS.CLIENTES, []).find(x => x.id === refId);
    if (cli) { clienteObj = cli; clienteNombre = cli.nombre; }
  }
  if (!clienteNombre) {
    UI.toast('Cliente no encontrado', 'error');
    return;
  }

  // Si no encontramos por id, buscar por nombre
  if (!clienteObj) {
    const clientes = Store.get(Store.KEYS.CLIENTES, []);
    clienteObj = clientes.find(c => c.nombre.toLowerCase().includes(clienteNombre.toLowerCase())) ||
                 clientes.find(c => clienteNombre.toLowerCase().includes(c.nombre.toLowerCase()));
  }

  // 2. Cruzar TODA la data del cliente
  const lcase = clienteNombre.toLowerCase();
  const movs = Store.get('alan_mando_movimientos', [])
    .filter(m => (m.cliente_id && clienteObj && m.cliente_id === clienteObj.id) ||
                 (m.concepto && m.concepto.toLowerCase().includes(lcase)))
    .sort((a, b) => b.ts - a.ts);
  const cobrosRec = Recurrentes.cobros().filter(c => c.cliente_nombre.toLowerCase().includes(lcase));
  const ccCobrar = Store.get(Store.KEYS.CUENTAS_COBRAR || 'alan_mando_cuentas_cobrar', [])
    .filter(c => c.cliente && c.cliente.toLowerCase().includes(lcase));
  const pendientes = Store.get(Store.KEYS.PENDIENTES, [])
    .filter(p => !p.done && p.titulo && p.titulo.toLowerCase().includes(lcase));
  const objetivosVinculados = Store.get(Store.KEYS.OBJETIVOS, [])
    .filter(o => !o.completed && ((o.nombre || o.titulo || '').toLowerCase().includes(lcase) ||
                                   (o.descripcion || '').toLowerCase().includes(lcase)));

  // 3. Calcular métricas
  const totalIngresos = movs.filter(m => m.tipo === 'ingreso').reduce((s, m) => s + (m.monto || 0), 0);
  const totalCobrados = cobrosRec.reduce((s, c) => s + ((c.cobros_generados || 0) * c.monto), 0);
  const proximoCobro = cobrosRec.filter(c => c.activo).sort((a,b) => a.proximo_cobro - b.proximo_cobro)[0];
  const cobrosPendientes = ccCobrar.filter(c => !c.cobrado).reduce((s, c) => s + (c.monto || 0), 0);
  const lifetimeValue = totalIngresos + totalCobrados;

  // 4. Crear modal
  let backdrop = document.getElementById('cliente-modal-backdrop');
  if (backdrop) backdrop.remove();

  backdrop = document.createElement('div');
  backdrop.id = 'cliente-modal-backdrop';
  backdrop.style.cssText = `
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 9999; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  `;
  backdrop.onclick = (e) => { if (e.target === backdrop) cerrarModalCliente(); };

  const fmtFecha = (ts) => {
    if (!ts) return '—';
    const d = new Date(ts);
    return d.toLocaleDateString('es-MX', { day: 'numeric', month: 'short', year: 'numeric' });
  };

  const status = clienteObj?.status || 'activo';
  const plan = clienteObj?.plan || (cobrosRec[0] ? 'Visor' : '—');
  const monto = clienteObj?.monto || clienteObj?.monto_mensual || (cobrosRec[0]?.monto || 0);

  backdrop.innerHTML = `
    <div style="
      background: #0F1419;
      border-top: 0.5px solid rgba(244,243,239,0.1);
      border-radius: 18px 18px 0 0;
      max-width: 480px;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease-out;
    ">
      <!-- Header con nombre -->
      <div style="position: sticky; top: 0; background: #0F1419; padding: 16px 18px 12px; border-bottom: 0.5px solid rgba(244,243,239,0.06); z-index: 10;">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;">
          <div style="flex: 1; min-width: 0;">
            <div style="font-size: 9px; color: rgba(255,150,80,0.95); letter-spacing: 0.18em; text-transform: uppercase; font-weight: 500; margin-bottom: 2px;">cliente</div>
            <div style="font-size: 22px; font-weight: 500; line-height: 1.2; word-break: break-word;">${Util.esc(clienteNombre)}</div>
            <div style="font-size: 11px; color: var(--text-secondary); margin-top: 4px;">
              ${plan !== '—' ? `Plan ${Util.esc(plan)} · ` : ''}<span class="pill ${status === 'activo' ? 'green' : ''}" style="font-size: 9px;">${status.toUpperCase()}</span>
            </div>
          </div>
          <button onclick="cerrarModalCliente()" style="background: rgba(244,243,239,0.05); border: 0.5px solid var(--border-mid); color: var(--text-secondary); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px; flex-shrink: 0;">×</button>
        </div>
      </div>

      <div style="padding: 14px 18px 80px;">

        <!-- KPIs -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 14px;">
          <div class="stat-card green">
            <div class="stat-label" style="color:rgba(180,220,170,0.85);">LIFETIME VALUE</div>
            <div class="stat-value tabular">${Util.fmtMoneyK(lifetimeValue)}</div>
            <div class="stat-meta">${movs.length} movs históricos</div>
          </div>
          <div class="stat-card cyan">
            <div class="stat-label" style="color:rgba(150,210,230,0.95);">MRR ACTUAL</div>
            <div class="stat-value tabular">${monto > 0 ? Util.fmtMoneyK(monto) : '—'}</div>
            <div class="stat-meta">${cobrosRec.filter(c => c.activo).length} cobro${cobrosRec.length !== 1 ? 's' : ''} activo${cobrosRec.length !== 1 ? 's' : ''}</div>
          </div>
        </div>

        ${proximoCobro ? `
          <div style="background: rgba(255,79,0,0.06); border: 0.5px solid rgba(255,79,0,0.25); border-radius: 11px; padding: 12px; margin-bottom: 12px;">
            <div style="font-size: 9px; color: rgba(255,150,80,0.95); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; margin-bottom: 5px;">próximo cobro</div>
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <div>
                <div style="font-size: 13px; font-weight: 500;">${fmtFecha(proximoCobro.proximo_cobro)}</div>
                <div style="font-size: 10px; color: var(--text-secondary); margin-top: 2px;">${Util.esc(proximoCobro.concepto)}</div>
              </div>
              <div style="font-size: 16px; font-weight: 500; color: rgba(255,170,110,0.95); font-family: 'JetBrains Mono', monospace;">${Util.fmtMoney(proximoCobro.monto)}</div>
            </div>
          </div>
        ` : ''}

        ${cobrosPendientes > 0 ? `
          <div style="background: rgba(244,213,128,0.06); border: 0.5px solid rgba(244,213,128,0.25); border-radius: 11px; padding: 12px; margin-bottom: 12px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <div style="font-size: 12px; color: rgba(244,213,128,0.95); font-weight: 500;">⚠ Cobros pendientes</div>
              <div style="font-size: 14px; color: rgba(244,213,128,0.95); font-weight: 500;">${Util.fmtMoney(cobrosPendientes)}</div>
            </div>
            <div style="font-size: 10px; color: var(--text-secondary); margin-top: 4px;">${ccCobrar.filter(c => !c.cobrado).length} cuentas por cobrar abiertas</div>
          </div>
        ` : ''}

        <!-- Acciones rápidas -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 14px;">
          ${proximoCobro ? `<button onclick="ejecutarCobroAhora('${proximoCobro.id}'); cerrarModalCliente();" style="background: rgba(180,220,170,0.15); border: 0.5px solid rgba(180,220,170,0.35); color: rgba(200,230,200,0.95); padding: 11px; border-radius: 9px; font-size: 11px; font-weight: 500; cursor: pointer;">Marcar cobrado</button>` : ''}
          ${proximoCobro ? `<a href="${proximoCobro.cobro_link}" target="_blank" style="background: rgba(120,200,220,0.15); border: 0.5px solid rgba(120,200,220,0.35); color: rgba(180,220,240,0.95); padding: 11px; border-radius: 9px; font-size: 11px; font-weight: 500; cursor: pointer; text-decoration: none; text-align: center;">Liga cobro</a>` : ''}
          <button onclick="editarClienteFromModal('${Util.esc(clienteNombre)}')" style="background: rgba(244,243,239,0.04); border: 0.5px solid var(--border-mid); color: var(--text-primary); padding: 11px; border-radius: 9px; font-size: 11px; cursor: pointer; font-weight: 500;">Editar monto/plan</button>
          <button onclick="abrirChatCliente('${Util.esc(clienteNombre)}')" style="background: rgba(255,79,0,0.12); border: 0.5px solid rgba(255,79,0,0.3); color: rgba(255,170,110,0.95); padding: 11px; border-radius: 9px; font-size: 11px; cursor: pointer; font-weight: 500;">Preguntar a IA</button>
        </div>

        <!-- Historial movimientos -->
        ${movs.length ? `
          <div style="font-size: 9px; color: var(--text-tertiary); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; margin: 14px 0 8px;">historial · últimos ${Math.min(movs.length, 8)} movs</div>
          <div style="background: rgba(244,243,239,0.025); border: 0.5px solid var(--border-soft); border-radius: 11px; overflow: hidden;">
            ${movs.slice(0, 8).map((m, i) => `
              <div style="padding: 10px 12px; ${i < movs.slice(0,8).length - 1 ? 'border-bottom: 0.5px solid rgba(244,243,239,0.04);' : ''} display: flex; justify-content: space-between; align-items: center; gap: 10px;">
                <div style="flex: 1; min-width: 0;">
                  <div style="font-size: 11px; font-weight: 500;">${Util.esc(m.concepto || '—')}</div>
                  <div style="font-size: 9px; color: var(--text-tertiary); margin-top: 2px;">${fmtFecha(m.ts)} · ${m.categoria || 'general'}</div>
                </div>
                <div style="font-size: 12px; font-weight: 500; font-family: 'JetBrains Mono', monospace; color: ${m.tipo === 'ingreso' ? 'rgba(180,220,170,0.95)' : 'rgba(255,170,110,0.95)'};">
                  ${m.tipo === 'ingreso' ? '+' : '−'}${Util.fmtMoney(m.monto)}
                </div>
              </div>
            `).join('')}
          </div>
        ` : `
          <div style="background: rgba(244,243,239,0.02); border: 0.5px dashed rgba(244,243,239,0.1); border-radius: 11px; padding: 16px; text-align: center; margin-top: 12px;">
            <div style="font-size: 11px; color: var(--text-tertiary);">Sin movimientos registrados</div>
          </div>
        `}

        <!-- Pendientes vinculados -->
        ${pendientes.length ? `
          <div style="font-size: 9px; color: var(--text-tertiary); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; margin: 16px 0 8px;">pendientes con este cliente</div>
          <div style="background: rgba(244,213,128,0.04); border: 0.5px solid rgba(244,213,128,0.2); border-radius: 11px; padding: 10px;">
            ${pendientes.map(p => `
              <div style="font-size: 11px; color: var(--text-secondary); padding: 4px 0; line-height: 1.5;">· ${Util.esc(p.titulo)}${p.due_ts ? ` <span style="color: var(--text-tertiary); font-size: 9px;">(${fmtFecha(p.due_ts)})</span>` : ''}</div>
            `).join('')}
          </div>
        ` : ''}

        <!-- Objetivos -->
        ${objetivosVinculados.length ? `

  const monto = prompt(`Nuevo monto mensual para ${nombre}:`);

  const r = Actions.execute('editar_cliente', { id_o_nombre: nombre, monto: parseFloat(monto) });

  // Solo gastos personales del mes actual
  const personales = movs.filter(m =>
    m.tipo === 'gasto' &&
    m.ts >= inicioMes.getTime() &&
    ((m.categoria || '').toLowerCase().includes('personal') ||
     (m.categoria || '').toLowerCase().includes('comida') ||
     (m.categoria || '').toLowerCase().includes('cafeter') ||
     (m.categoria || '').toLowerCase().includes('gasol') ||

function renderMusica() {
  const eventos = Store.get(Store.KEYS.EVENTOS_MUSICA, []) || [];
  const movs = Store.get('alan_mando_movimientos', []) || [];
  const inicioMes = new Date(); inicioMes.setDate(1); inicioMes.setHours(0,0,0,0);
  const mesNombre = new Date().toLocaleDateString('es-MX', { month: 'long' });

  // Ingreso real del mes · solo tocadas pagadas/marcadas como pagada
  const tocadasMes = eventos.filter(e =>
    e.tipo === 'tocada' &&
    e.ts >= inicioMes.getTime() &&
    e.ts < Date.now() // ya pasó
  );
  const ingresoCobrado = tocadasMes.filter(t => t.pagada).reduce((s, t) => s + (t.pago || 0), 0);
  const ingresoPendiente = tocadasMes.filter(t => !t.pagada).reduce((s, t) => s + (t.pago || 0), 0);

  // Gastos categoría música del mes · ensayos, transporte, equipo
  const gastosMes = movs.filter(m =>
    m.tipo === 'gasto' &&
    m.ts >= inicioMes.getTime() &&
    ((m.categoria || '').toLowerCase().includes('musica') ||
     (m.categoria || '').toLowerCase().includes('música') ||
     (m.categoria || '').toLowerCase().includes('ensayo') ||
     (m.categoria || '').toLowerCase().includes('equipo'))
  ).reduce((s, m) => s + (m.monto || 0), 0);

  const utilidad = ingresoCobrado - gastosMes;

  // Próximas tocadas (incluye hoy adelante)
  const proxTocadas = eventos.filter(e => e.tipo === 'tocada' && e.ts > Date.now() - 86400000).sort((a, b) => a.ts - b.ts).slice(0, 5);
  const ingresoProyectado = proxTocadas.reduce((s, t) => s + (t.pago || 0), 0);

  let html = `
    <div class="stat-grid cols-2">
      <div class="stat-card green">
        <div class="stat-label" style="color:rgba(180,220,170,0.85);">COBRADO ${mesNombre.toUpperCase()}</div>
        <div class="stat-value tabular">${Util.fmtMoneyK(ingresoCobrado)}</div>
        <div class="stat-meta">${tocadasMes.filter(t => t.pagada).length} tocadas pagadas</div>
      </div>
      <div class="stat-card yellow" style="background:rgba(244,213,128,0.04);border-color:rgba(244,213,128,0.18);">
        <div class="stat-label" style="color:rgba(244,213,128,0.85);">POR COBRAR</div>
        <div class="stat-value tabular">${Util.fmtMoneyK(ingresoPendiente)}</div>
        <div class="stat-meta">${tocadasMes.filter(t => !t.pagada).length} tocadas pendientes</div>
      </div>
    </div>

    <div class="section-eyebrow"><div class="label">próximas tocadas · ${proxTocadas.length}</div></div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px;">
  `;

  if (proxTocadas.length === 0) {
    html += `<div style="background:rgba(244,243,239,0.025);border:0.5px dashed rgba(244,243,239,0.15);border-radius:11px;padding:18px;text-align:center;font-size:12px;color:var(--text-tertiary);">Sin tocadas próximas · agenda en módulo Música</div>`;
  } else {
    proxTocadas.forEach(t => {
      const cardClass = t.confirmada ? 'green' : 'yellow';
      const pillText = t.pagada ? 'PAGADO' : (t.confirmada ? 'CONFIRMADO' : 'TENTATIVO');
      const yaPaso = t.ts < Date.now();
      html += `
        <div class="decision-card ${cardClass}" style="padding:11px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
            <div>
              <div style="font-size:12px;font-weight:500;">${Util.esc(t.lugar || t.titulo || 'Tocada')} ${t.banda ? '· ' + Util.esc(t.banda) : ''}</div>
              <div style="font-size:9px;color:rgba(244,243,239,0.55);">${Util.fmtDate(t.ts, { short: true })} · ${Util.fmtTime(t.ts)}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:13px;font-weight:500;">${Util.fmtMoney(t.pago || 0)}</div>
              <div class="pill ${cardClass}" style="margin-top:2px;">${pillText}</div>
            </div>
          </div>
          ${yaPaso && !t.pagada ? `
            <button class="btn primary-green full" onclick="marcarTocadaPagada('${t.id}')" style="display:flex;align-items:center;justify-content:center;gap:5px;">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
              Marcar pagado
            </button>
          ` : ''}
        </div>
      `;
    });
  }
  html += `</div>`;

  html += `
    <div style="background:rgba(244,243,239,0.025);border:0.5px solid var(--border-soft);border-radius:11px;padding:12px;margin-bottom:10px;">
      <div style="font-size:9px;color:rgba(244,243,239,0.55);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-bottom:7px;">utilidad música ${mesNombre}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="font-size:10px;color:rgba(244,243,239,0.6);">${Util.fmtMoney(ingresoCobrado)} cobrado − ${Util.fmtMoney(gastosMes)} gasto</div>

      </div>
      ${ingresoProyectado > 0 ? `
        <div style="margin-top:8px;padding-top:8px;border-top:0.5px solid rgba(244,243,239,0.06);font-size:10px;color:rgba(244,243,239,0.55);line-height:1.4;">
          Proyectado próximas ${proxTocadas.length} tocadas: ${Util.fmtMoneyK(ingresoProyectado)}
        </div>
      ` : ''}
    </div>
  `;

  return html;
}

function marcarTocadaPagada(id) {
  const eventos = Store.get(Store.KEYS.EVENTOS_MUSICA, []);
  const t = eventos.find(e => e.id === id);
  if (!t) return;
  t.pagada = true;
  t.fecha_pago = Date.now();
  Store.set(Store.KEYS.EVENTOS_MUSICA, eventos);

  Cascada.registrarMovimiento({
    tipo: 'ingreso',
    monto: t.pago,
    concepto: `Tocada ${t.lugar} · ${t.banda}`,
    categoria: 'musica'
  });

  UI.toast('Pago tocada registrado · suma a objetivo tocadas', 'success');
  renderTab('musica');
}

function renderObjetivos() {
  const objetivos = Store.get(Store.KEYS.OBJETIVOS, []);

  if (!objetivos.length) {
    return `<div style="background:rgba(244,243,239,0.025);border:0.5px dashed rgba(244,243,239,0.15);border-radius:14px;padding:24px;text-align:center;">
      <div style="font-size:14px;font-weight:500;margin-bottom:6px;">Sin objetivos vivos</div>
      <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:14px;">Crea tu primer objetivo para que Mando los conecte con tus finanzas</div>
      <button class="btn primary-orange" onclick="crearObjetivo()">+ Crear objetivo</button>
    </div>`;
  }

  let html = `<div style="display:flex;flex-direction:column;gap:8px;">`;

  // Calcular MRR para mejorar el cruce
  const cobrosRec = (Store.get('alan_mando_cobros_recurrentes', []) || []).filter(c => c.activo);
  const mrrCalc = cobrosRec.reduce((s, c) => {
    const dias = (typeof Recurrentes !== 'undefined' && Recurrentes.FRECUENCIAS) ? (Recurrentes.FRECUENCIAS[c.frecuencia]?.dias || 30) : 30;
    return s + (c.monto * (30 / dias));
  }, 0);

  objetivos.forEach(o => {
    // CALCULA progreso REAL · NO usa o.progreso (siempre 0)
    const progreso = (typeof ObjetivosLink !== 'undefined' && ObjetivosLink.progresoCompleto)
      ? ObjetivosLink.progresoCompleto(o)
      : { monetario_pct: 0, tareas_pct: 0, tareas_completadas: 0, tareas_total: 0 };

    // El % "principal" en card inicial = el más alto entre monetario y tareas
    // (lo que ya empieza a moverse muestra al usuario que avanza)
    const pct = Math.max(progreso.monetario_pct || 0, progreso.tareas_pct || 0);

    const cardClass = pct >= 80 ? 'green' : (pct >= 50 ? 'cyan' : (pct >= 30 ? 'yellow' : 'orange'));
    const pctColor = pct >= 80 ? 'rgba(180,220,170,0.95)' : (pct >= 50 ? 'rgba(150,210,230,0.95)' : (pct >= 30 ? 'rgba(244,213,128,0.95)' : 'rgba(255,170,110,0.95)'));

    // Ritmo · si tiene target_monto y deadline, calcula requerido/mes
    let ritmoBlock = '';
    if (o.target_monto && o.deadline) {
      const mesesRestantes = Math.max(1, Math.ceil((o.deadline - Date.now()) / (30 * 86400000)));
      const acumulado = o.acumulado || 0;
      const faltante = Math.max(0, o.target_monto - acumulado);
      const requerido = faltante / mesesRestantes;
      const ritmoActual = mrrCalc; // proxy · MRR actual
      const desvio = ritmoActual - requerido;
      ritmoBlock = `
        <div style="display:flex;gap:6px;padding-top:7px;border-top:0.5px solid rgba(255,255,255,0.06);">
          <div style="flex:1;"><div style="font-size:8px;color:rgba(244,243,239,0.5);">RITMO ACTUAL</div><div style="font-size:10px;color:${pctColor};margin-top:1px;">${Util.fmtMoneyK(ritmoActual)}/mes</div></div>
          <div style="flex:1;"><div style="font-size:8px;color:rgba(244,243,239,0.5);">REQUERIDO</div><div style="font-size:10px;color:rgba(244,213,128,0.95);margin-top:1px;">${Util.fmtMoneyK(requerido)}/mes</div></div>
          <div style="flex:1;"><div style="font-size:8px;color:rgba(244,243,239,0.5);">DESVÍO</div><div style="font-size:10px;color:${desvio >= 0 ? 'rgba(180,220,170,0.95)' : 'rgba(255,170,110,0.95)'};margin-top:1px;">${desvio >= 0 ? '+' : ''}${Util.fmtMoneyK(desvio)}</div></div>
        </div>
      `;
    }

    html += `
      <div class="decision-card ${cardClass}" onclick="verDetalleObjetivo('${o.id}')" style="cursor:pointer;">
        <div style="display:flex;justify-content:space-between;margin-bottom:7px;">
          <div>
            <div style="font-size:12px;font-weight:500;">${Util.esc(o.nombre)}</div>
            <div style="font-size:9px;color:rgba(244,243,239,0.55);">${Util.esc(o.descripcion || '')}</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:14px;font-weight:500;color:${pctColor};">${pct}%</div>
            <div style="font-size:9px;color:rgba(244,243,239,0.5);">
              ${o.target_monto ? `${Util.fmtMoneyK(o.acumulado || 0)} / ${Util.fmtMoneyK(o.target_monto)}` : ''}
              ${progreso.tareas_total > 0 ? `· ${progreso.tareas_completadas}/${progreso.tareas_total} tareas` : ''}
            </div>
          </div>
        </div>
        <div style="height:6px;background:rgba(244,243,239,0.04);border-radius:3px;margin-bottom:9px;">
          <div style="height:100%;width:${pct}%;background:linear-gradient(90deg, ${pctColor.replace('0.95', '0.6')}, ${pctColor});border-radius:3px;transition:width 0.6s ease;"></div>
        </div>
        ${ritmoBlock}
        <div style="font-size:9px;color:rgba(244,243,239,0.4);text-align:center;margin-top:8px;padding-top:7px;border-top:0.5px solid rgba(255,255,255,0.04);">tap para ver tareas vinculadas →</div>
      </div>
    `;
  });

  // ===== MANDO CRUZA OBJETIVOS · datos reales =====
  const objActivos = objetivos.filter(o => !o.cumplido);
  let cruceTexto;
  if (objActivos.length === 0) {
    cruceTexto = 'Sin objetivos activos. Crea uno y cruzaré tu MRR + tocadas para decirte si vas en ritmo.';
  } else {
    const obj = objActivos[0];
    if (obj.target_monto && obj.deadline) {
      const mesesRest = Math.max(1, Math.ceil((obj.deadline - Date.now()) / (30 * 86400000)));
      const faltante = Math.max(0, obj.target_monto - (obj.acumulado || 0));
      const requerido = faltante / mesesRest;
      const desvio = mrrCalc - requerido;
      if (desvio >= 0) {
        cruceTexto = `"${obj.nombre}" requiere ${Util.fmtMoneyK(requerido)}/mes y tu MRR actual genera ${Util.fmtMoneyK(mrrCalc)}/mes. Vas con ${Util.fmtMoneyK(desvio)} de buffer · sostén ritmo.`;
      } else {
        cruceTexto = `"${obj.nombre}" requiere ${Util.fmtMoneyK(requerido)}/mes pero tu MRR genera ${Util.fmtMoneyK(mrrCalc)}/mes. Faltan ${Util.fmtMoneyK(-desvio)}/mes · cierra 1 cliente más Plan Total.`;
      }
    } else {
      const progObj = (typeof ObjetivosLink !== 'undefined' && ObjetivosLink.progresoCompleto) ? ObjetivosLink.progresoCompleto(obj) : { tareas_completadas: 0, tareas_total: 0 };
      cruceTexto = `"${obj.nombre}" lleva ${progObj.tareas_completadas}/${progObj.tareas_total} tareas. ${progObj.tareas_total === 0 ? 'Agrega tareas vinculadas para que mida progreso.' : `${progObj.tareas_total - progObj.tareas_completadas} tareas pendientes.`}`;
    }
  }

  html += `
    <div style="background:rgba(244,243,239,0.025);border:0.5px dashed rgba(244,243,239,0.15);border-radius:12px;padding:13px;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;" onclick="crearObjetivo()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 4v16m-8-8h16" stroke="rgba(244,243,239,0.6)" stroke-width="1.8" stroke-linecap="round"/></svg>
      <div style="font-size:11px;color:rgba(244,243,239,0.65);font-weight:500;">Crear nuevo objetivo</div>
    </div>
  </div>

  <div style="background:rgba(120,200,220,0.04);border:0.5px solid rgba(120,200,220,0.2);border-radius:12px;padding:12px;margin-top:12px;">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
      <div style="width:14px;height:14px;background:rgba(120,200,220,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;"><div style="width:4px;height:4px;background:rgba(150,210,230,1);transform:rotate(45deg);"></div></div>
      <div style="font-size:9px;color:rgba(150,210,230,0.95);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;">Mando · cruza objetivos · real</div>
    </div>
    <div style="font-size:11px;color:rgba(244,243,239,0.85);line-height:1.5;">${cruceTexto}</div>
  </div>
  `;

  return html;
}

function cerrarDetalleObjetivo() {

}

function toggleTarea(tareaId, objId) {
  const pendientes = Store.get(Store.KEYS.PENDIENTES, []);
  const t = pendientes.find(p => p.id === tareaId);
  if (t) {
    t.done = !t.done;
    if (t.done) t.completed_at = Date.now();
    Store.set(Store.KEYS.PENDIENTES, pendientes);
    cerrarDetalleObjetivo();
    setTimeout(() => verDetalleObjetivo(objId), 100);
  }
}

function crearTareaSugerida(objId, titulo) {
  const obj = Store.get(Store.KEYS.OBJETIVOS, []).find(o => o.id === objId);
  Store.push(Store.KEYS.PENDIENTES, {
    id: 'pend_' + Date.now(),
    titulo,
    prioridad: 'media',
    objetivo_id: objId,
    objetivo_nombre: obj?.nombre || '',
    due_ts: Date.now() + 7 * 86400000,
    fecha_creacion: Date.now(),
    done: false
  });
  UI.toast('Tarea vinculada al objetivo', 'success');
  cerrarDetalleObjetivo();
  setTimeout(() => verDetalleObjetivo(objId), 200);
}

function guardarVinculacion(objId) {
  const titulo = document.getElementById('vinc-titulo').value.trim();
  if (!titulo) return UI.toast('Falta título', 'error');

  const obj = Store.get(Store.KEYS.OBJETIVOS, []).find(o => o.id === objId);
  const state = window._vincState || { prioridad: 'media', dias: 7 };

  Store.push(Store.KEYS.PENDIENTES, {
    id: 'pend_' + Date.now(),
    titulo,
    prioridad: state.prioridad === 'critica' ? 'alta' : state.prioridad,
    urgente: state.dias <= 1 || state.prioridad === 'critica',
    importante: state.prioridad === 'alta' || state.prioridad === 'critica',
    objetivo_id: objId,
    objetivo_nombre: obj?.nombre || '',
    due_ts: Date.now() + state.dias * 86400000,
    fecha_creacion: Date.now(),
    done: false
  });

  UI.toast('Tarea vinculada al objetivo', 'success');
  cerrarVincular();
  setTimeout(() => verDetalleObjetivo(objId), 200);
}

function eliminarObjetivo(id) {
  if (!confirm('¿Eliminar este objetivo? Las tareas vinculadas no se borrarán.')) return;
  const objetivos = Store.get(Store.KEYS.OBJETIVOS, []);
  Store.set(Store.KEYS.OBJETIVOS, objetivos.filter(o => o.id !== id));
  UI.toast('Objetivo eliminado', 'info');
  cerrarDetalleObjetivo();
  renderTab('objetivos');
}

function cerrarModalClienteNuevo() {
  const m = document.getElementById('modal-cliente-nuevo');
  if (m) m.remove();
}

function guardarClienteNuevo() {
  const nombre = document.getElementById('cli-nombre').value.trim();
  const negocio = document.getElementById('cli-negocio').value.trim();
  const monto = parseFloat(document.getElementById('cli-monto').value) || 0;
  const email = document.getElementById('cli-email').value.trim();
  const whats = document.getElementById('cli-whats').value.trim();
  const tierBtn = document.querySelector('#cli-tier-grid .active');
  const tier = tierBtn ? tierBtn.dataset.tier : 'parcial';
  const planNombre = tier === 'visor' ? 'Visor' : tier === 'total' ? 'Total' : 'Parcial';

  if (!nombre) return UI.toast('Falta nombre del cliente', 'error');
  if (!negocio) return UI.toast('Falta nombre del negocio', 'error');
  if (!monto || monto <= 0) return UI.toast('Monto inválido', 'error');

  // Crear cliente
  const r = Actions.execute('crear_cliente', {
    nombre,
    negocio,
    plan: planNombre,
    monto,
    email,
    whatsapp: whats,
    status: 'activo'
  });

  if (!r.ok) return UI.toast(r.msg || 'Error creando cliente', 'error');

  // Auto-generar cobro recurrente mensual
  if (typeof Recurrentes !== 'undefined') {
    try {
      Recurrentes.crearCobro({
        cliente_nombre: negocio || nombre,
        concepto: `${planNombre} · ${negocio}`,
        monto,
        fecha_inicio: Date.now() + 30 * 86400000, // Siguiente cobro en 30 días
        frecuencia: 'mensual'
      });
    } catch (e) {
      console.warn('No se pudo crear cobro recurrente:', e);
    }
  }

  UI.toast(`Cliente "${negocio || nombre}" creado · cobro recurrente $${monto.toLocaleString()} activo`, 'success');
  cerrarModalClienteNuevo();
  renderTab(document.querySelector('.tab.active').dataset.tab);
}

/**
 * Calcula proyección anual cruzando todo el sistema:
 * - Cobros recurrentes (MRR clientes G2C)
 * - Tocadas agendadas (música)
 * - Pagos recurrentes (proveedores)
 * - Gastos personales promedio
 * - Movimientos históricos
 */
function calcularProyeccionAnual() {
  // INGRESOS
  let ingresos_anual = 0;
  const fuentes_ingreso = [];

  // 1. Cobros recurrentes activos
  const cobros = Recurrentes.cobros().filter(c => c.activo);
  cobros.forEach(c => {
    const dias = Recurrentes.FRECUENCIAS[c.frecuencia]?.dias || 30;
    const ciclos_anuales = 365 / dias;
    const anual = Math.round(c.monto * ciclos_anuales);
    ingresos_anual += anual;
    fuentes_ingreso.push({ nombre: `${c.cliente_nombre} · ${c.frecuencia}`, anual });
  });

  // 2. Tocadas agendadas + promedio de pagadas
  const eventos = Store.get(Store.KEYS.EVENTOS_MUSICA, []);
  const tocadas12m = eventos.filter(e => e.tipo === 'tocada');
  const tocadasIngreso = tocadas12m.reduce((s, t) => s + (t.monto || 0), 0);
  if (tocadasIngreso > 0) {
    // Si hay tocadas registradas, proyectamos basado en frecuencia histórica
    const ahora = Date.now();
    const tocadasUltimos90d = tocadas12m.filter(t => Math.abs(t.ts - ahora) < 90 * 86400000);
    const promedio_mensual = (tocadasUltimos90d.reduce((s, t) => s + (t.monto || 0), 0)) / 3 || tocadasIngreso / 12;
    const anual = Math.round(promedio_mensual * 12);
    ingresos_anual += anual;
    fuentes_ingreso.push({ nombre: 'Música · tocadas (proyectado)', anual });
  }

  // 3. Movimientos de ingreso no recurrentes (últimos 90d → proyección)
  const movs = Store.get('alan_mando_movimientos', []);
  const ahora = Date.now();
  const inicio90 = ahora - 90 * 86400000;
  const ingresosMovsRec = movs.filter(m => m.tipo === 'ingreso' && m.ts >= inicio90 && !m.cobro_recurrente_id);
  if (ingresosMovsRec.length) {
    const total90 = ingresosMovsRec.reduce((s, m) => s + (m.monto || 0), 0);
    const anual = Math.round((total90 / 3) * 12);
    if (anual > 0) {
      ingresos_anual += anual;
      fuentes_ingreso.push({ nombre: 'Otros ingresos (extrapolado)', anual });
    }
  }

  // EGRESOS
  let egresos_anual = 0;
  const categorias_egreso = [];

  // 1. Pagos recurrentes activos
  const pagos = Recurrentes.pagos().filter(p => p.activo);
  let pagosRecAnual = 0;
  pagos.forEach(p => {
    const dias = Recurrentes.FRECUENCIAS[p.frecuencia]?.dias || 30;
    const ciclos = 365 / dias;
    pagosRecAnual += Math.round(p.monto * ciclos);
  });
  if (pagosRecAnual > 0) {
    egresos_anual += pagosRecAnual;
    categorias_egreso.push({ nombre: `Pagos recurrentes · ${pagos.length} servicios`, anual: pagosRecAnual });
  }

  // 2. Gastos variables (últimos 90d → proyección)
  const gastosVarRec = movs.filter(m => m.tipo === 'gasto' && m.ts >= inicio90);
  const porCategoria = {};
  gastosVarRec.forEach(m => {
    const cat = m.categoria || 'sin_categoria';
    porCategoria[cat] = (porCategoria[cat] || 0) + (m.monto || 0);
  });
  Object.entries(porCategoria).forEach(([cat, total]) => {
    const anual = Math.round((total / 3) * 12);
    if (anual > 1000) {
      egresos_anual += anual;
      const label = cat.replace(/_/g, ' ').replace(/^./, c => c.toUpperCase());
      categorias_egreso.push({ nombre: label, anual });
    }
  });

  // 3. Presupuestos personales (mota, shopping, gaming)
  const presup = Presupuesto.get();
  if (presup.mota_semanal && !porCategoria.ocio_marihuana) {
    const anual = presup.mota_semanal * 52;
    egresos_anual += anual;
    categorias_egreso.push({ nombre: 'Marihuana (estimado por presupuesto)', anual });
  }
  if (presup.shopping_mensual && !porCategoria.ocio_shopping) {
    const anual = presup.shopping_mensual * 12;
    egresos_anual += anual;
    categorias_egreso.push({ nombre: 'Shopping (estimado por presupuesto)', anual });
  }

  // Ordenar
  fuentes_ingreso.sort((a, b) => b.anual - a.anual);
  categorias_egreso.sort((a, b) => b.anual - a.anual);

  // Utilidad
  const utilidad_anual = ingresos_anual - egresos_anual;
  const margen_pct = ingresos_anual > 0 ? Math.round((utilidad_anual / ingresos_anual) * 100) : 0;

  // Distribución mensual proyectada (12 meses)
  const meses = [];
  const hoy = new Date();
  for (let i = 0; i < 12; i++) {
    const fecha = new Date(hoy.getFullYear(), hoy.getMonth() + i, 1);
    meses.push({
      label: fecha.toLocaleDateString('es-MX', { month: 'short' }),
      ingresos: Math.round(ingresos_anual / 12),
      egresos: Math.round(egresos_anual / 12),
      utilidad: Math.round(utilidad_anual / 12)
    });
  }

  return {
    ingresos_anual,
    egresos_anual,
    utilidad_anual,
    margen_pct,
    fuentes_ingreso,
    categorias_egreso,
    meses,
    snapshot: { cobros: cobros.length, pagos: pagos.length, tocadas: tocadas12m.length, gastos_90d: gastosVarRec.length }
  };
}

/**
 * Gráfica mensual · barras dobles ingresos vs egresos por mes.
 */
function renderGraficaMensual(meses) {
  const max = Math.max(...meses.map(m => Math.max(m.ingresos, m.egresos)));
  const ancho = 100 / meses.length;

  const barras = meses.map((m, i) => {
    const altIng = max > 0 ? (m.ingresos / max) * 100 : 0;
    const altEgr = max > 0 ? (m.egresos / max) * 100 : 0;
    return `
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0;">
        <div style="display:flex;gap:2px;align-items:flex-end;height:80px;width:100%;justify-content:center;">
          <div style="width:38%;background:linear-gradient(to top, rgba(180,220,170,0.3), rgba(180,220,170,0.7));height:${altIng}%;border-radius:2px 2px 0 0;min-height:2px;"></div>
          <div style="width:38%;background:linear-gradient(to top, rgba(255,150,80,0.3), rgba(255,150,80,0.7));height:${altEgr}%;border-radius:2px 2px 0 0;min-height:2px;"></div>
        </div>
        <div style="font-size:8px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.05em;">${m.label}</div>
      </div>
    `;
  }).join('');

  return `
    <div style="background:rgba(244,243,239,0.025);border:0.5px solid var(--border-soft);border-radius:12px;padding:13px;margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;">
        <div style="font-size:9px;color:var(--text-tertiary);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;">proyección 12 meses</div>
        <div style="display:flex;gap:10px;font-size:9px;">
          <div style="display:flex;align-items:center;gap:4px;"><div style="width:8px;height:8px;background:rgba(180,220,170,0.7);border-radius:2px;"></div><span style="color:var(--text-tertiary);">ingresos</span></div>
          <div style="display:flex;align-items:center;gap:4px;"><div style="width:8px;height:8px;background:rgba(255,150,80,0.7);border-radius:2px;"></div><span style="color:var(--text-tertiary);">egresos</span></div>
        </div>
      </div>
      <div style="display:flex;gap:1px;align-items:flex-end;">${barras}</div>
    </div>
  `;
}

/**
 * Llama a la IA para que genere tips estratégicos basados en la proyección.
 */
async function cargarTipsIA() {
  const out = document.getElementById('tips-ia-output');
  if (!out) return;

  const proy = calcularProyeccionAnual();

  const prompt = `Soy Alan Davis, founder GO2CLOSE (G2C). Analiza mi proyección anual y dame 3 tips ESTRATÉGICOS y AGRESIVOS para mejorar.

DATOS REALES:
- Ingresos anuales proyectados: $${proy.ingresos_anual.toLocaleString()}
- Egresos anuales proyectados: $${proy.egresos_anual.toLocaleString()}
- Utilidad anual: $${proy.utilidad_anual.toLocaleString()} (${proy.margen_pct}% margen)
- ${proy.snapshot.cobros} cobros recurrentes activos
- ${proy.snapshot.pagos} pagos recurrentes activos
- ${proy.snapshot.tocadas} tocadas registradas

PRINCIPALES INGRESOS:
${proy.fuentes_ingreso.slice(0, 3).map(f => `- ${f.nombre}: $${f.anual.toLocaleString()}/año`).join('\n')}

PRINCIPALES EGRESOS:
${proy.categorias_egreso.slice(0, 3).map(c => `- ${c.nombre}: $${c.anual.toLocaleString()}/año`).join('\n')}

Responde SOLO con 3 tips en formato JSON:
[
  {"titulo": "...", "accion": "...", "impacto": "+$X o -$X anual"},
  {"titulo": "...", "accion": "...", "impacto": "..."},
  {"titulo": "...", "accion": "...", "impacto": "..."}
]
Sin texto extra, solo el JSON. Tips deben ser ESPECÍFICOS a mi data, no genéricos.`;

  try {
    const res = await IA.call({
      model: G2C.models.haiku,
      messages: [{ role: 'user', content: prompt }],
      max_tokens: 800,
      tone: 'work',
      scope: 'finanzas-proyeccion'
    });

    if (res.error) {
      out.innerHTML = `
        <div style="font-size:9px;color:rgba(150,210,230,0.95);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-bottom:8px;">tips estratégicos</div>
        <div style="font-size:11px;color:var(--text-tertiary);line-height:1.5;">No pude consultar al cerebro IA · revisa Configuración → Diagnóstico</div>
      `;
      return;
    }

    let tips = [];
    try {
      const text = res.content[0].text;
      const jsonMatch = text.match(/\[[\s\S]*\]/);
      if (jsonMatch) tips = JSON.parse(jsonMatch[0]);
    } catch (e) {
      tips = [];
    }

    if (!tips.length) {
      out.innerHTML = `
        <div style="font-size:9px;color:rgba(150,210,230,0.95);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-bottom:8px;">tips estratégicos</div>
        <div style="font-size:11px;color:var(--text-secondary);line-height:1.5;">${Util.esc(res.content[0].text || 'Sin tips disponibles')}</div>
      `;
      return;
    }

    out.innerHTML = `
      <div style="font-size:9px;color:rgba(150,210,230,0.95);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-bottom:10px;">⚡ ProactivIA · 3 movimientos clave</div>
      ${tips.map((t, i) => `
        <div style="background:rgba(244,243,239,0.025);border:0.5px solid var(--border-soft);border-radius:9px;padding:11px;margin-bottom:6px;">
          <div style="display:flex;align-items:flex-start;gap:9px;">
            <div style="width:20px;height:20px;background:rgba(150,210,230,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(180,220,240,0.95);font-weight:600;flex-shrink:0;">${i + 1}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:12px;font-weight:500;color:rgba(180,220,240,0.95);">${Util.esc(t.titulo || '')}</div>
              <div style="font-size:11px;color:var(--text-secondary);line-height:1.5;margin-top:4px;">${Util.esc(t.accion || '')}</div>
              ${t.impacto ? `<div style="font-size:10px;color:rgba(180,220,170,0.95);margin-top:6px;font-weight:500;font-family:'JetBrains Mono',monospace;">→ ${Util.esc(t.impacto)}</div>` : ''}
            </div>
          </div>
        </div>
      `).join('')}
    `;
  } catch (e) {
    out.innerHTML = `
      <div style="font-size:9px;color:rgba(150,210,230,0.95);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-bottom:8px;">tips estratégicos</div>
      <div style="font-size:11px;color:var(--text-tertiary);line-height:1.5;">Error: ${Util.esc(e.message)}</div>
    `;
  }
}

function calcularProyeccionMeta() {
  const meta = parseFloat(document.getElementById('proy-meta').value) || 0;
  const actual = parseFloat(document.getElementById('proy-actual').value) || 0;

  if (!meta) return UI.toast('Pon la meta primero', 'error');

  const r = Proyecciones.calcular(meta, { ahorroActual: actual });
  const out = document.getElementById('proy-meta-output');

  let html = '';
  if (!r.meses_a_meta || r.meses_a_meta < 0) {
    html += `
      <div style="background:rgba(255,79,0,0.08);border:0.5px solid rgba(255,79,0,0.3);border-radius:12px;padding:13px;margin-bottom:14px;">
        <div style="font-size:9px;color:rgba(255,150,80,0.95);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-bottom:6px;">no factible al ritmo actual</div>
        <div style="font-size:14px;color:rgba(255,170,110,0.95);font-weight:500;">Tus ingresos netos no permiten ahorrar para esta meta.</div>
        <div style="font-size:11px;color:var(--text-secondary);margin-top:6px;">Ingresos: ${Util.fmtMoney(r.ingreso_mensual_estimado)}/mes · Gastos: ${Util.fmtMoney(r.gastos_mensuales_estimado)}/mes</div>
      </div>
    `;
  } else {
    const fechaLabel = r.fecha_estimada ? new Date(r.fecha_estimada).toLocaleDateString('es-MX', { month: 'long', year: 'numeric' }) : '';
    html += `
      <div style="background:rgba(255,79,0,0.05);border:0.5px solid rgba(255,79,0,0.25);border-radius:12px;padding:13px;margin-bottom:14px;">
        <div style="font-size:9px;color:rgba(255,150,80,0.95);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-bottom:6px;">a este ritmo · llegas en</div>
        <div style="font-size:24px;color:rgba(255,170,110,0.95);font-weight:500;">${r.meses_a_meta} ${r.meses_a_meta === 1 ? 'mes' : 'meses'}</div>
        <div style="font-size:11px;color:var(--text-secondary);margin-top:2px;">Aprox: ${fechaLabel}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;padding-top:14px;border-top:0.5px solid rgba(255,79,0,0.15);">
          <div>
            <div style="font-size:9px;color:var(--text-tertiary);letter-spacing:0.05em;text-transform:uppercase;">ingreso/mes</div>
            <div style="font-size:13px;color:rgba(180,220,170,0.95);font-weight:500;margin-top:2px;">${Util.fmtMoney(r.ingreso_mensual_estimado)}</div>
          </div>
          <div>
            <div style="font-size:9px;color:var(--text-tertiary);letter-spacing:0.05em;text-transform:uppercase;">ahorro/mes</div>
            <div style="font-size:13px;color:rgba(150,210,230,0.95);font-weight:500;margin-top:2px;">${Util.fmtMoney(r.ahorro_mensual_disponible)}</div>
          </div>
        </div>
        ${r.tip ? `<div style="background:rgba(244,213,128,0.08);border:0.5px solid rgba(244,213,128,0.25);border-radius:8px;padding:10px;margin-top:12px;font-size:11px;color:rgba(244,213,128,0.95);">⚠ ${Util.esc(r.tip)}</div>` : ''}
      </div>
    `;

    if (r.escenarios && r.escenarios.length) {
      html += `<div class="section-eyebrow"><div><div class="label">escenarios para acelerar</div></div></div>`;
      r.escenarios.forEach(e => {
        html += `
          <div style="background:rgba(244,243,239,0.025);border:0.5px solid var(--border-soft);border-radius:11px;padding:11px;margin-bottom:5px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <div>
                <div style="font-size:12px;font-weight:500;">${Util.esc(e.nombre)}</div>
                <div style="font-size:10px;color:var(--text-tertiary);margin-top:2px;">+${Util.fmtMoney(e.delta_mensual)}/mes</div>
              </div>
              <div style="text-align:right;">
                <div style="font-size:13px;font-weight:500;color:rgba(180,220,170,0.95);">${e.meses_resultado} meses</div>
                <div style="font-size:9px;color:rgba(180,220,170,0.7);">ahorras ${e.ahorro_meses}m</div>
              </div>
            </div>
          </div>
        `;
      });
    }
  }

  out.innerHTML = html;
  out.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
