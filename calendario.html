<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0F1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mando">
<title>Calendario · Mando</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>

<div id="status-bar"></div>

<header class="module-header">
  <div class="module-eyebrow">
    <div class="dot"></div>
    <div class="label">Calendario · Secretario</div>
  </div>
  <div class="module-title" id="cal-title">Mayo</div>
  <div class="module-subtitle" id="cal-sub">cargando agenda...</div>
</header>

<div class="stat-grid cols-3" id="cal-stats">
  <div class="stat-card"><div class="stat-label" style="color:rgba(255,150,80,0.85);">COBROS</div><div class="stat-value" id="cal-stat-cobros">—</div></div>
  <div class="stat-card"><div class="stat-label" style="color:rgba(244,213,128,0.85);">PAGOS</div><div class="stat-value" id="cal-stat-pagos">—</div></div>
  <div class="stat-card"><div class="stat-label" style="color:rgba(150,210,230,0.85);">MÚSICA</div><div class="stat-value" id="cal-stat-musica">—</div></div>
</div>

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
  <div style="font-size:14px;font-weight:500;" id="cal-month-label">—</div>
  <div style="display:flex;gap:3px;">
    <div style="width:24px;height:24px;background:rgba(244,243,239,0.04);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;" onclick="cambiarMes(-1)">‹</div>
    <div style="width:24px;height:24px;background:rgba(244,243,239,0.04);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;" onclick="cambiarMes(1)">›</div>
  </div>
</div>

<div class="cal-grid">
  <div class="cal-weekdays">
    <div class="cal-weekday">D</div><div class="cal-weekday">L</div><div class="cal-weekday">M</div>
    <div class="cal-weekday">M</div><div class="cal-weekday">J</div><div class="cal-weekday">V</div><div class="cal-weekday">S</div>
  </div>
  <div class="cal-days" id="cal-days"></div>
</div>

<div class="cal-legend">
  <div class="cal-legend-item"><div class="legend-dot" style="background:rgba(255,150,80,1);"></div>cobro</div>
  <div class="cal-legend-item"><div class="legend-dot" style="background:rgba(244,213,128,1);"></div>pago</div>
  <div class="cal-legend-item"><div class="legend-dot" style="background:rgba(150,210,230,1);"></div>música</div>
  <div class="cal-legend-item"><div class="legend-dot" style="background:rgba(120,200,220,1);"></div>viaje</div>
  <div class="cal-legend-item"><div class="legend-dot" style="background:rgba(180,220,170,1);"></div>autoagenda</div>
</div>

<button id="autoagenda-btn" class="btn primary-orange full" style="margin:14px 0 8px;display:flex;align-items:center;justify-content:center;gap:7px;">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
    <path d="M3 12l2 2 4-4M3 18l2 2 4-4M13 6h8M13 12h8M13 18h8" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </svg>
  Validar autoagenda
</button>
<div id="autoagenda-panel"></div>

<div id="ia-suggestions"></div>

<div id="chat-input-host"></div>
<div id="footer-host"></div>
<div id="nav-host"></div>

<script src="shared.js"></script>
<script>
let mesActual = new Date().getMonth();
let anioActual = new Date().getFullYear();

(async function init() {
  if (!Auth.enforce()) return;
  document.getElementById('status-bar').innerHTML = UI.renderStatusBar();
  document.getElementById('footer-host').innerHTML = UI.renderFooter();
  document.getElementById('nav-host').innerHTML = UI.renderBottomNav('calendario');

  renderCalendario();
  document.getElementById('autoagenda-btn').addEventListener('click', mostrarAutoagenda);
})();

function mostrarAutoagenda() {
  const propuestas = Autoagenda.proponer();
  const panel = document.getElementById('autoagenda-panel');

  if (propuestas.length === 0) {
    panel.innerHTML = `
      <div style="background:rgba(180,220,170,0.06);border:0.5px solid rgba(180,220,170,0.25);border-radius:12px;padding:13px;margin-bottom:14px;">
        <div style="font-size:9px;color:rgba(180,220,170,0.95);letter-spacing:0.1em;text-transform:uppercase;font-weight:500;margin-bottom:5px;">autoagenda · sin propuestas</div>
        <div style="font-size:12px;color:var(--text-secondary);line-height:1.5;">No hay pendientes vencidos, alta prioridad sin agendar, ni pagos próximos. Tu agenda está al día.</div>
      </div>
    `;
    return;
  }

  // Agrupa por tipo
  const porTipo = {};
  propuestas.forEach(p => { porTipo[p.tipo] = porTipo[p.tipo] || []; porTipo[p.tipo].push(p); });

  const tipoLabel = {
    pendiente_vencido: { label: 'Pendientes vencidos', color: '#C56A6A' },
    pendiente_alta: { label: 'Prioridad alta', color: '#FF7A00' },
    pago_proximo: { label: 'Pagos próximos', color: '#D4A574' }
  };

  let html = `
    <div style="background:rgba(255,79,0,0.04);border:0.5px solid rgba(255,79,0,0.22);border-radius:14px;padding:14px;margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px;">
        <div>
          <div style="font-size:9px;color:rgba(255,170,110,0.95);letter-spacing:0.1em;text-transform:uppercase;font-weight:500;margin-bottom:3px;">autoagenda propuesta</div>
          <div style="font-size:14px;font-weight:500;">${propuestas.length} bloque${propuestas.length > 1 ? 's' : ''} sugerido${propuestas.length > 1 ? 's' : ''}</div>
          <div style="font-size:11px;color:var(--text-tertiary);margin-top:2px;">basado en pendientes alta + pagos del mes</div>
        </div>
        <button onclick="cerrarAutoagenda()" style="background:transparent;border:0;color:var(--text-tertiary);font-size:18px;cursor:pointer;">×</button>
      </div>
  `;

  Object.entries(porTipo).forEach(([tipo, items]) => {
    const meta = tipoLabel[tipo] || { label: tipo, color: '#FF7A00' };
    html += `
      <div style="margin-bottom:10px;">
        <div style="font-size:9px;color:${meta.color};letter-spacing:0.1em;text-transform:uppercase;font-weight:500;margin-bottom:5px;">${meta.label} · ${items.length}</div>
        ${items.map(p => `
          <div style="background:rgba(244,243,239,0.025);border:0.5px solid var(--border-soft);border-radius:9px;padding:9px 11px;margin-bottom:4px;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:9px;">
              <div style="flex:1;min-width:0;">
                <div style="font-size:11px;font-weight:500;line-height:1.3;">${Util.esc(p.titulo)}</div>
                <div style="font-size:9px;color:var(--text-tertiary);margin-top:2px;">${new Date(p.ts).toLocaleDateString('es-MX', { weekday: 'short', day: 'numeric', month: 'short' })} · ${new Date(p.ts).toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' })} · ${p.duracion_min} min</div>
              </div>
              <div style="font-size:9px;color:${meta.color};text-align:right;flex-shrink:0;">${Util.esc(p.razon)}</div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  });

  html += `
      <div style="display:flex;gap:6px;margin-top:11px;">
        <button onclick="cerrarAutoagenda()" class="btn" style="flex:1;font-size:11px;">Cancelar</button>
        <button onclick="aceptarAutoagenda()" class="btn primary-orange" style="flex:2;font-size:11px;">Aceptar ${propuestas.length} bloques</button>
      </div>
    </div>
  `;

  panel.innerHTML = html;
  panel.dataset.propuestas = JSON.stringify(propuestas);
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function aceptarAutoagenda() {
  const panel = document.getElementById('autoagenda-panel');
  const propuestas = JSON.parse(panel.dataset.propuestas || '[]');
  const agregados = Autoagenda.aceptarTodas(propuestas);
  UI.toast(`${agregados} bloques agregados al calendario`, 'success');
  panel.innerHTML = '';
  renderCalendario();
}

function cerrarAutoagenda() {
  document.getElementById('autoagenda-panel').innerHTML = '';
}

function cambiarMes(dir) {
  mesActual += dir;
  if (mesActual < 0) { mesActual = 11; anioActual--; }
  if (mesActual > 11) { mesActual = 0; anioActual++; }
  renderCalendario();
}

function renderCalendario() {
  const meses = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
  document.getElementById('cal-month-label').textContent = `${meses[mesActual].charAt(0).toUpperCase() + meses[mesActual].slice(1)} ${anioActual}`;
  document.getElementById('cal-title').textContent = `${meses[mesActual].charAt(0).toUpperCase() + meses[mesActual].slice(1)}`;

  const eventos = Store.get(Store.KEYS.CALENDARIO, []);
  const inicio = new Date(anioActual, mesActual, 1);
  const fin = new Date(anioActual, mesActual + 1, 0);
  const eventosMes = eventos.filter(e => {
    const d = new Date(e.ts);
    return d.getMonth() === mesActual && d.getFullYear() === anioActual;
  });

  document.getElementById('cal-sub').textContent = `${eventosMes.length} eventos · próx hueco: revisa días libres`;

  // Stats
  document.getElementById('cal-stat-cobros').textContent = eventosMes.filter(e => e.tipo === 'cobro').length;
  document.getElementById('cal-stat-pagos').textContent = eventosMes.filter(e => e.tipo === 'pago').length;
  document.getElementById('cal-stat-musica').textContent = eventosMes.filter(e => e.tipo === 'tocada' || e.tipo === 'ensayo').length;

  // Días
  const diasContainer = document.getElementById('cal-days');
  let html = '';
  const offsetInicio = inicio.getDay(); // 0 = domingo
  for (let i = 0; i < offsetInicio; i++) html += '<div class="cal-day empty"></div>';

  const ahora = new Date();
  for (let d = 1; d <= fin.getDate(); d++) {
    const fecha = new Date(anioActual, mesActual, d);
    const eventosDia = eventosMes.filter(e => new Date(e.ts).getDate() === d);
    const tipos = [...new Set(eventosDia.map(e => e.tipo))];

    let classes = 'cal-day';
    if (fecha.toDateString() === ahora.toDateString()) classes += ' today';
    if (tipos.includes('viaje')) classes += ' viaje';

    let dots = '';
    if (tipos.includes('cobro')) dots += '<div class="day-dot" style="background:rgba(255,150,80,1);"></div>';
    if (tipos.includes('pago')) dots += '<div class="day-dot" style="background:rgba(244,213,128,1);"></div>';
    if (tipos.includes('tocada') || tipos.includes('ensayo')) dots += '<div class="day-dot" style="background:rgba(150,210,230,1);"></div>';

    html += `<div class="${classes}" onclick="verDia(${d})"><div class="day-num">${d}</div><div class="day-dots">${dots}</div></div>`;
  }
  diasContainer.innerHTML = html;

  // IA sugiere bloques
  renderIASuggestions();
}

function verDia(d) {
  const fecha = new Date(anioActual, mesActual, d);
  const inicioDia = new Date(fecha); inicioDia.setHours(0,0,0,0);
  const finDia = inicioDia.getTime() + 86400000;

  // Recolecta eventos de TODAS las fuentes
  const calendario = Store.get(Store.KEYS.CALENDARIO, []) || [];
  const eventosMusica = Store.get(Store.KEYS.EVENTOS_MUSICA, []) || [];
  const cuentasCobrar = Store.get('alan_mando_cuentas_cobrar', []) || [];
  const cuentasPagar = Store.get('alan_mando_cuentas_pagar', []) || [];
  const cobrosRec = (Store.get('alan_mando_cobros_recurrentes', []) || []).filter(c => c.activo);
  const pagosRec = (Store.get('alan_mando_pagos_recurrentes', []) || []).filter(p => p.activo);
  const pendientes = (Store.get(Store.KEYS.PENDIENTES, []) || []).filter(p => !p.done);
  const objetivos = Store.get(Store.KEYS.OBJETIVOS, []) || [];

  const items = [];

  // Eventos calendario
  calendario.filter(e => e.ts >= inicioDia.getTime() && e.ts < finDia).forEach(e => {
    items.push({
      ts: e.ts,
      titulo: e.titulo || e.nombre || 'Evento',
      tipo: e.tipo || 'evento',
      color: e.tipo === 'viaje' ? '#7AC8DC' : e.tipo === 'pago' ? '#D4A574' : e.tipo === 'cobro' ? '#FF9650' : '#7AC68A',
      navUrl: 'calendario.html'
    });
  });

  // Música
  eventosMusica.filter(e => e.ts >= inicioDia.getTime() && e.ts < finDia).forEach(e => {
    items.push({
      ts: e.ts,
      titulo: `[${(e.tipo || 'tocada').toUpperCase()}] ${e.titulo || e.lugar || 'Música'}`,
      tipo: 'musica',
      monto: e.pago,
      color: '#7AC8DC',
      navUrl: 'musica.html?highlight=' + e.id
    });
  });

  // Cuentas por cobrar
  cuentasCobrar.filter(c => !c.cobrado && c.fecha_esperada >= inicioDia.getTime() && c.fecha_esperada < finDia).forEach(c => {
    items.push({
      ts: c.fecha_esperada,
      titulo: `[COBRO] ${c.cliente_nombre || c.cliente || 'Cliente'} · ${c.concepto || ''}`,
      tipo: 'cobro',
      monto: c.monto,
      color: '#FF9650',
      navUrl: 'finanzas.html?highlight=' + c.id
    });
  });

  // Cobros recurrentes
  cobrosRec.filter(c => c.proximo_cobro >= inicioDia.getTime() && c.proximo_cobro < finDia).forEach(c => {
    items.push({
      ts: c.proximo_cobro,
      titulo: `[REC COBRO] ${c.cliente_nombre} · ${c.concepto || c.frecuencia}`,
      tipo: 'cobro_rec',
      monto: c.monto,
      color: '#7AC68A',
      navUrl: 'finanzas.html?tab=recurrentes&highlight=' + c.id
    });
  });

  // Cuentas por pagar
  cuentasPagar.filter(p => !p.pagado && p.fecha >= inicioDia.getTime() && p.fecha < finDia).forEach(p => {
    items.push({
      ts: p.fecha,
      titulo: `[PAGO] ${p.proveedor_nombre || p.proveedor || ''} · ${p.concepto || ''}`,
      tipo: 'pago',
      monto: p.monto,
      color: '#D4A574',
      navUrl: 'finanzas.html?highlight=' + p.id
    });
  });

  // Pagos recurrentes
  pagosRec.filter(p => p.proximo_pago >= inicioDia.getTime() && p.proximo_pago < finDia).forEach(p => {
    items.push({
      ts: p.proximo_pago,
      titulo: `[REC PAGO] ${p.proveedor_nombre || p.concepto}`,
      tipo: 'pago_rec',
      monto: p.monto,
      color: '#D4A574',
      navUrl: 'finanzas.html?tab=recurrentes&highlight=' + p.id
    });
  });

  // Pendientes con fecha límite
  pendientes.filter(p => p.fecha_limite && p.fecha_limite >= inicioDia.getTime() && p.fecha_limite < finDia).forEach(p => {
    items.push({
      ts: p.fecha_limite,
      titulo: `[PENDIENTE] ${p.titulo || p.descripcion}`,
      tipo: 'pendiente',
      color: p.prioridad === 'alta' ? '#C56A6A' : '#FFB060',
      navUrl: 'pendientes.html?highlight=' + p.id
    });
  });

  // Objetivos con deadline
  objetivos.filter(o => !o.cumplido && o.deadline && o.deadline >= inicioDia.getTime() && o.deadline < finDia).forEach(o => {
    items.push({
      ts: o.deadline,
      titulo: `[OBJETIVO DEADLINE] ${o.nombre || o.titulo}`,
      tipo: 'objetivo',
      color: '#FF7A00',
      navUrl: 'finanzas.html?tab=objetivos&highlight=' + o.id
    });
  });

  items.sort((a, b) => a.ts - b.ts);

  // Renderizar modal
  let backdrop = document.getElementById('dia-modal-backdrop');
  if (backdrop) backdrop.remove();

  backdrop = document.createElement('div');
  backdrop.id = 'dia-modal-backdrop';
  backdrop.style.cssText = `
    position:fixed; inset:0; background:rgba(0,0,0,0.75);
    display:flex; align-items:flex-end; justify-content:center;
    z-index:9999; backdrop-filter:blur(8px);
  `;
  backdrop.onclick = (e) => { if (e.target === backdrop) backdrop.remove(); };

  const fechaLabel = fecha.toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  backdrop.innerHTML = `
    <div style="background:#0F1419;border-top:0.5px solid rgba(244,243,239,0.1);border-radius:18px 18px 0 0;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;padding:18px 16px calc(20px + env(safe-area-inset-bottom));">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:13px;">
        <div>
          <div style="font-size:9px;color:rgba(255,150,80,0.95);letter-spacing:0.14em;text-transform:uppercase;font-weight:500;">DETALLE DEL DÍA</div>
          <div style="font-size:18px;font-weight:500;text-transform:capitalize;margin-top:2px;">${fechaLabel}</div>
          <div style="font-size:11px;color:var(--text-tertiary);margin-top:2px;">${items.length} ${items.length === 1 ? 'evento' : 'eventos'}</div>
        </div>
        <button onclick="document.getElementById('dia-modal-backdrop').remove();" style="background:transparent;border:0;color:var(--text-tertiary);font-size:22px;cursor:pointer;padding:0;line-height:1;">×</button>
      </div>

      ${items.length === 0 ? `
        <div style="text-align:center;padding:30px 16px;color:var(--text-tertiary);font-size:12px;">
          Sin eventos agendados en este día
        </div>
      ` : `
        <div style="display:flex;flex-direction:column;gap:6px;">
          ${items.map((it, i) => `
            <div onclick="navegarA('${it.navUrl}')" style="background:linear-gradient(135deg,${it.color}10,${it.color}02);border:0.5px solid ${it.color}33;border-radius:11px;padding:11px 13px;cursor:pointer;-webkit-tap-highlight-color:transparent;display:flex;justify-content:space-between;align-items:flex-start;gap:11px;">
              <div style="flex:1;min-width:0;">
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
                  <div style="width:5px;height:5px;background:${it.color};border-radius:50%;"></div>
                  <div style="font-size:9px;color:${it.color};letter-spacing:0.1em;text-transform:uppercase;font-weight:500;">${new Date(it.ts).toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' })}</div>
                </div>
                <div style="font-size:12px;font-weight:500;line-height:1.3;">${Util.esc(it.titulo)}</div>
                ${it.monto ? `<div style="font-size:10px;color:rgba(244,243,239,0.55);margin-top:3px;font-variant-numeric:tabular-nums;">${Util.fmtMoney(it.monto)}</div>` : ''}
              </div>
              <div style="font-size:14px;color:${it.color};flex-shrink:0;">→</div>
            </div>
          `).join('')}
        </div>
      `}
    </div>
  `;

  document.body.appendChild(backdrop);
}

function navegarA(url) {
  document.getElementById('dia-modal-backdrop')?.remove();
  location.href = url;
}

async function renderIASuggestions() {
  const container = document.getElementById('ia-suggestions');
  const eventos = Store.get(Store.KEYS.CALENDARIO, []);
  const proxTocada = (Store.get(Store.KEYS.EVENTOS_MUSICA, []) || []).filter(e => e.tipo === 'tocada' && e.ts > Date.now()).sort((a, b) => a.ts - b.ts)[0];

  if (proxTocada && Util.daysUntil(proxTocada.ts) <= 7) {
    const tieneEnsayo = eventos.some(e => e.tipo === 'ensayo' && e.ts > Date.now() && e.ts < proxTocada.ts);
    if (!tieneEnsayo) {
      container.innerHTML = `
        <div style="background:rgba(120,200,220,0.04);border:0.5px solid rgba(120,200,220,0.2);border-radius:11px;padding:11px;">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">
            <div style="width:14px;height:14px;background:rgba(120,200,220,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;"><div style="width:4px;height:4px;background:rgba(150,210,230,1);transform:rotate(45deg);"></div></div>
            <div style="font-size:9px;color:rgba(150,210,230,0.95);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;">Mando</div>
          </div>
          <div style="font-size:11px;color:rgba(244,243,239,0.85);line-height:1.45;">Tocada en ${Util.daysUntil(proxTocada.ts)} días sin ensayo agendado. ¿Bloqueo el martes 7pm?</div>
          <button class="btn primary-cyan full" style="margin-top:8px;" onclick="agendarEnsayo()">Agendar ensayo</button>
        </div>
      `;
    }
  }
}

function agendarEnsayo() {
  UI.toast('Form de ensayo · próx versión', 'info');
}
</script>
</body>
</html>
