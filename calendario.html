<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0F1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mando">
<title>Calendario · Mando</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>

<div id="status-bar"></div>

<header class="module-header">
  <div class="module-eyebrow">
    <div class="dot"></div>
    <div class="label">Calendario · Secretario</div>
  </div>
  <div class="module-title" id="cal-title">Mayo</div>
  <div class="module-subtitle" id="cal-sub">cargando agenda...</div>
</header>

<div class="stat-grid cols-3" id="cal-stats">
  <div class="stat-card"><div class="stat-label" style="color:rgba(255,150,80,0.85);">COBROS</div><div class="stat-value" id="cal-stat-cobros">—</div></div>
  <div class="stat-card"><div class="stat-label" style="color:rgba(244,213,128,0.85);">PAGOS</div><div class="stat-value" id="cal-stat-pagos">—</div></div>
  <div class="stat-card"><div class="stat-label" style="color:rgba(150,210,230,0.85);">MÚSICA</div><div class="stat-value" id="cal-stat-musica">—</div></div>
</div>

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
  <div style="font-size:14px;font-weight:500;" id="cal-month-label">—</div>
  <div style="display:flex;gap:3px;">
    <div style="width:24px;height:24px;background:rgba(244,243,239,0.04);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;" onclick="cambiarMes(-1)">‹</div>
    <div style="width:24px;height:24px;background:rgba(244,243,239,0.04);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;" onclick="cambiarMes(1)">›</div>
  </div>
</div>

<div class="cal-grid">
  <div class="cal-weekdays">
    <div class="cal-weekday">D</div><div class="cal-weekday">L</div><div class="cal-weekday">M</div>
    <div class="cal-weekday">M</div><div class="cal-weekday">J</div><div class="cal-weekday">V</div><div class="cal-weekday">S</div>
  </div>
  <div class="cal-days" id="cal-days"></div>
</div>

<div class="cal-legend">
  <div class="cal-legend-item"><div class="legend-dot" style="background:rgba(255,150,80,1);"></div>cobro</div>
  <div class="cal-legend-item"><div class="legend-dot" style="background:rgba(244,213,128,1);"></div>pago</div>
  <div class="cal-legend-item"><div class="legend-dot" style="background:rgba(150,210,230,1);"></div>música</div>
  <div class="cal-legend-item"><div class="legend-dot" style="background:rgba(120,200,220,1);"></div>viaje</div>
</div>

<div id="ia-suggestions"></div>

<div id="chat-input-host"></div>
<div id="footer-host"></div>
<div id="nav-host"></div>

<script src="shared.js"></script>
<script>
let mesActual = new Date().getMonth();
let anioActual = new Date().getFullYear();

(async function init() {
  if (!Auth.enforce()) return;
  document.getElementById('status-bar').innerHTML = UI.renderStatusBar();
  document.getElementById('chat-input-host').innerHTML = UI.renderChatInput('Pregunta sobre tu agenda...');
  document.getElementById('footer-host').innerHTML = UI.renderFooter();
  document.getElementById('nav-host').innerHTML = UI.renderBottomNav('calendario');

  renderCalendario();
  UI.bindChatInput(t => location.href = 'chat.html?msg=' + encodeURIComponent(t) + '&scope=calendario');
})();

function cambiarMes(dir) {
  mesActual += dir;
  if (mesActual < 0) { mesActual = 11; anioActual--; }
  if (mesActual > 11) { mesActual = 0; anioActual++; }
  renderCalendario();
}

function renderCalendario() {
  const meses = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
  document.getElementById('cal-month-label').textContent = `${meses[mesActual].charAt(0).toUpperCase() + meses[mesActual].slice(1)} ${anioActual}`;
  document.getElementById('cal-title').textContent = `${meses[mesActual].charAt(0).toUpperCase() + meses[mesActual].slice(1)}`;

  const eventos = Store.get(Store.KEYS.CALENDARIO, []);
  const inicio = new Date(anioActual, mesActual, 1);
  const fin = new Date(anioActual, mesActual + 1, 0);
  const eventosMes = eventos.filter(e => {
    const d = new Date(e.ts);
    return d.getMonth() === mesActual && d.getFullYear() === anioActual;
  });

  document.getElementById('cal-sub').textContent = `${eventosMes.length} eventos · próx hueco: revisa días libres`;

  // Stats
  document.getElementById('cal-stat-cobros').textContent = eventosMes.filter(e => e.tipo === 'cobro').length;
  document.getElementById('cal-stat-pagos').textContent = eventosMes.filter(e => e.tipo === 'pago').length;
  document.getElementById('cal-stat-musica').textContent = eventosMes.filter(e => e.tipo === 'tocada' || e.tipo === 'ensayo').length;

  // Días
  const diasContainer = document.getElementById('cal-days');
  let html = '';
  const offsetInicio = inicio.getDay(); // 0 = domingo
  for (let i = 0; i < offsetInicio; i++) html += '<div class="cal-day empty"></div>';

  const ahora = new Date();
  for (let d = 1; d <= fin.getDate(); d++) {
    const fecha = new Date(anioActual, mesActual, d);
    const eventosDia = eventosMes.filter(e => new Date(e.ts).getDate() === d);
    const tipos = [...new Set(eventosDia.map(e => e.tipo))];

    let classes = 'cal-day';
    if (fecha.toDateString() === ahora.toDateString()) classes += ' today';
    if (tipos.includes('viaje')) classes += ' viaje';

    let dots = '';
    if (tipos.includes('cobro')) dots += '<div class="day-dot" style="background:rgba(255,150,80,1);"></div>';
    if (tipos.includes('pago')) dots += '<div class="day-dot" style="background:rgba(244,213,128,1);"></div>';
    if (tipos.includes('tocada') || tipos.includes('ensayo')) dots += '<div class="day-dot" style="background:rgba(150,210,230,1);"></div>';

    html += `<div class="${classes}" onclick="verDia(${d})"><div class="day-num">${d}</div><div class="day-dots">${dots}</div></div>`;
  }
  diasContainer.innerHTML = html;

  // IA sugiere bloques
  renderIASuggestions();
}

function verDia(d) {
  UI.toast(`Día ${d} ${anioActual}-${mesActual + 1} · próx versión muestra detalle`, 'info');
}

async function renderIASuggestions() {
  const container = document.getElementById('ia-suggestions');
  const eventos = Store.get(Store.KEYS.CALENDARIO, []);
  const proxTocada = (Store.get(Store.KEYS.EVENTOS_MUSICA, []) || []).filter(e => e.tipo === 'tocada' && e.ts > Date.now()).sort((a, b) => a.ts - b.ts)[0];

  if (proxTocada && Util.daysUntil(proxTocada.ts) <= 7) {
    const tieneEnsayo = eventos.some(e => e.tipo === 'ensayo' && e.ts > Date.now() && e.ts < proxTocada.ts);
    if (!tieneEnsayo) {
      container.innerHTML = `
        <div style="background:rgba(120,200,220,0.04);border:0.5px solid rgba(120,200,220,0.2);border-radius:11px;padding:11px;">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">
            <div style="width:14px;height:14px;background:rgba(120,200,220,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;"><div style="width:4px;height:4px;background:rgba(150,210,230,1);transform:rotate(45deg);"></div></div>
            <div style="font-size:9px;color:rgba(150,210,230,0.95);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;">Mando</div>
          </div>
          <div style="font-size:11px;color:rgba(244,243,239,0.85);line-height:1.45;">Tocada en ${Util.daysUntil(proxTocada.ts)} días sin ensayo agendado. ¿Bloqueo el martes 7pm?</div>
          <button class="btn primary-cyan full" style="margin-top:8px;" onclick="agendarEnsayo()">Agendar ensayo</button>
        </div>
      `;
    }
  }
}

function agendarEnsayo() {
  UI.toast('Form de ensayo · próx versión', 'info');
}
</script>
</body>
</html>
