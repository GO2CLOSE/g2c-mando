<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0F1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mando">
<title>Pendientes · Mando</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>

<div id="status-bar"></div>

<header class="module-header">
  <div class="module-eyebrow">
    <div class="dot"></div>
    <div class="label">Pendientes · jefe de proyecto</div>
  </div>
  <div class="module-title">Foco del día</div>
  <div class="module-subtitle" id="pend-sub">cargando...</div>
</header>

<!-- Stats -->
<div class="stat-grid cols-3" id="pend-stats">
  <div class="stat-card alert"><div class="stat-label" style="color:rgba(255,150,80,0.95);">URGENTES</div><div class="stat-value" id="stat-urgentes">—</div></div>
  <div class="stat-card cyan"><div class="stat-label" style="color:rgba(150,210,230,0.85);">EN CURSO</div><div class="stat-value" id="stat-curso">—</div></div>
  <div class="stat-card green"><div class="stat-label" style="color:rgba(180,220,170,0.85);">HECHAS HOY</div><div class="stat-value" id="stat-hechas">—</div></div>
</div>

<!-- Tab bar de vistas -->
<div class="tab-bar">
  <div class="tab active" data-vista="hoy">Hoy</div>
  <div class="tab" data-vista="recordatorios">Recordatorios</div>
  <div class="tab" data-vista="eisenhower">Eisenhower</div>
  <div class="tab" data-vista="todos">Todos</div>
  <div class="tab" data-vista="patron">Patrones</div>
</div>

<div id="vista-content"></div>

<button class="btn primary-orange full" style="margin-top:12px;" onclick="agregarPendiente()">+ Nuevo pendiente</button>

<div id="chat-input-host"></div>
<div id="footer-host"></div>
<div id="nav-host"></div>

<script src="shared.js"></script>
<script>
(async function init() {
  if (!Auth.enforce()) return;
  document.getElementById('status-bar').innerHTML = UI.renderStatusBar();
  document.getElementById('chat-input-host').innerHTML = UI.renderChatInput('Agrega o pregunta sobre pendientes...');
  document.getElementById('footer-host').innerHTML = UI.renderFooter();
  document.getElementById('nav-host').innerHTML = UI.renderBottomNav('pendientes');

  document.querySelectorAll('[data-vista]').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('[data-vista]').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      renderVista(t.dataset.vista);
    });
  });

  renderStats();
  renderVista('hoy');

  UI.bindChatInput(handleChat);
})();

function renderStats() {
  const pend = Store.get(Store.KEYS.PENDIENTES, []);
  const hoy = new Date(); hoy.setHours(0, 0, 0, 0);

  const urgentes = pend.filter(p => !p.done && p.prioridad === 'alta');
  const curso = pend.filter(p => !p.done && p.prioridad !== 'alta');
  const hechas = pend.filter(p => p.done && p.fecha_completado >= hoy.getTime());

  document.getElementById('stat-urgentes').textContent = urgentes.length;
  document.getElementById('stat-curso').textContent = curso.length;
  document.getElementById('stat-hechas').textContent = hechas.length;

  const tot = pend.filter(p => !p.done).length;
  document.getElementById('pend-sub').textContent = `${tot} abiertas · ${urgentes.length} alta prioridad`;
}

function renderVista(v) {
  const c = document.getElementById('vista-content');
  switch (v) {
    case 'hoy': c.innerHTML = renderHoy(); bindActions(); break;
    case 'recordatorios': c.innerHTML = renderRecordatoriosTab(); bindActions(); break;
    case 'eisenhower': c.innerHTML = renderEisenhower(); bindActions(); break;
    case 'todos': c.innerHTML = renderTodos(); bindActions(); break;
    case 'patron': renderPatronesAsync(c); break;
  }
}

function renderHoy() {
  const pend = Store.get(Store.KEYS.PENDIENTES, []).filter(p => !p.done);
  const hoy = new Date().setHours(23, 59, 59, 999);

  // Hoy = urgentes + vencen hoy + vence en próximos 2 días
  const foco = pend.filter(p => p.prioridad === 'alta' || (p.due_ts && p.due_ts <= hoy + 86400000));

  if (!foco.length) {
    return `<div style="background:rgba(180,220,170,0.04);border:0.5px solid rgba(180,220,170,0.2);border-radius:14px;padding:24px;text-align:center;">
      <div style="font-size:14px;font-weight:500;margin-bottom:6px;color:rgba(200,230,200,0.95);">Día limpio ✓</div>
      <div style="font-size:11px;color:var(--text-tertiary);">Sin urgencias · enfócate en lo profundo</div>
    </div>`;
  }

  return foco.map(p => renderPendienteCard(p)).join('');
}

function renderEisenhower() {
  const pend = Store.get(Store.KEYS.PENDIENTES, []).filter(p => !p.done);

  // Clasificar en 4 cuadrantes
  const q1 = pend.filter(p => p.urgente && p.importante);
  const q2 = pend.filter(p => !p.urgente && p.importante);
  const q3 = pend.filter(p => p.urgente && !p.importante);
  const q4 = pend.filter(p => !p.urgente && !p.importante);

  const renderQ = (items, title, color, sub) => `
    <div style="background:rgba(244,243,239,0.025);border:0.5px solid ${color};border-radius:11px;padding:11px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="font-size:10px;letter-spacing:0.08em;text-transform:uppercase;font-weight:500;color:${color};">${title}</div>
        <div style="font-size:9px;color:var(--text-tertiary);">${sub}</div>
      </div>
      ${items.length === 0 ? `<div style="font-size:11px;color:var(--text-mute);text-align:center;padding:6px;">vacío</div>` : items.slice(0, 3).map(p => `
        <div style="font-size:11px;padding:4px 0;color:rgba(244,243,239,0.85);" data-pend-id="${p.id}">· ${Util.esc(p.titulo)}</div>
      `).join('')}
    </div>
  `;

  return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">
      ${renderQ(q1, 'HACER YA', 'rgba(255,150,80,0.5)', 'urgente + importante')}
      ${renderQ(q2, 'PROGRAMAR', 'rgba(150,210,230,0.4)', 'importante no urgente')}
      ${renderQ(q3, 'DELEGAR', 'rgba(244,213,128,0.4)', 'urgente no importante')}
      ${renderQ(q4, 'ELIMINAR', 'rgba(244,243,239,0.1)', 'ni urgente ni importante')}
    </div>

    <div style="background:rgba(120,200,220,0.04);border:0.5px solid rgba(120,200,220,0.2);border-radius:11px;padding:11px;">
      <div style="font-size:9px;color:rgba(150,210,230,0.95);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-bottom:6px;">Mando · regla de Pareto</div>
      <div style="font-size:11px;color:rgba(244,243,239,0.85);line-height:1.5;">Solo el cuadrante PROGRAMAR mueve la aguja a largo plazo. Si pasas más tiempo en HACER YA, vives apagando fuegos. Bloquea 2h diarias para PROGRAMAR.</div>
    </div>
  `;
}

function renderTodos() {
  const pend = Store.get(Store.KEYS.PENDIENTES, []).filter(p => !p.done);

  if (!pend.length) {
    return `<div style="background:rgba(244,243,239,0.025);border:0.5px dashed rgba(244,243,239,0.15);border-radius:14px;padding:24px;text-align:center;">
      <div style="font-size:13px;color:var(--text-secondary);">Sin pendientes · plato limpio</div>
    </div>`;
  }

  // Agrupar por prioridad
  const altas = pend.filter(p => p.prioridad === 'alta');
  const medias = pend.filter(p => p.prioridad === 'media');
  const bajas = pend.filter(p => p.prioridad === 'baja');

  let html = '';
  if (altas.length) {
    html += `<div class="section-eyebrow"><div class="label" style="color:rgba(255,150,80,0.95);">alta prioridad · ${altas.length}</div></div>`;
    html += altas.map(renderPendienteCard).join('');
  }
  if (medias.length) {
    html += `<div class="section-eyebrow" style="margin-top:12px;"><div class="label" style="color:rgba(244,213,128,0.95);">media · ${medias.length}</div></div>`;
    html += medias.map(renderPendienteCard).join('');
  }
  if (bajas.length) {
    html += `<div class="section-eyebrow" style="margin-top:12px;"><div class="label">baja · ${bajas.length}</div></div>`;
    html += bajas.map(renderPendienteCard).join('');
  }
  return html;
}

function renderPendienteCard(p) {
  const colorClass = p.prioridad === 'alta' ? 'orange' : (p.prioridad === 'media' ? 'yellow' : '');
  const dueLabel = p.due_ts ? (Util.daysUntil(p.due_ts) === 0 ? 'vence hoy' : (Util.daysUntil(p.due_ts) < 0 ? `${-Util.daysUntil(p.due_ts)}d atrás` : `en ${Util.daysUntil(p.due_ts)}d`)) : '';

  // Si tiene objetivo vinculado, mostrar referencia
  let objBadge = '';
  if (p.objetivo_id) {
    const obj = Store.get(Store.KEYS.OBJETIVOS, []).find(o => o.id === p.objetivo_id);
    const nombre = obj?.nombre || p.objetivo_nombre || 'objetivo';
    objBadge = `<a href="finanzas.html#objetivos" style="display:inline-flex;align-items:center;gap:4px;background:rgba(255,79,0,0.1);border:0.5px solid rgba(255,79,0,0.25);border-radius:4px;padding:2px 6px;font-size:9px;color:rgba(255,170,110,0.95);text-decoration:none;margin-bottom:3px;">→ ${Util.esc(nombre)}</a>`;
  }

  return `
    <div class="decision-card ${colorClass}" style="padding:11px;margin-bottom:6px;">
      <div style="display:flex;align-items:flex-start;gap:9px;">
        <div onclick="completarPendiente('${p.id}')" style="width:18px;height:18px;border:1.5px solid rgba(244,243,239,0.3);border-radius:5px;cursor:pointer;flex-shrink:0;margin-top:1px;"></div>
        <div style="flex:1;min-width:0;">
          ${objBadge}
          <div style="font-size:12px;font-weight:500;margin-bottom:3px;">${Util.esc(p.titulo)}</div>
          ${p.cliente ? `<div style="font-size:9px;color:rgba(150,210,230,0.85);margin-bottom:3px;">${Util.esc(p.cliente)}</div>` : ''}
          <div style="display:flex;gap:8px;align-items:center;">
            ${dueLabel ? `<div style="font-size:9px;color:${Util.daysUntil(p.due_ts) < 0 ? 'rgba(255,170,110,0.95)' : 'var(--text-tertiary)'};">${dueLabel}</div>` : ''}
            ${p.tiempo_estimado ? `<div style="font-size:9px;color:var(--text-tertiary);">${p.tiempo_estimado}</div>` : ''}
            <div onclick="eliminarPendiente('${p.id}')" style="margin-left:auto;font-size:9px;color:var(--text-mute);cursor:pointer;">eliminar</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderPatronesAsync(container) {
  // Mostrar loader inmediatamente
  container.innerHTML = `<div class="loader-wrap"><div class="loader"></div></div>`;
  // Después de un tick, calcular y reemplazar
  setTimeout(() => {
    container.innerHTML = analizarPatrones();
  }, 50);
}

function analizarPatrones() {
  const pend = Store.get(Store.KEYS.PENDIENTES, []);
  const completados = pend.filter(p => p.done);

  // Análisis simple: días de la semana donde se acumulan tareas
  const diasSemana = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
  const acumulacion = [0, 0, 0, 0, 0, 0, 0];
  pend.filter(p => !p.done).forEach(p => {
    if (p.fecha_creacion) {
      const d = new Date(p.fecha_creacion).getDay();
      acumulacion[d]++;
    }
  });

  const dia_mas_pesado = acumulacion.indexOf(Math.max(...acumulacion));

  return `
    <div style="background:rgba(244,243,239,0.025);border:0.5px solid var(--border-soft);border-radius:11px;padding:13px;margin-bottom:12px;">
      <div style="font-size:9px;color:rgba(244,243,239,0.55);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-bottom:9px;">acumulación por día de la semana</div>
      <div style="display:flex;gap:5px;align-items:flex-end;height:60px;margin-bottom:6px;">
        ${acumulacion.map((v, i) => `
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
            <div style="width:100%;background:${i === dia_mas_pesado ? 'rgba(255,150,80,0.6)' : 'rgba(120,200,220,0.3)'};height:${(v / Math.max(...acumulacion, 1)) * 50}px;border-radius:3px 3px 0 0;"></div>
            <div style="font-size:9px;color:var(--text-tertiary);">${diasSemana[i]}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div style="background:rgba(120,200,220,0.04);border:0.5px solid rgba(120,200,220,0.2);border-radius:11px;padding:12px;">
      <div style="font-size:9px;color:rgba(150,210,230,0.95);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-bottom:6px;">Mando · patrón detectado</div>
      <div style="font-size:11px;color:rgba(244,243,239,0.85);line-height:1.5;">${pend.filter(p => !p.done).length === 0 ? 'Sin patrones aún · agrega más datos para que pueda analizar.' : `${diasSemana[dia_mas_pesado]} acumula más pendientes. Bloquea 2h ${diasSemana[(dia_mas_pesado + 1) % 7]} temprano para drenar la cola.`}</div>
    </div>
  `;
}

function bindActions() {
  // Las acciones se manejan inline con onclick
}

function completarPendiente(id) {
  const pend = Store.get(Store.KEYS.PENDIENTES, []);
  const idx = pend.findIndex(p => p.id === id);
  if (idx === -1) return;
  pend[idx].done = true;
  pend[idx].fecha_completado = Date.now();
  Store.set(Store.KEYS.PENDIENTES, pend);

  Store.push(Store.KEYS.ACHIEVEMENTS, {
    tipo: 'pendiente_completado',
    titulo: pend[idx].titulo,
    msg: `Completaste: ${pend[idx].titulo}`
  });

  UI.toast('Pendiente completado ✓', 'success');
  renderStats();
  renderVista(document.querySelector('.tab.active').dataset.vista);
}

function eliminarPendiente(id) {
  if (!confirm('¿Eliminar este pendiente?')) return;
  Store.remove(Store.KEYS.PENDIENTES, id);
  UI.toast('Eliminado', 'info');
  renderStats();
  renderVista(document.querySelector('.tab.active').dataset.vista);
}

// Estado temporal del modal
let modalState = { prioridad: 'media', dias: 3 };

// ============================================================
// RECORDATORIOS · UI dedicada
// ============================================================
function renderRecordatoriosTab() {
  const proximos = Recordatorios.proximos(20);
  const tipos = Recordatorios.TIPOS;

  let html = `
    <div style="background:rgba(120,200,220,0.04);border:0.5px solid rgba(120,200,220,0.2);border-radius:11px;padding:12px;margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <div style="font-size:9px;color:rgba(150,210,230,0.95);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;">recordatorios agendados</div>
        <div style="font-size:11px;color:var(--text-tertiary);">${proximos.length} próximos</div>
      </div>
      <div style="font-size:11px;color:var(--text-secondary);line-height:1.5;">Cobros · pagos · ensayos · tocadas · SAT · ejercicio · todo en un lugar.</div>
    </div>

    <button class="btn primary-orange full" onclick="abrirNuevoRecordatorio()" style="margin-bottom:14px;">+ Nuevo recordatorio</button>
  `;

  if (!proximos.length) {
    html += `
      <div style="background:rgba(244,243,239,0.02);border:0.5px dashed rgba(244,243,239,0.1);border-radius:11px;padding:24px;text-align:center;">
        <div style="font-size:12px;color:var(--text-tertiary);margin-bottom:6px;">Sin recordatorios agendados</div>
        <div style="font-size:10px;color:var(--text-mute);">Los pagos recurrentes y ejercicios agendados crean recordatorios automáticamente</div>
      </div>
    `;
    return html;
  }

  // Agrupar por día
  const grupos = { hoy: [], mañana: [], esta_semana: [], despues: [] };
  const ahora = Date.now();
  const finHoy = new Date(); finHoy.setHours(23,59,59,999);
  const finMañana = finHoy.getTime() + 86400000;
  const finSemana = ahora + 7 * 86400000;

  proximos.forEach(r => {
    if (r.fecha <= finHoy.getTime()) grupos.hoy.push(r);
    else if (r.fecha <= finMañana) grupos.mañana.push(r);
    else if (r.fecha <= finSemana) grupos.esta_semana.push(r);
    else grupos.despues.push(r);
  });

  const renderItem = (r) => {
    const tipo = tipos[r.tipo] || { label: r.tipo, icon: '·' };
    const fecha = new Date(r.fecha);
    const horaLabel = fecha.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
    const fechaLabel = fecha.toLocaleDateString('es-MX', { day: 'numeric', month: 'short' });
    const colorBorder = r.prioridad === 'alta' ? 'rgba(255,79,0,0.25)' : (r.prioridad === 'media' ? 'rgba(244,213,128,0.25)' : 'var(--border-soft)');

    return `
      <div style="background:rgba(244,243,239,0.025);border:0.5px solid ${colorBorder};border-radius:10px;padding:11px;margin-bottom:5px;display:flex;gap:11px;align-items:center;">
        <div style="width:34px;height:34px;background:rgba(120,200,220,0.12);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:rgba(180,220,240,0.95);flex-shrink:0;">${tipo.icon}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:11px;font-weight:500;">${Util.esc(r.titulo)}</div>
          ${r.body ? `<div style="font-size:9px;color:var(--text-tertiary);margin-top:2px;">${Util.esc(r.body)}</div>` : ''}
          <div style="font-size:9px;color:var(--text-tertiary);margin-top:3px;">${fechaLabel} · ${horaLabel}</div>
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0;">
          ${r.link ? `<a href="${r.link}" target="_blank" style="background:rgba(150,210,230,0.15);border:0.5px solid rgba(150,210,230,0.35);color:rgba(180,220,240,0.95);padding:5px 8px;border-radius:5px;font-size:10px;text-decoration:none;">ir →</a>` : ''}
          <button onclick="completarRecordatorio('${r.id}')" style="background:rgba(180,220,170,0.15);border:0.5px solid rgba(180,220,170,0.35);color:rgba(200,230,200,0.95);padding:5px 8px;border-radius:5px;font-size:10px;cursor:pointer;">✓</button>
          <button onclick="eliminarRecordatorio('${r.id}')" style="background:rgba(255,79,0,0.05);border:0.5px solid rgba(255,79,0,0.2);color:rgba(255,170,110,0.85);padding:5px 8px;border-radius:5px;font-size:10px;cursor:pointer;">×</button>
        </div>
      </div>
    `;
  };

  if (grupos.hoy.length) {
    html += `<div class="section-eyebrow"><div><div class="label" style="color:rgba(255,170,110,0.95);">hoy</div></div></div>`;
    html += grupos.hoy.map(renderItem).join('');
  }
  if (grupos.mañana.length) {
    html += `<div class="section-eyebrow" style="margin-top:10px;"><div><div class="label">mañana</div></div></div>`;
    html += grupos.mañana.map(renderItem).join('');
  }
  if (grupos.esta_semana.length) {
    html += `<div class="section-eyebrow" style="margin-top:10px;"><div><div class="label">esta semana</div></div></div>`;
    html += grupos.esta_semana.map(renderItem).join('');
  }
  if (grupos.despues.length) {
    html += `<div class="section-eyebrow" style="margin-top:10px;"><div><div class="label">después</div></div></div>`;
    html += grupos.despues.map(renderItem).join('');
  }

  return html;
}

function abrirNuevoRecordatorio() {
  const tipos = Recordatorios.TIPOS;
  let state = { tipo: 'tarea' };
  const tipoBtns = Object.entries(tipos).map(([k, v], i) =>
    `<div class="g2c-quick-btn ${i === 0 ? 'active' : ''}" data-rec-tipo="${k}"><div class="qb-label">${v.icon}</div><div class="qb-value">${v.label}</div></div>`
  ).join('');

  const ahora = new Date(Date.now() + 60 * 60000 - new Date().getTimezoneOffset() * 60000).toISOString().slice(0, 16);

  const modal = document.createElement('div');
  modal.className = 'g2c-modal-backdrop active';
  modal.id = 'modal-rec';
  modal.innerHTML = `
    <div class="g2c-modal" onclick="event.stopPropagation()">
      <div class="g2c-modal-handle"></div>
      <div class="g2c-modal-eyebrow"><div class="dot" style="background:rgba(120,200,220,1);"></div><div class="label">Recordatorio</div></div>
      <div class="g2c-modal-title">Nuevo recordatorio</div>

      <div class="form-field">
        <div class="field-label">TIPO</div>
        <div class="g2c-quick-grid" style="grid-template-columns:repeat(2,1fr);">${tipoBtns}</div>
      </div>

      <div class="form-field">
        <div class="field-label">TÍTULO</div>
        <input type="text" class="field-input" id="rec-titulo" placeholder="Ej: Ensayo banda · viernes 8pm" autofocus style="font-size:16px !important;">
      </div>

      <div class="form-field">
        <div class="field-label">CUÁNDO</div>
        <input type="datetime-local" class="field-input" id="rec-fecha" value="${ahora}" style="font-size:16px !important;">
      </div>

      <div class="form-field">
        <div class="field-label">PRIORIDAD</div>
        <div class="g2c-quick-grid" style="grid-template-columns:repeat(3,1fr);">
          <div class="g2c-quick-btn" data-rec-prio="alta"><div class="qb-label">ALTA</div><div class="qb-value" style="color:rgba(255,170,110,0.95);">crítico</div></div>
          <div class="g2c-quick-btn active" data-rec-prio="media"><div class="qb-label">MEDIA</div><div class="qb-value" style="color:rgba(244,213,128,0.95);">normal</div></div>
          <div class="g2c-quick-btn" data-rec-prio="baja"><div class="qb-label">BAJA</div><div class="qb-value">info</div></div>
        </div>
      </div>

      <div class="form-field">
        <div class="field-label">NOTA (opcional)</div>
        <input type="text" class="field-input" id="rec-body" placeholder="Detalles..." style="font-size:16px !important;">
      </div>

      <div class="g2c-modal-actions">
        <button class="btn" onclick="cerrarModalRec()">Cancelar</button>
        <button class="btn primary-orange" onclick="guardarRecordatorio()">Crear</button>
      </div>
    </div>
  `;
  modal.addEventListener('click', cerrarModalRec);
  document.body.appendChild(modal);
  window._recState = state;
  window._recPrio = 'media';

  modal.querySelectorAll('[data-rec-tipo]').forEach(btn => {
    btn.addEventListener('click', () => {
      modal.querySelectorAll('[data-rec-tipo]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      window._recState.tipo = btn.dataset.recTipo;
    });
  });
  modal.querySelectorAll('[data-rec-prio]').forEach(btn => {
    btn.addEventListener('click', () => {
      modal.querySelectorAll('[data-rec-prio]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      window._recPrio = btn.dataset.recPrio;
    });
  });
  setTimeout(() => document.getElementById('rec-titulo')?.focus(), 100);
}

function cerrarModalRec() {
  const m = document.getElementById('modal-rec');
  if (m) m.remove();
}

function guardarRecordatorio() {
  const titulo = document.getElementById('rec-titulo').value.trim();
  const fecha = document.getElementById('rec-fecha').value;
  const body = document.getElementById('rec-body').value.trim();

  if (!titulo) return UI.toast('Falta título', 'error');
  if (!fecha) return UI.toast('Falta fecha', 'error');

  Recordatorios.agendar({
    tipo: window._recState?.tipo || 'tarea',
    titulo,
    body,
    fecha: new Date(fecha).getTime(),
    prioridad: window._recPrio || 'media'
  });

  UI.toast('Recordatorio agendado', 'success');
  cerrarModalRec();
  renderVista('recordatorios');
}

function completarRecordatorio(id) {
  Recordatorios.marcarDisparado(id);
  UI.toast('Marcado como hecho', 'info');
  renderVista('recordatorios');
}

function eliminarRecordatorio(id) {
  if (!confirm('¿Eliminar recordatorio?')) return;
  Recordatorios.remove(id);
  UI.toast('Eliminado', 'info');
  renderVista('recordatorios');
}

function agregarPendiente() {
  modalState = { prioridad: 'media', dias: 3 };

  const modal = document.createElement('div');
  modal.className = 'g2c-modal-backdrop active';
  modal.id = 'modal-pendiente';
  modal.innerHTML = `
    <div class="g2c-modal" onclick="event.stopPropagation()">
      <div class="g2c-modal-handle"></div>

      <div class="g2c-modal-eyebrow">
        <div class="dot"></div>
        <div class="label">Nuevo pendiente</div>
      </div>
      <div class="g2c-modal-title">¿Qué hay que hacer?</div>

      <div class="form-field">
        <input type="text"
               class="field-input"
               id="pend-titulo"
               placeholder="Ej: Mandar Loom propuesta a NEOS exp"
               autofocus
               style="font-size:16px !important;">
      </div>

      <div class="form-field">
        <div class="field-label">PRIORIDAD</div>
        <div class="g2c-quick-grid" id="pend-prio">
          <div class="g2c-quick-btn" data-prio="alta">
            <div class="qb-label">ALTA</div>
            <div class="qb-value" style="color:rgba(255,170,110,0.95);">Urgente · hoy</div>
          </div>
          <div class="g2c-quick-btn active" data-prio="media">
            <div class="qb-label">MEDIA</div>
            <div class="qb-value" style="color:rgba(244,213,128,0.95);">Esta semana</div>
          </div>
          <div class="g2c-quick-btn" data-prio="baja">
            <div class="qb-label">BAJA</div>
            <div class="qb-value" style="color:var(--text-secondary);">Cuando se pueda</div>
          </div>
          <div class="g2c-quick-btn" data-prio="critica">
            <div class="qb-label">CRÍTICA</div>
            <div class="qb-value" style="color:rgba(255,170,110,0.95);">Ahora</div>
          </div>
        </div>
      </div>

      <div class="form-field">
        <div class="field-label">VENCE</div>
        <div class="g2c-quick-grid" id="pend-dias">
          <div class="g2c-quick-btn" data-dias="0">
            <div class="qb-label">HOY</div>
            <div class="qb-value">Mismo día</div>
          </div>
          <div class="g2c-quick-btn" data-dias="1">
            <div class="qb-label">MAÑANA</div>
            <div class="qb-value">+1 día</div>
          </div>
          <div class="g2c-quick-btn active" data-dias="3">
            <div class="qb-label">3 DÍAS</div>
            <div class="qb-value">Esta semana</div>
          </div>
          <div class="g2c-quick-btn" data-dias="7">
            <div class="qb-label">7 DÍAS</div>
            <div class="qb-value">Próxima semana</div>
          </div>
        </div>
      </div>

      <div class="g2c-modal-actions">
        <button class="btn" onclick="cerrarModalPend()">Cancelar</button>
        <button class="btn primary-orange" onclick="guardarPendiente()">Guardar</button>
      </div>
    </div>
  `;
  modal.addEventListener('click', cerrarModalPend);
  document.body.appendChild(modal);

  // Bind quick buttons
  modal.querySelectorAll('[data-prio]').forEach(btn => {
    btn.addEventListener('click', () => {
      modal.querySelectorAll('[data-prio]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      modalState.prioridad = btn.dataset.prio;
    });
  });
  modal.querySelectorAll('[data-dias]').forEach(btn => {
    btn.addEventListener('click', () => {
      modal.querySelectorAll('[data-dias]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      modalState.dias = parseInt(btn.dataset.dias);
    });
  });

  // Focus input
  setTimeout(() => document.getElementById('pend-titulo')?.focus(), 100);
}

function cerrarModalPend() {
  const m = document.getElementById('modal-pendiente');
  if (m) m.remove();
}

function guardarPendiente() {
  const titulo = document.getElementById('pend-titulo').value.trim();
  if (!titulo) {
    UI.toast('Falta el título', 'error');
    return;
  }

  const isAlta = modalState.prioridad === 'alta' || modalState.prioridad === 'critica';
  const dueT = Date.now() + modalState.dias * 86400000;

  Store.push(Store.KEYS.PENDIENTES, {
    titulo,
    prioridad: modalState.prioridad === 'critica' ? 'alta' : modalState.prioridad,
    urgente: modalState.dias <= 1 || modalState.prioridad === 'critica',
    importante: isAlta,
    due_ts: dueT,
    fecha_creacion: Date.now(),
    done: false
  });

  UI.toast('Pendiente agregado ✓', 'success');
  cerrarModalPend();
  renderStats();
  renderVista(document.querySelector('.tab.active').dataset.vista);
}

async function handleChat(text) {
  // Detectar si es para agregar pendiente directo
  if (/recuérdame|agendar|pendiente|tengo que/i.test(text)) {
    Store.push(Store.KEYS.PENDIENTES, {
      titulo: text,
      prioridad: 'media',
      urgente: /urgent|hoy|ya/i.test(text),
      importante: true,
      fecha_creacion: Date.now(),
      done: false
    });
    UI.toast('Pendiente agregado al inferir intent', 'success');
    renderStats();
    renderVista('hoy');
    return;
  }
  location.href = 'chat.html?msg=' + encodeURIComponent(text) + '&scope=pendientes';
}
</script>
</body>
</html>
