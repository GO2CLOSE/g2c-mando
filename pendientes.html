<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0F1419">
<title>Pendientes · Mando</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>

<div id="status-bar"></div>

<header class="module-header">
  <div class="module-eyebrow">
    <div class="dot"></div>
    <div class="label">Pendientes · jefe de proyecto</div>
  </div>
  <div class="module-title">Foco del día</div>
  <div class="module-subtitle" id="pend-sub">cargando...</div>
</header>

<!-- Stats -->
<div class="stat-grid cols-3" id="pend-stats">
  <div class="stat-card alert"><div class="stat-label" style="color:rgba(255,150,80,0.95);">URGENTES</div><div class="stat-value" id="stat-urgentes">—</div></div>
  <div class="stat-card cyan"><div class="stat-label" style="color:rgba(150,210,230,0.85);">EN CURSO</div><div class="stat-value" id="stat-curso">—</div></div>
  <div class="stat-card green"><div class="stat-label" style="color:rgba(180,220,170,0.85);">HECHAS HOY</div><div class="stat-value" id="stat-hechas">—</div></div>
</div>

<!-- Tab bar de vistas -->
<div class="tab-bar">
  <div class="tab active" data-vista="hoy">Hoy</div>
  <div class="tab" data-vista="eisenhower">Eisenhower</div>
  <div class="tab" data-vista="todos">Todos</div>
  <div class="tab" data-vista="patron">Patrones IA</div>
</div>

<div id="vista-content"></div>

<button class="btn primary-orange full" style="margin-top:12px;" onclick="agregarPendiente()">+ Nuevo pendiente</button>

<div id="chat-input-host"></div>
<div id="footer-host"></div>
<div id="nav-host"></div>

<script src="shared.js"></script>
<script>
(async function init() {
  if (!Auth.enforce()) return;
  document.getElementById('status-bar').innerHTML = UI.renderStatusBar();
  document.getElementById('chat-input-host').innerHTML = UI.renderChatInput('Agrega o pregunta sobre pendientes...');
  document.getElementById('footer-host').innerHTML = UI.renderFooter();
  document.getElementById('nav-host').innerHTML = UI.renderBottomNav('pendientes');

  document.querySelectorAll('[data-vista]').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('[data-vista]').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      renderVista(t.dataset.vista);
    });
  });

  renderStats();
  renderVista('hoy');

  UI.bindChatInput(handleChat);
})();

function renderStats() {
  const pend = Store.get(Store.KEYS.PENDIENTES, []);
  const hoy = new Date(); hoy.setHours(0, 0, 0, 0);

  const urgentes = pend.filter(p => !p.done && p.prioridad === 'alta');
  const curso = pend.filter(p => !p.done && p.prioridad !== 'alta');
  const hechas = pend.filter(p => p.done && p.fecha_completado >= hoy.getTime());

  document.getElementById('stat-urgentes').textContent = urgentes.length;
  document.getElementById('stat-curso').textContent = curso.length;
  document.getElementById('stat-hechas').textContent = hechas.length;

  const tot = pend.filter(p => !p.done).length;
  document.getElementById('pend-sub').textContent = `${tot} abiertas · ${urgentes.length} alta prioridad`;
}

function renderVista(v) {
  const c = document.getElementById('vista-content');
  switch (v) {
    case 'hoy': c.innerHTML = renderHoy(); bindActions(); break;
    case 'eisenhower': c.innerHTML = renderEisenhower(); bindActions(); break;
    case 'todos': c.innerHTML = renderTodos(); bindActions(); break;
    case 'patron': c.innerHTML = renderPatrones(); break;
  }
}

function renderHoy() {
  const pend = Store.get(Store.KEYS.PENDIENTES, []).filter(p => !p.done);
  const hoy = new Date().setHours(23, 59, 59, 999);

  // Hoy = urgentes + vencen hoy + vence en próximos 2 días
  const foco = pend.filter(p => p.prioridad === 'alta' || (p.due_ts && p.due_ts <= hoy + 86400000));

  if (!foco.length) {
    return `<div style="background:rgba(180,220,170,0.04);border:0.5px solid rgba(180,220,170,0.2);border-radius:14px;padding:24px;text-align:center;">
      <div style="font-size:14px;font-weight:500;margin-bottom:6px;color:rgba(200,230,200,0.95);">Día limpio ✓</div>
      <div style="font-size:11px;color:var(--text-tertiary);">Sin urgencias · enfócate en lo profundo</div>
    </div>`;
  }

  return foco.map(p => renderPendienteCard(p)).join('');
}

function renderEisenhower() {
  const pend = Store.get(Store.KEYS.PENDIENTES, []).filter(p => !p.done);

  // Clasificar en 4 cuadrantes
  const q1 = pend.filter(p => p.urgente && p.importante);
  const q2 = pend.filter(p => !p.urgente && p.importante);
  const q3 = pend.filter(p => p.urgente && !p.importante);
  const q4 = pend.filter(p => !p.urgente && !p.importante);

  const renderQ = (items, title, color, sub) => `
    <div style="background:rgba(244,243,239,0.025);border:0.5px solid ${color};border-radius:11px;padding:11px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="font-size:10px;letter-spacing:0.08em;text-transform:uppercase;font-weight:500;color:${color};">${title}</div>
        <div style="font-size:9px;color:var(--text-tertiary);">${sub}</div>
      </div>
      ${items.length === 0 ? `<div style="font-size:11px;color:var(--text-mute);text-align:center;padding:6px;">vacío</div>` : items.slice(0, 3).map(p => `
        <div style="font-size:11px;padding:4px 0;color:rgba(244,243,239,0.85);" data-pend-id="${p.id}">· ${Util.esc(p.titulo)}</div>
      `).join('')}
    </div>
  `;

  return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">
      ${renderQ(q1, 'HACER YA', 'rgba(255,150,80,0.5)', 'urgente + importante')}
      ${renderQ(q2, 'PROGRAMAR', 'rgba(150,210,230,0.4)', 'importante no urgente')}
      ${renderQ(q3, 'DELEGAR', 'rgba(244,213,128,0.4)', 'urgente no importante')}
      ${renderQ(q4, 'ELIMINAR', 'rgba(244,243,239,0.1)', 'ni urgente ni importante')}
    </div>

    <div style="background:rgba(120,200,220,0.04);border:0.5px solid rgba(120,200,220,0.2);border-radius:11px;padding:11px;">
      <div style="font-size:9px;color:rgba(150,210,230,0.95);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-bottom:6px;">Mando · regla de Pareto</div>
      <div style="font-size:11px;color:rgba(244,243,239,0.85);line-height:1.5;">Solo el cuadrante PROGRAMAR mueve la aguja a largo plazo. Si pasas más tiempo en HACER YA, vives apagando fuegos. Bloquea 2h diarias para PROGRAMAR.</div>
    </div>
  `;
}

function renderTodos() {
  const pend = Store.get(Store.KEYS.PENDIENTES, []).filter(p => !p.done);

  if (!pend.length) {
    return `<div style="background:rgba(244,243,239,0.025);border:0.5px dashed rgba(244,243,239,0.15);border-radius:14px;padding:24px;text-align:center;">
      <div style="font-size:13px;color:var(--text-secondary);">Sin pendientes · plato limpio</div>
    </div>`;
  }

  // Agrupar por prioridad
  const altas = pend.filter(p => p.prioridad === 'alta');
  const medias = pend.filter(p => p.prioridad === 'media');
  const bajas = pend.filter(p => p.prioridad === 'baja');

  let html = '';
  if (altas.length) {
    html += `<div class="section-eyebrow"><div class="label" style="color:rgba(255,150,80,0.95);">alta prioridad · ${altas.length}</div></div>`;
    html += altas.map(renderPendienteCard).join('');
  }
  if (medias.length) {
    html += `<div class="section-eyebrow" style="margin-top:12px;"><div class="label" style="color:rgba(244,213,128,0.95);">media · ${medias.length}</div></div>`;
    html += medias.map(renderPendienteCard).join('');
  }
  if (bajas.length) {
    html += `<div class="section-eyebrow" style="margin-top:12px;"><div class="label">baja · ${bajas.length}</div></div>`;
    html += bajas.map(renderPendienteCard).join('');
  }
  return html;
}

function renderPendienteCard(p) {
  const colorClass = p.prioridad === 'alta' ? 'orange' : (p.prioridad === 'media' ? 'yellow' : '');
  const dueLabel = p.due_ts ? (Util.daysUntil(p.due_ts) === 0 ? 'vence hoy' : (Util.daysUntil(p.due_ts) < 0 ? `${-Util.daysUntil(p.due_ts)}d atrás` : `en ${Util.daysUntil(p.due_ts)}d`)) : '';

  return `
    <div class="decision-card ${colorClass}" style="padding:11px;margin-bottom:6px;">
      <div style="display:flex;align-items:flex-start;gap:9px;">
        <div onclick="completarPendiente('${p.id}')" style="width:18px;height:18px;border:1.5px solid rgba(244,243,239,0.3);border-radius:5px;cursor:pointer;flex-shrink:0;margin-top:1px;"></div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:12px;font-weight:500;margin-bottom:3px;">${Util.esc(p.titulo)}</div>
          ${p.cliente ? `<div style="font-size:9px;color:rgba(150,210,230,0.85);margin-bottom:3px;">${Util.esc(p.cliente)}</div>` : ''}
          <div style="display:flex;gap:8px;align-items:center;">
            ${dueLabel ? `<div style="font-size:9px;color:${Util.daysUntil(p.due_ts) < 0 ? 'rgba(255,170,110,0.95)' : 'var(--text-tertiary)'};">${dueLabel}</div>` : ''}
            ${p.tiempo_estimado ? `<div style="font-size:9px;color:var(--text-tertiary);">${p.tiempo_estimado}</div>` : ''}
            <div onclick="eliminarPendiente('${p.id}')" style="margin-left:auto;font-size:9px;color:var(--text-mute);cursor:pointer;">eliminar</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

async function renderPatrones() {
  return `<div class="loader-wrap"><div class="loader"></div></div>` || await analizarPatrones();
}

async function analizarPatrones() {
  const pend = Store.get(Store.KEYS.PENDIENTES, []);
  const completados = pend.filter(p => p.done);

  // Análisis simple: días de la semana donde se acumulan tareas
  const diasSemana = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
  const acumulacion = [0, 0, 0, 0, 0, 0, 0];
  pend.filter(p => !p.done).forEach(p => {
    if (p.fecha_creacion) {
      const d = new Date(p.fecha_creacion).getDay();
      acumulacion[d]++;
    }
  });

  const dia_mas_pesado = acumulacion.indexOf(Math.max(...acumulacion));

  return `
    <div style="background:rgba(244,243,239,0.025);border:0.5px solid var(--border-soft);border-radius:11px;padding:13px;margin-bottom:12px;">
      <div style="font-size:9px;color:rgba(244,243,239,0.55);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-bottom:9px;">acumulación por día de la semana</div>
      <div style="display:flex;gap:5px;align-items:flex-end;height:60px;margin-bottom:6px;">
        ${acumulacion.map((v, i) => `
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
            <div style="width:100%;background:${i === dia_mas_pesado ? 'rgba(255,150,80,0.6)' : 'rgba(120,200,220,0.3)'};height:${(v / Math.max(...acumulacion, 1)) * 50}px;border-radius:3px 3px 0 0;"></div>
            <div style="font-size:9px;color:var(--text-tertiary);">${diasSemana[i]}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div style="background:rgba(120,200,220,0.04);border:0.5px solid rgba(120,200,220,0.2);border-radius:11px;padding:12px;">
      <div style="font-size:9px;color:rgba(150,210,230,0.95);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-bottom:6px;">Mando · patrón detectado</div>
      <div style="font-size:11px;color:rgba(244,243,239,0.85);line-height:1.5;">${pend.filter(p => !p.done).length === 0 ? 'Sin patrones aún · agrega más datos para que pueda analizar.' : `${diasSemana[dia_mas_pesado]} acumula más pendientes. Bloquea 2h ${diasSemana[(dia_mas_pesado + 1) % 7]} temprano para drenar la cola.`}</div>
    </div>
  `;
}

function bindActions() {
  // Las acciones se manejan inline con onclick
}

function completarPendiente(id) {
  const pend = Store.get(Store.KEYS.PENDIENTES, []);
  const idx = pend.findIndex(p => p.id === id);
  if (idx === -1) return;
  pend[idx].done = true;
  pend[idx].fecha_completado = Date.now();
  Store.set(Store.KEYS.PENDIENTES, pend);

  Store.push(Store.KEYS.ACHIEVEMENTS, {
    tipo: 'pendiente_completado',
    titulo: pend[idx].titulo,
    msg: `Completaste: ${pend[idx].titulo}`
  });

  UI.toast('Pendiente completado ✓', 'success');
  renderStats();
  renderVista(document.querySelector('.tab.active').dataset.vista);
}

function eliminarPendiente(id) {
  if (!confirm('¿Eliminar este pendiente?')) return;
  Store.remove(Store.KEYS.PENDIENTES, id);
  UI.toast('Eliminado', 'info');
  renderStats();
  renderVista(document.querySelector('.tab.active').dataset.vista);
}

function agregarPendiente() {
  const titulo = prompt('Título del pendiente:');
  if (!titulo) return;
  const prioridad = prompt('Prioridad (alta/media/baja):', 'media');
  const dias = parseInt(prompt('¿En cuántos días vence? (0 = hoy)', '3') || '3');

  Store.push(Store.KEYS.PENDIENTES, {
    titulo,
    prioridad: ['alta', 'media', 'baja'].includes(prioridad) ? prioridad : 'media',
    urgente: dias <= 1,
    importante: prioridad === 'alta',
    due_ts: Date.now() + dias * 86400000,
    fecha_creacion: Date.now(),
    done: false
  });
  UI.toast('Pendiente agregado ✓', 'success');
  renderStats();
  renderVista(document.querySelector('.tab.active').dataset.vista);
}

async function handleChat(text) {
  // Detectar si es para agregar pendiente directo
  if (/recuérdame|agendar|pendiente|tengo que/i.test(text)) {
    Store.push(Store.KEYS.PENDIENTES, {
      titulo: text,
      prioridad: 'media',
      urgente: /urgent|hoy|ya/i.test(text),
      importante: true,
      fecha_creacion: Date.now(),
      done: false
    });
    UI.toast('Pendiente agregado al inferir intent', 'success');
    renderStats();
    renderVista('hoy');
    return;
  }
  location.href = 'chat.html?msg=' + encodeURIComponent(text) + '&scope=pendientes';
}
</script>
</body>
</html>
