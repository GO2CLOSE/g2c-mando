<script>
(function init() {
  if (!Auth.enforce()) return;
  document.getElementById('status-bar').innerHTML = UI.renderStatusBar();
  document.getElementById('footer-host').innerHTML = UI.renderFooter();
  document.getElementById('nav-host').innerHTML = UI.renderBottomNav('mente');
  renderDashboard();

const MENTE_KEY = 'alan_mando_mente_state';
function getMenteState() {
  return Store.get(MENTE_KEY, {
    estados_diarios: [],
    estrategias: [
      { id: 'sw1', nombre: 'Swimming 30 min AM', categoria: 'físico', efectividad: 0.85, contexto: 'estrés cierre mes', usos: 0 },
      { id: 'mu1', nombre: 'Ensayo musical 2hrs', categoria: 'creativo', efectividad: 0.92, contexto: 'reset emocional post-laboral', usos: 0 },
      { id: 'pa1', nombre: 'Caminar con Pepe 20 min', categoria: 'físico', efectividad: 0.7, contexto: 'desconectar entre tareas', usos: 0 },
      { id: 'me1', nombre: 'Meditación 10 min app', categoria: 'mental', efectividad: 0.55, contexto: 'TDAH AM', usos: 0 },
      { id: 'pi1', nombre: 'Piscina larga sábado', categoria: 'físico', efectividad: 0.95, contexto: 'fin de semana reset', usos: 0 }
    ],
    journal: []
  });
}
function setMenteState(s) { Store.set(MENTE_KEY, s); }

const ESTADOS = {
  inspirado: { label: 'Inspirado', color: '#FF7A00', score: 5 },
  bien: { label: 'Bien', color: '#7AC68A', score: 4 },
  neutro: { label: 'Neutro', color: '#8A9CA8', score: 3 },
  cansado: { label: 'Cansado', color: '#D4A574', score: 2 },
  denso: { label: 'Denso', color: '#C56A6A', score: 1 }
};

// ============================================================
// CÁLCULOS REALES · cruza con TODO el ERP
// ============================================================
function calcularPulsoInterno() {
  const s = getMenteState();
  const ahora = Date.now();
  const en7d = ahora - 7 * 86400000;
  const en30d = ahora - 30 * 86400000;

  // Carga operativa real
  const pendientes = (Store.get(Store.KEYS.PENDIENTES, []) || []).filter(p => !p.done);
  const altas = pendientes.filter(p => p.prioridad === 'alta');
  const vencidos = pendientes.filter(p => p.fecha_limite && p.fecha_limite < ahora);
  const cuentasCobrar = (Store.get('alan_mando_cuentas_cobrar', []) || []).filter(c => !c.cobrado);
  const cobrosVencidos = cuentasCobrar.filter(c => c.fecha_esperada && c.fecha_esperada < ahora);
  const cuentasPagar = (Store.get('alan_mando_cuentas_pagar', []) || []).filter(p => !p.pagado);
  const pagosProximos = cuentasPagar.filter(p => p.fecha && p.fecha < ahora + 7 * 86400000);

  // Check-ins recientes
  const checkins7d = (s.estados_diarios || []).filter(e => new Date(e.fecha).getTime() >= en7d);
  const checkins30d = (s.estados_diarios || []).filter(e => new Date(e.fecha).getTime() >= en30d);

  // Ejercicios
  const ejercicios = Store.get('alan_mando_ejercicios', []) || [];
  const ejer7d = ejercicios.filter(e => e.ts >= en7d);
  const ejer30d = ejercicios.filter(e => e.ts >= en30d);

  // ESTRÉS · 0-100 · más alta carga + pendientes vencidos + cobros vencidos = más alto
  let estres = 20; // baseline
  estres += vencidos.length * 8;
  estres += altas.length * 5;
  estres += cobrosVencidos.length * 10;
  estres += pagosProximos.length * 4;
  // Si checkins recientes son densos/cansado, sube
  const densos7d = checkins7d.filter(c => c.estado === 'denso' || c.estado === 'cansado').length;
  estres += densos7d * 7;
  estres = Math.min(100, estres);

  // ANSIEDAD · 0-100 · cobros + pagos próximos + falta de ejercicio
  let ansiedad = 15;
  ansiedad += cobrosVencidos.length * 12;
  ansiedad += pagosProximos.length * 6;
  ansiedad += vencidos.length * 4;
  if (ejer7d.length === 0) ansiedad += 15;
  else if (ejer7d.length < 2) ansiedad += 8;
  // Si check-ins no tienen "denso" → bajar
  if (densos7d === 0 && checkins7d.length >= 3) ansiedad -= 10;
  ansiedad = Math.max(0, Math.min(100, ansiedad));

  // ENERGÍA · 0-100 · checkins buenos + ejercicio frecuente = alta
  let energia = 50;
  const buenos7d = checkins7d.filter(c => c.estado === 'bien' || c.estado === 'inspirado').length;
  energia += buenos7d * 7;
  energia -= densos7d * 8;
  energia += Math.min(15, ejer7d.length * 4);
  if (cobrosVencidos.length > 2) energia -= 10;
  energia = Math.max(5, Math.min(100, energia));

  // FOCO · 0-100 · pocos pendientes vencidos + alta consistencia checkin
  let foco = 60;
  foco -= vencidos.length * 6;
  foco -= altas.length * 3;
  foco += Math.round((checkins7d.length / 7) * 20);
  if (ejer7d.length >= 3) foco += 10;
  foco = Math.max(10, Math.min(100, foco));

  return {
    estres: Math.round(estres),
    ansiedad: Math.round(ansiedad),
    energia: Math.round(energia),
    foco: Math.round(foco),
    contexto: {
      pendientes_total: pendientes.length,
      pendientes_altas: altas.length,
      pendientes_vencidos: vencidos.length,
      cobros_vencidos: cobrosVencidos.length,
      pagos_proximos: pagosProximos.length,
      checkins_7d: checkins7d.length,
      checkins_30d: checkins30d.length,
      ejer_7d: ejer7d.length,
      ejer_30d: ejer30d.length,
      densos_7d: densos7d,
      buenos_7d: buenos7d
    }
  };
}

function detectarPatron(pulso) {
  const c = pulso.contexto;

  if (pulso.estres >= 75) {
    return {
      tipo: 'critico',
      eyebrow: 'CARGA CRÍTICA DETECTADA',
      titulo: `Estrés ${pulso.estres}/100 · sistema en alarma`,
      descripcion: `${c.pendientes_vencidos} pendientes vencidos + ${c.cobros_vencidos} cobros vencidos. Tu cuerpo está cargando peso. Necesitas 1 estrategia de reset HOY · sin pretextos.`,
      bg1: 'rgba(197,106,106,0.12)', bg2: 'rgba(197,106,106,0.02)', border: 'rgba(197,106,106,0.4)', color: 'rgba(220,140,140,0.95)'
    };
  }

  if (pulso.ansiedad >= 60 && c.ejer_7d < 2) {
    return {
      tipo: 'ansiedad_sin_movimiento',
      eyebrow: 'ANSIEDAD + SEDENTARISMO',
      titulo: `Ansiedad ${pulso.ansiedad}/100 con ${c.ejer_7d} ejercicios en 7d`,
      descripcion: `Tu data histórica muestra que swimming AM o caminar con Pepe bajan ansiedad ~30%. Bloquea 30 min mañana 7am en agenda · cero negociación.`,
      bg1: 'rgba(212,165,116,0.10)', bg2: 'rgba(212,165,116,0.02)', border: 'rgba(212,165,116,0.35)', color: 'rgba(220,180,130,0.95)'
    };
  }

  if (pulso.energia <= 30 && c.densos_7d >= 3) {
    return {
      tipo: 'energia_baja',
      eyebrow: 'ENERGÍA EN ROJO',
      titulo: `Energía ${pulso.energia}/100 · ${c.densos_7d} días densos en semana`,
      descripcion: `Lleva tiempo en carga sin reset. Recomendación: piscina larga sábado (95% efectividad histórica) + reducir 2 pendientes a la mitad.`,
      bg1: 'rgba(212,165,116,0.10)', bg2: 'rgba(212,165,116,0.02)', border: 'rgba(212,165,116,0.35)', color: 'rgba(220,180,130,0.95)'
    };
  }

  if (pulso.foco <= 40 && c.pendientes_total > 8) {
    return {
      tipo: 'foco_disperso',
      eyebrow: 'FOCO DISPERSO',
      titulo: `Foco ${pulso.foco}/100 con ${c.pendientes_total} pendientes abiertos`,
      descripcion: `Demasiados frentes abiertos. Arrancar autoagenda en calendario te bloquearía los 3 más urgentes en horarios fijos.`,
      bg1: 'rgba(120,200,220,0.08)', bg2: 'rgba(120,200,220,0.02)', border: 'rgba(120,200,220,0.3)', color: 'rgba(180,220,240,0.95)'
    };
  }

  if (pulso.energia >= 70 && c.buenos_7d >= 4) {
    return {
      tipo: 'racha_positiva',
      eyebrow: 'RACHA POSITIVA',
      titulo: `Energía ${pulso.energia}/100 · ${c.buenos_7d} días buenos en semana`,
      descripcion: `Tu sistema está en buen ritmo. Aprovecha esta ventana para trabajo profundo · es donde cierras más clientes históricamente.`,
      bg1: 'rgba(180,220,170,0.10)', bg2: 'rgba(180,220,170,0.02)', border: 'rgba(180,220,170,0.35)', color: 'rgba(180,220,170,0.95)'
    };
  }

  if (c.checkins_7d < 3) {
    return {
      tipo: 'sin_data',
      eyebrow: 'NECESITO MÁS DATA',
      titulo: `Solo ${c.checkins_7d} check-ins en 7 días`,
      descripcion: `No puedo cruzar tu estado mental con tu carga operativa con tan poca data. Hazme un check-in diario · 5 segundos · el resto se calcula solo.`,
      bg1: 'rgba(150,210,230,0.08)', bg2: 'rgba(150,210,230,0.02)', border: 'rgba(150,210,230,0.3)', color: 'rgba(180,220,240,0.95)'
    };
  }

  return {
    tipo: 'estable',
    eyebrow: 'SISTEMA ESTABLE',
    titulo: `Estrés ${pulso.estres} · Energía ${pulso.energia}`,
    descripcion: `Métricas dentro de rango. Sostén consistencia: check-in diario + ejercicio 3x semana. Cuando algo se desvía, te aviso primero.`,
    bg1: 'rgba(180,220,170,0.06)', bg2: 'rgba(180,220,170,0.01)', border: 'rgba(180,220,170,0.25)', color: 'rgba(180,220,170,0.95)'
  };
}

function colorScore(val, invertido = false) {
  // invertido = true para estrés/ansiedad (menos = mejor)
  const score = invertido ? 100 - val : val;
  if (score >= 70) return '#7AC68A';
  if (score >= 40) return '#D4A574';
  return '#C56A6A';
}

function renderDashboard() {
  const s = getMenteState();
  const c = document.getElementById('dashboard');
  const hoy = new Date().toISOString().slice(0, 10);
  const yaCheckIn = s.estados_diarios.find(e => e.fecha === hoy);

  const pulso = calcularPulsoInterno();
  const patron = detectarPatron(pulso);
  const ctx = pulso.contexto;

  // ===== METRIC QUAD · estrés, ansiedad, energía, foco =====
  const metricsHtml = `
    <div class="metric-quad">
      <div class="metric-card-large" style="--mc-color:${colorScore(pulso.estres, true)};--mc-bg1:${colorScore(pulso.estres, true)}14;--mc-bg2:${colorScore(pulso.estres, true)}03;--mc-border:${colorScore(pulso.estres, true)}30;">
        <div class="mc-eyebrow">ESTRÉS</div>
        <div class="mc-row"><div class="mc-value">${pulso.estres}</div><div class="mc-unit">/100</div></div>
        <div class="mc-bar"><div class="mc-bar-fill" style="width:${pulso.estres}%;"></div></div>
        <div class="mc-meta">${pulso.estres >= 70 ? 'alto · necesita reset' : pulso.estres >= 40 ? 'medio · monitorea' : 'bajo · sostenible'}</div>
      </div>
      <div class="metric-card-large" style="--mc-color:${colorScore(pulso.ansiedad, true)};--mc-bg1:${colorScore(pulso.ansiedad, true)}14;--mc-bg2:${colorScore(pulso.ansiedad, true)}03;--mc-border:${colorScore(pulso.ansiedad, true)}30;">
        <div class="mc-eyebrow">ANSIEDAD</div>
        <div class="mc-row"><div class="mc-value">${pulso.ansiedad}</div><div class="mc-unit">/100</div></div>
        <div class="mc-bar"><div class="mc-bar-fill" style="width:${pulso.ansiedad}%;"></div></div>
        <div class="mc-meta">${ctx.cobros_vencidos > 0 ? `${ctx.cobros_vencidos} cobros vencidos` : ctx.ejer_7d < 2 ? 'falta movimiento' : 'estable'}</div>
      </div>
      <div class="metric-card-large" style="--mc-color:${colorScore(pulso.energia)};--mc-bg1:${colorScore(pulso.energia)}14;--mc-bg2:${colorScore(pulso.energia)}03;--mc-border:${colorScore(pulso.energia)}30;">
        <div class="mc-eyebrow">ENERGÍA</div>
        <div class="mc-row"><div class="mc-value">${pulso.energia}</div><div class="mc-unit">/100</div></div>
        <div class="mc-bar"><div class="mc-bar-fill" style="width:${pulso.energia}%;"></div></div>
        <div class="mc-meta">${ctx.buenos_7d} días buenos · ${ctx.ejer_7d} ejercicios 7d</div>
      </div>
      <div class="metric-card-large" style="--mc-color:${colorScore(pulso.foco)};--mc-bg1:${colorScore(pulso.foco)}14;--mc-bg2:${colorScore(pulso.foco)}03;--mc-border:${colorScore(pulso.foco)}30;">
        <div class="mc-eyebrow">FOCO</div>
        <div class="mc-row"><div class="mc-value">${pulso.foco}</div><div class="mc-unit">/100</div></div>
        <div class="mc-bar"><div class="mc-bar-fill" style="width:${pulso.foco}%;"></div></div>
        <div class="mc-meta">${ctx.pendientes_total} pendientes · ${ctx.pendientes_altas} alta</div>
      </div>
    </div>
  `;

  // ===== PATRÓN DETECTADO · cruza ERP =====
  const patronHtml = `
    <div class="patron-card" style="--patron-bg1:${patron.bg1};--patron-bg2:${patron.bg2};--patron-border:${patron.border};">
      <div class="patron-eyebrow" style="color:${patron.color};">${patron.eyebrow}</div>
      <div class="patron-titulo">${Util.esc(patron.titulo)}</div>
      <div class="patron-desc">${Util.esc(patron.descripcion)}</div>
    </div>
  `;

  // ===== CTA HABLAR CON MANDO =====
  const ctaHtml = `
    <div class="cta-mando" onclick="abrirChatConContexto()">
      <div class="cta-mando-avatar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="rgba(255,170,110,0.95)"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.8l-6.2 4.5 2.4-7.4L2 9.4h7.6L12 2z"/></svg>
      </div>
      <div class="cta-mando-text">
        <div class="cta-mando-eyebrow">HABLAR CON MANDO</div>
        <div class="cta-mando-titulo">¿Qué te tiene la cabeza ocupada?</div>
        <div class="cta-mando-desc">Mando llega con tu pulso interno + carga operativa cargados</div>
      </div>
      <div class="cta-mando-arrow">→</div>
    </div>
  `;

  // ===== CHECK-IN DEL DÍA =====
  const estadosArr = Object.entries(ESTADOS).map(([k, v]) => ({ key: k, ...v }));
  const checkinHtml = `
    <div style="margin-bottom:14px;">
      <div class="section-title">${yaCheckIn ? '¿Cambió algo?' : '¿Cómo estás hoy?'}</div>
      <div class="section-sub">tap = registra · 5 segundos · sube precisión de tu pulso</div>
      <div class="estado-grid">
        ${estadosArr.map(e => `
          <div class="estado-btn ${yaCheckIn?.estado === e.key ? 'selected' : ''}" data-estado="${e.key}">
            <div class="estado-emoji" style="background:${e.color}26;color:${e.color};">${e.label[0]}</div>
            <div class="estado-label">${e.label}</div>
          </div>
        `).join('')}
      </div>
      <textarea id="estado-nota" placeholder="Una línea (opcional) · ¿qué pasa hoy?" style="width:100%;background:rgba(244,243,239,0.03);border:0.5px solid var(--border-soft);border-radius:11px;padding:11px;font-family:inherit;font-size:14px;color:var(--text-primary);resize:vertical;min-height:50px;outline:none;box-sizing:border-box;line-height:1.5;margin-top:9px;">${yaCheckIn?.nota || ''}</textarea>
      <button class="btn primary-orange" style="width:100%;margin-top:7px;" id="btn-guardar-estado">${yaCheckIn ? 'Actualizar check-in' : 'Registrar check-in'}</button>
    </div>
  `;

  // ===== HEATMAP 60 días =====
  let heatmapHtml = '';
  if (s.estados_diarios.length > 0) {
    const dias = [];
    for (let i = 59; i >= 0; i--) {
      const d = new Date(Date.now() - i * 86400000);
      const fecha = d.toISOString().slice(0, 10);
      const e = s.estados_diarios.find(x => x.fecha === fecha);
      dias.push({ fecha, estado: e?.estado || null });
    }
    heatmapHtml = `
      <div style="margin-bottom:14px;">
        <div class="section-title">Últimos 60 días</div>
        <div class="section-sub">cada cuadrito · un día · color = estado</div>
        <div class="heatmap-grid">
          ${dias.map(d => {
            if (!d.estado) return `<div class="heatmap-cell" title="${d.fecha} · sin check-in"></div>`;
            return `<div class="heatmap-cell l-${d.estado}" title="${d.fecha} · ${ESTADOS[d.estado].label}"></div>`;
          }).join('')}
        </div>
      </div>
    `;
  }

  // ===== ESTRATEGIAS top 3 =====
  const sorted = [...s.estrategias].sort((a, b) => b.efectividad - a.efectividad).slice(0, 3);
  const estrategiasHtml = `
    <div style="margin-bottom:14px;">
      <div class="section-title">Tus 3 estrategias top</div>
      <div class="section-sub">marca cuál usaste hoy · sube efectividad histórica</div>
      ${sorted.map(e => `
        <div class="estrategia-row">
          <div class="estrategia-circle" style="--pct:${Math.round(e.efectividad * 100)}%;">
            <div class="estrategia-circle-inner">${Math.round(e.efectividad * 100)}</div>
          </div>
          <div class="estrategia-info">
            <div class="estrategia-titulo">${Util.esc(e.nombre)}</div>
            <div class="estrategia-ctx">${Util.esc(e.contexto)} · ${e.usos} usos</div>
          </div>
          <button class="btn" data-estrategia-id="${e.id}" style="font-size:10px;padding:7px 11px;flex-shrink:0;">Hoy</button>
        </div>
      `).join('')}
    </div>
  `;

  c.innerHTML = metricsHtml + patronHtml + ctaHtml + checkinHtml + estrategiasHtml + heatmapHtml;

  // Bindings check-in
  c.querySelectorAll('.estado-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      c.querySelectorAll('.estado-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });
  document.getElementById('btn-guardar-estado').addEventListener('click', () => {
    const sel = c.querySelector('.estado-btn.selected');
    if (!sel) return UI.toast('Selecciona un estado primero', 'error');
    const state = getMenteState();
    state.estados_diarios = state.estados_diarios.filter(e => e.fecha !== hoy);
    state.estados_diarios.push({ fecha: hoy, estado: sel.dataset.estado, nota: document.getElementById('estado-nota').value.trim(), ts: Date.now() });
    if (state.estados_diarios.length > 365) state.estados_diarios = state.estados_diarios.slice(-365);
    setMenteState(state);
    UI.toast('Check-in registrado · pulso actualizado', 'success');
    renderDashboard();
  });
  c.querySelectorAll('[data-estrategia-id]').forEach(btn => {
    btn.addEventListener('click', () => {
      const state = getMenteState();
      const e = state.estrategias.find(x => x.id === btn.dataset.estrategiaId);
      if (e) {
        e.usos++;
        e.efectividad = Math.min(1, e.efectividad + 0.02);
        setMenteState(state);
        UI.toast(`${e.nombre} · ${Math.round(e.efectividad * 100)}% efectividad`, 'success');
        renderDashboard();
      }
    });
  });
}

// ============================================================
// ABRIR CHAT MANDO CON CONTEXTO MENTE PRE-CARGADO
// ============================================================
function abrirChatConContexto() {
  const pulso = calcularPulsoInterno();
  const c = pulso.contexto;
  const yaCheckIn = getMenteState().estados_diarios.find(e => e.fecha === new Date().toISOString().slice(0, 10));

  // Inyectar contexto en sessionStorage para que index lo lea
  const contexto = {
    fuente: 'mente',
    pulso,
    estado_hoy: yaCheckIn ? yaCheckIn.estado : null,
    timestamp: Date.now()
  };
  try { sessionStorage.setItem('mando_contexto_mente', JSON.stringify(contexto)); } catch (e) {}

  // Pre-cargar el primer mensaje al usuario para arrancar conversación
  const prompt = yaCheckIn
    ? `Hablemos. Hoy me siento ${yaCheckIn.estado}. Mi pulso: estrés ${pulso.estres}, ansiedad ${pulso.ansiedad}, energía ${pulso.energia}, foco ${pulso.foco}. ¿Qué me sugieres con esta carga operativa?`
    : `Hablemos. Mi pulso ahora: estrés ${pulso.estres}, ansiedad ${pulso.ansiedad}, energía ${pulso.energia}, foco ${pulso.foco}. Tengo ${c.pendientes_altas} pendientes alta y ${c.cobros_vencidos} cobros vencidos. ¿Por dónde arrancamos?`;

  location.href = 'index.html?msg=' + encodeURIComponent(prompt);
}
</script>
