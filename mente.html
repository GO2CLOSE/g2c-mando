<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0F1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mente">
<title>Mente · Mando</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.estado-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 12px; }
.estado-btn { background: rgba(244,243,239,0.03); border: 0.5px solid var(--border-soft); border-radius: 11px; padding: 12px 4px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
.estado-btn.selected { background: rgba(255,79,0,0.15); border-color: rgba(255,79,0,0.5); }
.estado-emoji { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; }
.estado-label { font-size: 9px; letter-spacing: 0.05em; text-transform: uppercase; color: rgba(244,243,239,0.7); }
.estado-btn.selected .estado-label { color: rgba(255,170,110,0.98); font-weight: 500; }
.patron-card { background: rgba(150,210,230,0.05); border: 0.5px solid rgba(150,210,230,0.2); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
.patron-eyebrow { font-size: 9px; color: rgba(150,210,230,0.95); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; margin-bottom: 6px; }
.patron-text { font-size: 12px; color: var(--text-primary); line-height: 1.55; }
.estrategia-card { background: rgba(180,220,170,0.04); border: 0.5px solid rgba(180,220,170,0.18); border-radius: 11px; padding: 11px 13px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.estrategia-nombre { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
.estrategia-meta { font-size: 10px; color: rgba(244,243,239,0.55); }
.efectividad-bar { width: 60px; height: 4px; background: rgba(244,243,239,0.08); border-radius: 2px; overflow: hidden; margin-top: 4px; }
.efectividad-fill { height: 100%; background: linear-gradient(90deg, rgba(180,220,170,0.85), rgba(120,200,220,0.85)); border-radius: 2px; }
.energia-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.energia-card { background: rgba(244,243,239,0.03); border: 0.5px solid var(--border-soft); border-radius: 12px; padding: 12px; }
.energia-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(244,243,239,0.55); margin-bottom: 6px; }
.energia-value { font-size: 22px; font-weight: 500; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
.energia-meta { font-size: 10px; color: var(--text-tertiary); margin-top: 2px; }
.reflexion-prompt { background: linear-gradient(135deg, rgba(255,79,0,0.08), rgba(255,79,0,0.02)); border: 0.5px solid rgba(255,79,0,0.25); border-radius: 14px; padding: 14px 15px; margin-bottom: 10px; }
.reflexion-eyebrow { font-size: 9px; color: rgba(255,170,110,0.95); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; margin-bottom: 8px; }
.reflexion-text { font-size: 14px; font-family: 'DM Serif Display', serif; font-weight: 400; line-height: 1.4; color: var(--text-primary); letter-spacing: -0.01em; }
.journal-textarea { width: 100%; background: rgba(244,243,239,0.03); border: 0.5px solid var(--border-soft); border-radius: 11px; padding: 12px 14px; font-family: inherit; font-size: 14px; color: var(--text-primary); resize: vertical; min-height: 110px; outline: none; box-sizing: border-box; line-height: 1.55; }
.journal-textarea:focus { border-color: rgba(255,79,0,0.4); box-shadow: 0 0 0 3px rgba(255,79,0,0.06); }
</style>
</head>
<body>

<div id="status-bar"></div>

<header style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
  <div style="display:flex;align-items:center;gap:11px;">
    <div style="width:44px;height:44px;background:linear-gradient(135deg,rgba(180,220,170,0.18),rgba(120,200,220,0.12));border:0.5px solid rgba(180,220,170,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="3" stroke="rgba(180,220,170,0.95)" stroke-width="1.5"/>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2.1 2.1M16.9 16.9L19 19M5 19l2.1-2.1M16.9 7.1L19 5" stroke="rgba(180,220,170,0.95)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div style="font-size:9px;color:rgba(180,220,170,0.85);letter-spacing:0.18em;text-transform:uppercase;font-weight:500;">Mente</div>
      <div style="font-family:'DM Serif Display', serif;font-size:24px;font-weight:400;letter-spacing:-0.02em;">Cómo estás</div>
    </div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="estado">Estado</div>
  <div class="tab" data-tab="patrones">Patrones</div>
  <div class="tab" data-tab="estrategias">Estrategias</div>
  <div class="tab" data-tab="reflexion">Reflexión</div>
</div>

<div id="tab-content"></div>

<div id="footer-host"></div>
<div id="nav-host"></div>

<script src="shared.js"></script>
<script>
(function init() {
  if (!Auth.enforce()) return;
  document.getElementById('status-bar').innerHTML = UI.renderStatusBar();
  document.getElementById('footer-host').innerHTML = UI.renderFooter();
  document.getElementById('nav-host').innerHTML = UI.renderBottomNav('mente');

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      renderTab(t.dataset.tab);
    });
  });
  renderTab('estado');
})();

const MENTE_KEY = 'alan_mando_mente_state';
function getMenteState() {
  return Store.get(MENTE_KEY, {
    estados_diarios: [],
    estrategias: [
      { id: 'sw1', nombre: 'Swimming 30 min AM', categoria: 'físico', efectividad: 0.85, contexto: 'estrés cierre mes', usos: 0 },
      { id: 'mu1', nombre: 'Ensayo musical 2hrs', categoria: 'creativo', efectividad: 0.92, contexto: 'reset emocional post-laboral', usos: 0 },
      { id: 'pa1', nombre: 'Caminar con Pepe 20 min', categoria: 'físico', efectividad: 0.7, contexto: 'desconectar entre tareas', usos: 0 },
      { id: 'me1', nombre: 'Meditación 10 min app', categoria: 'mental', efectividad: 0.55, contexto: 'TDAH AM', usos: 0 },
      { id: 'pi1', nombre: 'Piscina larga sábado', categoria: 'físico', efectividad: 0.95, contexto: 'fin de semana reset', usos: 0 }
    ],
    journal: []
  });
}
function setMenteState(s) { Store.set(MENTE_KEY, s); }

function renderTab(tab) {
  const c = document.getElementById('tab-content');
  if (tab === 'estado') return renderEstado(c);
  if (tab === 'patrones') return renderPatrones(c);
  if (tab === 'estrategias') return renderEstrategias(c);
  if (tab === 'reflexion') return renderReflexion(c);
}

function renderEstado(c) {
  const s = getMenteState();
  const hoy = new Date().toISOString().slice(0, 10);
  const yaCheckIn = s.estados_diarios.find(e => e.fecha === hoy);

  const estados = [
    { key: 'inspirado', label: 'Inspirado', color: '#FF7A00', emoji: '◆' },
    { key: 'bien', label: 'Bien', color: '#7AC68A', emoji: '●' },
    { key: 'neutro', label: 'Neutro', color: '#8A9CA8', emoji: '○' },
    { key: 'cansado', label: 'Cansado', color: '#D4A574', emoji: '◐' },
    { key: 'denso', label: 'Denso', color: '#C56A6A', emoji: '◑' }
  ];

  const ultimos7 = s.estados_diarios.slice(-7);
  const counts = { inspirado: 0, bien: 0, neutro: 0, cansado: 0, denso: 0 };
  ultimos7.forEach(e => { counts[e.estado] = (counts[e.estado] || 0) + 1; });
  const dominante = Object.entries(counts).sort(([,a],[,b]) => b - a)[0];

  c.innerHTML = `
    <div class="reflexion-prompt">
      <div class="reflexion-eyebrow">CHECK-IN DEL DÍA</div>
      <div class="reflexion-text">${yaCheckIn ? '¿Cambió algo desde tu check-in?' : '¿Cómo estás entrando al día?'}</div>
    </div>
    <div class="estado-grid">
      ${estados.map(e => `
        <div class="estado-btn ${yaCheckIn?.estado === e.key ? 'selected' : ''}" data-estado="${e.key}">
          <div class="estado-emoji" style="background:${e.color}22;color:${e.color};">${e.emoji}</div>
          <div class="estado-label">${e.label}</div>
        </div>
      `).join('')}
    </div>
    <div class="form-field">
      <div class="field-label">NOTA RÁPIDA (opcional)</div>
      <textarea class="journal-textarea" id="estado-nota" placeholder="¿Qué pasa hoy? Una línea basta..." style="min-height:60px;font-size:14px;">${yaCheckIn?.nota || ''}</textarea>
    </div>
    <button class="btn primary-orange" style="width:100%;margin-top:8px;" id="btn-guardar-estado">${yaCheckIn ? 'Actualizar check-in' : 'Registrar check-in'}</button>

    <div class="section-eyebrow" style="margin-top:18px;">
      <div>
        <div class="label" style="color:rgba(244,243,239,0.55);">tu semana</div>
        <div style="font-size:11px;color:rgba(244,243,239,0.4);margin-top:2px;">${ultimos7.length} de 7 check-ins</div>
      </div>
    </div>

    ${ultimos7.length ? `
      <div class="energia-grid">
        <div class="energia-card">
          <div class="energia-label">DOMINANTE 7D</div>
          <div class="energia-value" style="text-transform:capitalize;">${dominante[0]}</div>
          <div class="energia-meta">${dominante[1]} de ${ultimos7.length} días</div>
        </div>
        <div class="energia-card">
          <div class="energia-label">CONSISTENCIA</div>
          <div class="energia-value">${Math.round((ultimos7.length / 7) * 100)}%</div>
          <div class="energia-meta">check-ins esta semana</div>
        </div>
      </div>
    ` : `
      <div style="text-align:center;padding:24px 12px;color:var(--text-tertiary);font-size:12px;">
        Sin check-ins · empieza hoy para que Mente aprenda tus patrones
      </div>
    `}
  `;

  c.querySelectorAll('.estado-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      c.querySelectorAll('.estado-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });

  document.getElementById('btn-guardar-estado').addEventListener('click', () => {
    const selected = c.querySelector('.estado-btn.selected');
    if (!selected) return UI.toast('Selecciona un estado primero', 'error');
    const estado = selected.dataset.estado;
    const nota = document.getElementById('estado-nota').value.trim();
    const state = getMenteState();
    state.estados_diarios = state.estados_diarios.filter(e => e.fecha !== hoy);
    state.estados_diarios.push({ fecha: hoy, estado, nota, ts: Date.now() });
    if (state.estados_diarios.length > 90) state.estados_diarios = state.estados_diarios.slice(-90);
    setMenteState(state);
    UI.toast('Check-in registrado · Mente aprende de ti', 'success');
    renderEstado(c);
  });
}

function renderPatrones(c) {
  const s = getMenteState();
  const pendientes = Store.get(Store.KEYS.PENDIENTES, []).filter(p => !p.done);
  const ultimos14 = s.estados_diarios.slice(-14);
  const denses = ultimos14.filter(e => e.estado === 'denso' || e.estado === 'cansado').length;
  const positivos = ultimos14.filter(e => e.estado === 'bien' || e.estado === 'inspirado').length;

  const patrones = [];
  if (denses >= 5) patrones.push({ eyebrow: 'CARGA OPERATIVA ALTA', text: `${denses} de tus últimos 14 días los reportaste como cansado o denso. Cuando esto pasa, tus estrategias de "swimming AM" y "ensayo musical" históricamente bajaron tu carga 30%. Considera bloquearlas en agenda.` });
  if (pendientes.length >= 5 && ultimos14.some(e => e.estado === 'denso')) patrones.push({ eyebrow: 'PENDIENTES ACUMULADOS', text: `Tienes ${pendientes.length} pendientes activos. Tu cabeza carga peso de cosas no hechas, no de cosas difíciles. Cierra 2 de los más viejos hoy aunque sean pequeños · alivio inmediato.` });
  if (ultimos14.length < 5) patrones.push({ eyebrow: 'POCA SEÑAL', text: `Solo ${ultimos14.length} check-ins en últimos 14 días. Mente necesita data para ayudarte · 1 tap diario es suficiente, toma 5 segundos.` });
  if (positivos >= 7) patrones.push({ eyebrow: 'RACHA POSITIVA', text: `${positivos} de últimos 14 días en bien/inspirado. Lo que sea que estás haciendo, sigue · documenta qué cambió en tu rutina para replicarlo.` });
  if (patrones.length === 0) patrones.push({ eyebrow: 'EN APRENDIZAJE', text: 'Necesito 7+ check-ins continuos para empezar a detectar patrones. Mantén el hábito · pronto verás correlaciones útiles.' });

  c.innerHTML = `
    <div class="section-eyebrow" style="margin-top:0;">
      <div>
        <div class="label" style="color:rgba(150,210,230,0.85);">patrones que detecto</div>
        <div style="font-size:11px;color:rgba(244,243,239,0.4);margin-top:2px;">cruzo finanzas · pendientes · estado</div>
      </div>
    </div>
    ${patrones.map(p => `
      <div class="patron-card">
        <div class="patron-eyebrow">${p.eyebrow}</div>
        <div class="patron-text">${p.text}</div>
      </div>
    `).join('')}

    <div class="section-eyebrow" style="margin-top:18px;">
      <div><div class="label" style="color:rgba(244,243,239,0.55);">contexto que entiendo</div></div>
    </div>
    <div style="background:rgba(244,243,239,0.025);border:0.5px solid var(--border-soft);border-radius:11px;padding:13px 15px;font-size:11px;line-height:1.7;color:var(--text-primary);">
      <div><strong>TDAH</strong> · necesitas Ritalin AM para regulación · sin dosis, día denso garantizado</div>
      <div><strong>TOC</strong> · perfeccionismo aumenta cuando hay 3+ pendientes acumulados</div>
      <div><strong>Estrés crónico</strong> · ciclo de venta &gt;45 días dispara cortisol · cortar es estrategia</div>
      <div><strong>Reset musical</strong> · 1 tocada o ensayo por semana baseline · &lt; eso = irritabilidad</div>
      <div><strong>Pepe</strong> · caminar con tu perro 20 min = mejor ROI emocional/tiempo</div>
    </div>
  `;
}

function renderEstrategias(c) {
  const s = getMenteState();
  const sorted = [...s.estrategias].sort((a, b) => b.efectividad - a.efectividad);

  c.innerHTML = `
    <div class="section-eyebrow" style="margin-top:0;">
      <div>
        <div class="label" style="color:rgba(180,220,170,0.85);">estrategias validadas</div>
        <div style="font-size:11px;color:rgba(244,243,239,0.4);margin-top:2px;">marca la que usaste hoy · sube efectividad</div>
      </div>
    </div>
    ${sorted.map(e => `
      <div class="estrategia-card">
        <div style="flex:1;">
          <div class="estrategia-nombre">${Util.esc(e.nombre)}</div>
          <div class="estrategia-meta">${Util.esc(e.contexto)} · ${e.usos} usos</div>
          <div class="efectividad-bar"><div class="efectividad-fill" style="width:${Math.round(e.efectividad * 100)}%;"></div></div>
        </div>
        <button class="btn" data-estrategia-id="${e.id}" style="font-size:10px;padding:6px 10px;flex-shrink:0;">Usé hoy</button>
      </div>
    `).join('')}

    <div class="section-eyebrow" style="margin-top:18px;">
      <div><div class="label" style="color:rgba(244,243,239,0.55);">agregar estrategia</div></div>
    </div>
    <div class="form-field">
      <div class="field-label">NOMBRE</div>
      <input type="text" class="field-input" id="est-nombre" placeholder="Ej: Caminar 30 min al atardecer" style="font-size:16px !important;">
    </div>
    <div class="form-field">
      <div class="field-label">CUÁNDO LA USAS</div>
      <input type="text" class="field-input" id="est-contexto" placeholder="Ej: cuando termino día laboral pesado" style="font-size:16px !important;">
    </div>
    <button class="btn primary-orange" style="width:100%;" id="btn-add-estrategia">Agregar estrategia</button>
  `;

  c.querySelectorAll('[data-estrategia-id]').forEach(btn => {
    btn.addEventListener('click', () => {
      const state = getMenteState();
      const e = state.estrategias.find(x => x.id === btn.dataset.estrategiaId);
      if (e) {
        e.usos++;
        e.efectividad = Math.min(1, e.efectividad + 0.02);
        setMenteState(state);
        UI.toast(`${e.nombre} · marcada · efectividad ${Math.round(e.efectividad * 100)}%`, 'success');
        renderEstrategias(c);
      }
    });
  });

  document.getElementById('btn-add-estrategia').addEventListener('click', () => {
    const nombre = document.getElementById('est-nombre').value.trim();
    const contexto = document.getElementById('est-contexto').value.trim();
    if (!nombre) return UI.toast('Falta nombre', 'error');
    const state = getMenteState();
    state.estrategias.push({
      id: 'est_' + Date.now(),
      nombre,
      categoria: 'custom',
      contexto: contexto || 'sin contexto',
      efectividad: 0.5,
      usos: 0,
      createdAt: Date.now()
    });
    setMenteState(state);
    UI.toast('Estrategia agregada', 'success');
    renderEstrategias(c);
  });
}

function renderReflexion(c) {
  const s = getMenteState();
  const journal = (s.journal || []).slice(-10).reverse();

  const prompts = [
    '¿Qué te tiene la cabeza ocupada ahorita?',
    '¿Qué decisión llevas postpuesta más de 3 días?',
    '¿Qué pequeña cosa te haría sentir mejor en este momento?',
    '¿De qué te vas a arrepentir si no actúas esta semana?',
    '¿Qué te está costando energía y no vale la pena?',
    '¿Qué te dió alegría real hoy (aunque sea chico)?',
    '¿Qué patrón estás repitiendo y ya no te sirve?',
    '¿Qué quisieras decir en voz alta pero no dices?'
  ];
  const prompt = prompts[Math.floor((Date.now() / 86400000) % prompts.length)];

  c.innerHTML = `
    <div class="reflexion-prompt">
      <div class="reflexion-eyebrow">PROMPT DE HOY</div>
      <div class="reflexion-text">${prompt}</div>
    </div>
    <div class="form-field">
      <div class="field-label">RESPONDE LIBRE</div>
      <textarea class="journal-textarea" id="journal-text" placeholder="Sin filtro · sin formato · solo escribe..."></textarea>
    </div>
    <button class="btn primary-orange" style="width:100%;" id="btn-guardar-journal">Guardar reflexión</button>

    ${journal.length ? `
      <div class="section-eyebrow" style="margin-top:18px;">
        <div>
          <div class="label" style="color:rgba(244,243,239,0.55);">últimas reflexiones</div>
          <div style="font-size:11px;color:rgba(244,243,239,0.4);margin-top:2px;">${journal.length} entradas · solo tú las ves</div>
        </div>
      </div>
      ${journal.map(j => `
        <div style="background:rgba(244,243,239,0.025);border:0.5px solid var(--border-soft);border-radius:11px;padding:11px 13px;margin-bottom:6px;">
          <div style="font-size:9px;color:rgba(244,243,239,0.5);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:5px;">${Util.fmtDate(j.ts)}</div>
          <div style="font-size:11px;color:rgba(244,243,239,0.85);line-height:1.55;font-style:italic;">"${Util.esc(j.text)}"</div>
        </div>
      `).join('')}
    ` : ''}
  `;

  document.getElementById('btn-guardar-journal').addEventListener('click', () => {
    const text = document.getElementById('journal-text').value.trim();
    if (!text) return UI.toast('Escribe algo primero', 'error');
    const state = getMenteState();
    state.journal = state.journal || [];
    state.journal.push({ ts: Date.now(), prompt, text });
    if (state.journal.length > 200) state.journal = state.journal.slice(-200);
    setMenteState(state);
    UI.toast('Reflexión guardada · solo tú la ves', 'success');
    renderReflexion(c);
  });
}
</script>

</body>
</html>
