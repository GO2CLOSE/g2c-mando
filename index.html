<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0F1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mando">
<title>Mando · G2C</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
body {
  padding-bottom: calc(var(--pad-bottom-nav) + 90px + env(safe-area-inset-bottom, 0px));
}

.mando-thread {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 4px;
}

.thread-msg-ai {
  align-self: flex-start;
  max-width: 92%;
  margin-bottom: 4px;
  animation: msgIn 0.32s cubic-bezier(0.32, 0.72, 0, 1);
}

.thread-msg-user {
  align-self: flex-end;
  max-width: 88%;
  background: rgba(255,79,0,0.16);
  border: 0.5px solid rgba(255,79,0,0.3);
  color: rgba(255,200,170,0.98);
  padding: 9px 13px;
  border-radius: 16px 16px 4px 16px;
  font-size: 13px;
  line-height: 1.45;
  margin-bottom: 4px;
  animation: msgIn 0.25s cubic-bezier(0.32, 0.72, 0, 1);
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.9); }
}

.ai-eyebrow-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 5px;
  padding-left: 2px;
}
.ai-dot-pulse {
  width: 6px;
  height: 6px;
  background: #FF7A00;
  border-radius: 50%;
  animation: pulse 2s infinite;
}
.ai-eyebrow-text {
  font-size: 9px;
  color: rgba(255,150,80,0.95);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 500;
}

.ai-bubble-greet {
  background: linear-gradient(135deg, rgba(255,79,0,0.08), rgba(255,79,0,0.02));
  border: 0.5px solid rgba(255,79,0,0.22);
  border-radius: 16px 16px 16px 4px;
  padding: 14px 16px;
  font-size: 13px;
  line-height: 1.55;
  color: var(--text-primary);
}
.ai-bubble-greet .greet-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  font-weight: 400;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
  line-height: 1.15;
}

.proactiv-card {
  align-self: flex-start;
  max-width: 92%;
  background: linear-gradient(135deg, var(--card-bg-1, rgba(255,79,0,0.10)), var(--card-bg-2, rgba(255,79,0,0.02)));
  border: 0.5px solid var(--card-border, rgba(255,79,0,0.30));
  border-radius: 14px;
  padding: 12px 14px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.15s, box-shadow 0.15s;
  margin-bottom: 4px;
  animation: msgIn 0.36s cubic-bezier(0.32, 0.72, 0, 1) both;
}
.proactiv-card:active { transform: scale(0.985); }

.proactiv-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 4px;
}
.proactiv-eyebrow {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 500;
}
.proactiv-arrow { font-size: 14px; flex-shrink: 0; }
.proactiv-titulo {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 3px;
  line-height: 1.3;
}
.proactiv-desc {
  font-size: 11px;
  color: rgba(244,243,239,0.62);
  line-height: 1.45;
}

.thread-chips {
  align-self: flex-start;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 6px 0 8px;
  max-width: 92%;
}
.chat-chip {
  background: rgba(244,243,239,0.04);
  border: 0.5px solid rgba(244,243,239,0.12);
  color: var(--text-primary);
  padding: 7px 13px;
  border-radius: 14px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.15s;
  white-space: nowrap;
  font-family: inherit;
}
.chat-chip:active { background: rgba(255,79,0,0.12); border-color: rgba(255,79,0,0.3); }
.chat-chip.primary {
  background: rgba(255,79,0,0.14);
  border-color: rgba(255,79,0,0.35);
  color: rgba(255,170,110,0.98);
}

.agenda-quick {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 8px 14px;
  background: rgba(120,200,220,0.08);
  border: 0.5px solid rgba(120,200,220,0.28);
  border-radius: 22px;
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.15s;
}
.agenda-quick:active { transform: scale(0.97); }
.agenda-quick-label {
  font-size: 11px;
  color: rgba(180,220,240,0.95);
  font-weight: 500;
}
.agenda-quick-count {
  font-size: 10px;
  color: rgba(120,200,220,0.95);
  background: rgba(120,200,220,0.14);
  padding: 2px 7px;
  border-radius: 10px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}

.typing-bubble {
  align-self: flex-start;
  background: rgba(244,243,239,0.04);
  border: 0.5px solid rgba(244,243,239,0.08);
  border-radius: 16px 16px 16px 4px;
  padding: 12px 16px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.typing-dot {
  width: 6px;
  height: 6px;
  background: rgba(244,243,239,0.5);
  border-radius: 50%;
  animation: typingPulse 1.3s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingPulse {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-3px); opacity: 1; }
}

.lista-visual-card {
  align-self: flex-start;
  width: 92%;
  max-width: 92%;
  background: linear-gradient(135deg, var(--lv-bg-1, rgba(255,79,0,0.07)), var(--lv-bg-2, rgba(255,79,0,0.01)));
  border: 0.5px solid var(--lv-border, rgba(255,79,0,0.22));
  border-radius: 14px;
  overflow: hidden;
  margin: 4px 0;
}
.lv-header {
  padding: 11px 13px 9px;
  border-bottom: 0.5px solid var(--lv-border-soft, rgba(255,79,0,0.12));
}
.lv-eyebrow {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 4px;
  color: var(--lv-accent, rgba(255,170,110,0.98));
}
.lv-titulo {
  font-size: 14px;
  font-weight: 500;
}
.lv-item {
  padding: 10px 13px;
  border-bottom: 0.5px solid rgba(244,243,239,0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.lv-item:last-child { border-bottom: 0; }
.lv-item-content { flex: 1; min-width: 0; }
.lv-item-principal {
  font-size: 12px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
}
.lv-item-secundario {
  font-size: 10px;
  color: rgba(244,243,239,0.5);
  margin-top: 2px;
}
.lv-item-tag {
  font-size: 10px;
  font-weight: 500;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}
.lv-item-urgent-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.resumen-card {
  align-self: flex-start;
  width: 92%;
  max-width: 92%;
  border-radius: 14px;
  padding: 14px 16px;
  margin: 4px 0;
}
.resumen-eyebrow {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 6px;
}
.resumen-valor {
  font-size: 26px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.1;
  font-variant-numeric: tabular-nums;
}
.resumen-meta {
  font-size: 10px;
  color: rgba(244,243,239,0.55);
  margin-top: 4px;
}

.nav-card {
  align-self: flex-start;
  max-width: 92%;
  background: rgba(120,200,220,0.06);
  border: 0.5px solid rgba(120,200,220,0.3);
  border-radius: 12px;
  padding: 10px 13px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  margin: 4px 0;
}
.nav-card-label {
  font-size: 12px;
  font-weight: 500;
  color: rgba(180,220,240,0.98);
  flex: 1;
}
.nav-card-arrow {
  font-size: 16px;
  color: rgba(150,210,230,0.95);
  flex-shrink: 0;
}
</style>
</head>
<body>

<div id="status-bar"></div>

<header style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
  <div style="display:flex;align-items:center;gap:11px;">
    <div class="mando-avatar">
      <div class="core">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.8l-6.2 4.5 2.4-7.4L2 9.4h7.6L12 2z"/></svg>
      </div>
      <div class="ring-1"></div>
      <div class="ring-2"></div>
    </div>
    <div>
      <div style="font-size:14px;font-weight:500;">Mando</div>
      <div style="display:flex;align-items:center;gap:5px;margin-top:1px;">
        <div style="width:5px;height:5px;background:rgba(180,220,170,0.95);border-radius:50%;"></div>
        <div style="font-size:9px;color:rgba(244,243,239,0.55);">activo · Sonnet 4.6</div>
      </div>
    </div>
  </div>
  <div style="display:flex;gap:6px;">
    <a id="agenda-quick" href="calendario.html" class="agenda-quick">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="5" width="18" height="16" rx="2" stroke="rgba(180,220,240,0.95)" stroke-width="1.5" fill="none"/>
        <path d="M3 9h18" stroke="rgba(180,220,240,0.95)" stroke-width="1.5"/>
        <path d="M8 3v3M16 3v3" stroke="rgba(180,220,240,0.95)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="agenda-quick-label" id="agenda-quick-label">Ver agenda</span>
      <span class="agenda-quick-count" id="agenda-quick-count" style="display:none;">0</span>
    </a>
    <a href="config.html" style="width:38px;height:38px;background:rgba(255,79,0,0.1);border:0.5px solid rgba(255,79,0,0.3);border-radius:10px;display:flex;align-items:center;justify-content:center;text-decoration:none;position:relative;" id="config-link">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="3" stroke="rgba(255,170,110,0.95)" stroke-width="1.5"/>
        <path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" stroke="rgba(255,170,110,0.95)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div id="config-badge" style="display:none;position:absolute;top:-4px;right:-4px;width:14px;height:14px;background:rgba(255,79,0,1);border-radius:50%;font-size:9px;color:white;align-items:center;justify-content:center;font-weight:600;border:1.5px solid #0F1419;"></div>
    </a>
  </div>
</header>

<!-- Thread del chat principal · UN SOLO flujo conversacional -->
<div class="mando-thread" id="mando-thread"></div>

<!-- Mini-player flotante -->
<div class="miniplayer" id="miniplayer">
  <div class="yt-thumb">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
      <rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>
    </svg>
  </div>
  <div class="yt-info">
    <div class="yt-title" id="mp-title">—</div>
    <div class="yt-progress"><div id="mp-progress" style="width:0%"></div></div>
  </div>
  <div class="yt-controls">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" id="mp-pause">
      <path d="M19 20L9 12l10-8v16z" stroke="rgba(244,243,239,0.7)" stroke-width="1.8"/>
    </svg>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" id="mp-close">
      <path d="M6 18L18 6M6 6l12 12" stroke="rgba(244,243,239,0.5)" stroke-width="1.5"/>
    </svg>
  </div>
</div>

<div id="chat-input-host"></div>
<div id="footer-host" style="display:none;"></div>
<div id="nav-host"></div>

<script src="shared.js"></script>
<script>
let conversationHistory = [];

(async function init() {
  if (!Auth.enforce()) return;

  document.getElementById('status-bar').innerHTML = UI.renderStatusBar();
  document.getElementById('chat-input-host').innerHTML = UI.renderChatInput('Háblame...');
  document.getElementById('nav-host').innerHTML = UI.renderBottomNav('mando');

  // Botón agenda dinámico · cuenta eventos hoy/próx 7d
  renderAgendaQuick();

  // Ejecutar ProactivIA en background
  ProactivIA.ejecutar().then(() => actualizarContadorAlertas());

  // Render del flow conversacional
  renderConversationalFlow();

  // Bind input principal
  UI.bindChatInput(handleChatMessage);

  // Mini-player
  loadMiniplayer();

  // Restaurar conversación si hay
  conversationHistory = Store.get(Store.KEYS.CHAT_CONV, []);
})();

// ============================================================
// FLOW CONVERSACIONAL · saludo IA + cards proactivas + chips
// ============================================================
function renderConversationalFlow() {
  const thread = document.getElementById('mando-thread');
  thread.innerHTML = '';

  // 1. SALUDO IA en bubble de chat
  const saludoMsg = document.createElement('div');
  saludoMsg.className = 'thread-msg-ai';
  const fecha = new Date().toLocaleDateString('es-MX', { weekday: 'long' });
  const greeting = `${Util.greeting()}, Alan.`;
  const briefingText = buildLocalBriefing();

  saludoMsg.innerHTML = `
    <div class="ai-eyebrow-row">
      <div class="ai-dot-pulse"></div>
      <div class="ai-eyebrow-text">Mando · ${fecha}</div>
    </div>
    <div class="ai-bubble-greet">
      <div class="greet-title">${Util.esc(greeting)}</div>
      <div>${Util.esc(briefingText)}</div>
    </div>
  `;
  thread.appendChild(saludoMsg);

  // 2. CARDS PROACTIVAS (idénticas en estilo · entre mensajes)
  const sugs = ProactivIA.sugerenciasParaHome();
  sugs.forEach(s => {
    const card = document.createElement('div');
    card.className = 'proactiv-card';
    card.style.setProperty('--card-bg-1', `${s.color}1A`);
    card.style.setProperty('--card-bg-2', `${s.color}05`);
    card.style.setProperty('--card-border', `${s.color}40`);
    card.innerHTML = `
      <div class="proactiv-row">
        <div class="proactiv-eyebrow" style="color:${s.color};">${s.eyebrow}</div>
        <div class="proactiv-arrow" style="color:${s.color};">→</div>
      </div>
      <div class="proactiv-titulo">${Util.esc(s.titulo)}</div>
      <div class="proactiv-desc">${Util.esc(s.descripcion)}</div>
    `;
    card.addEventListener('click', () => handleChatMessage(s.prompt));
    thread.appendChild(card);
  });

  // 3. CHIPS de respuesta
  const chips = document.createElement('div');
  chips.className = 'thread-chips';

  // Chips contextuales según ProactivIA
  const chipOpts = sugs.length > 0
    ? [
        { text: 'Arrancamos con lo urgente', primary: true, prompt: 'arrancamos con lo más urgente' },
        { text: 'cansado', prompt: 'cansado' },
        { text: 'denso', prompt: 'denso' }
      ]
    : [
        { text: 'bien · sigamos', primary: true, prompt: 'bien, sigamos' },
        { text: 'cansado', prompt: 'cansado' },
        { text: 'denso', prompt: 'denso' },
        { text: 'qué tengo hoy', prompt: 'qué tengo hoy en agenda' }
      ];

  chipOpts.forEach(opt => {
    const c = document.createElement('button');
    c.className = 'chat-chip' + (opt.primary ? ' primary' : '');
    c.textContent = opt.text;
    c.addEventListener('click', () => handleChatMessage(opt.prompt));
    chips.appendChild(c);
  });
  thread.appendChild(chips);
}

function renderAgendaQuick() {
  const calendario = Store.get(Store.KEYS.CALENDARIO, []) || [];
  const eventos = Store.get(Store.KEYS.EVENTOS_MUSICA, []) || [];
  const ahora = Date.now();
  const en7d = ahora + 7 * 86400000;
  const inicioHoy = new Date(); inicioHoy.setHours(0,0,0,0);
  const finHoy = inicioHoy.getTime() + 86400000;

  // Eventos hoy en calendario + tocadas
  const eventosHoy = [
    ...calendario.filter(e => e.ts >= inicioHoy.getTime() && e.ts < finHoy),
    ...eventos.filter(e => e.ts >= inicioHoy.getTime() && e.ts < finHoy)
  ].length;

  const eventosSemana = [
    ...calendario.filter(e => e.ts >= ahora && e.ts <= en7d),
    ...eventos.filter(e => e.ts >= ahora && e.ts <= en7d)
  ].length;

  const label = document.getElementById('agenda-quick-label');
  const count = document.getElementById('agenda-quick-count');

  if (eventosHoy > 0) {
    label.textContent = 'Hoy';
    count.textContent = eventosHoy;
    count.style.display = 'inline-flex';
  } else if (eventosSemana > 0) {
    label.textContent = 'Esta semana';
    count.textContent = eventosSemana;
    count.style.display = 'inline-flex';
  } else {
    label.textContent = 'Ver agenda';
    count.style.display = 'none';
  }
}

function buildLocalBriefing() {
  const clientes = Store.get(Store.KEYS.CLIENTES, []) || [];
  const pendientes = (Store.get(Store.KEYS.PENDIENTES, []) || []).filter(p => !p.done);
  const eventos = Store.get(Store.KEYS.EVENTOS_MUSICA, []) || [];
  const cuentasCobrar = (Store.get('alan_mando_cuentas_cobrar', []) || []).filter(c => !c.cobrado);
  const cobrosRec = (Store.get('alan_mando_cobros_recurrentes', []) || []).filter(c => c.activo);

  const ahora = Date.now();
  const en7d = ahora + 7 * 86400000;

  const cobrosVencidos = cuentasCobrar.filter(c => c.fecha_esperada && c.fecha_esperada < ahora);
  const cobrosProximos = cuentasCobrar.filter(c => c.fecha_esperada && c.fecha_esperada >= ahora && c.fecha_esperada <= en7d);
  const recProximos = cobrosRec.filter(c => c.proximo_cobro && c.proximo_cobro <= en7d);
  const altas = pendientes.filter(p => p.prioridad === 'alta');
  const vencidosPend = pendientes.filter(p => p.fecha_limite && p.fecha_limite < ahora);
  const proxTocada = eventos.filter(e => e.tipo === 'tocada' && e.ts > ahora).sort((a, b) => a.ts - b.ts)[0];

  const partes = [];
  if (cobrosVencidos.length) {
    const monto = cobrosVencidos.reduce((s, c) => s + (c.monto || 0), 0);
    partes.push(`${cobrosVencidos.length} cobro${cobrosVencidos.length > 1 ? 's' : ''} vencido${cobrosVencidos.length > 1 ? 's' : ''} (${Util.fmtMoneyK(monto)})`);
  }
  if (vencidosPend.length) partes.push(`${vencidosPend.length} pendiente${vencidosPend.length > 1 ? 's' : ''} VENCIDO${vencidosPend.length > 1 ? 'S' : ''}`);
  if (altas.length && !vencidosPend.length) partes.push(`${altas.length} pendiente${altas.length > 1 ? 's' : ''} alta prioridad`);
  if (cobrosProximos.length || recProximos.length) {
    const total = cobrosProximos.length + recProximos.length;
    partes.push(`${total} cobro${total > 1 ? 's' : ''} esta semana`);
  }
  if (proxTocada) partes.push(`tocada en ${Util.daysUntil(proxTocada.ts)} días`);

  if (partes.length === 0) {
    return 'Día limpio · sin urgencias detectadas. Aprovecha para trabajo profundo o prospección de clientes nuevos.';
  }
  return partes.join(' · ') + '. ¿Por dónde arrancamos?';
}

// ============================================================
// HANDLE CHAT · navega al chat dedicado con mensaje pre-llenado
// ============================================================
function handleChatMessage(text) {
  if (!text || !text.trim()) return;
  // Redirige al chat dedicado · ahí está toda la lógica de cards visuales
  window.location.href = 'chat.html?msg=' + encodeURIComponent(text);
}

// ============================================================
// CONFIG BADGE · alertas pendientes
// ============================================================
function actualizarContadorAlertas() {
  const alertas = Store.get('alan_mando_alertas', []) || [];
  const noLeidas = alertas.filter(a => !a.leida).length;
  const badge = document.getElementById('config-badge');
  if (badge) {
    if (noLeidas > 0) {
      badge.style.display = 'flex';
      badge.textContent = noLeidas > 9 ? '9+' : String(noLeidas);
    } else {
      badge.style.display = 'none';
    }
  }
}

// ============================================================
// MINI-PLAYER
// ============================================================
function loadMiniplayer() {
  const cancion = Store.get('alan_mando_current_song', null);
  if (!cancion) return;
  const mp = document.getElementById('miniplayer');
  document.getElementById('mp-title').textContent = cancion.titulo + ' · ' + cancion.artista;
  document.getElementById('mp-progress').style.width = (cancion.progress || 0) + '%';
  mp.classList.add('active');

  document.getElementById('mp-close').addEventListener('click', () => {
    Store.set('alan_mando_current_song', null);
    mp.classList.remove('active');
  });
  document.getElementById('miniplayer').addEventListener('click', (e) => {
    if (e.target.closest('#mp-close')) return;
    location.href = 'musica.html';
  });
}
</script>
